tor for shoulder dystocia, stillbirth, neonatal hypoglycaemia, and pre-eclampsia — not purely a maternal metabolic issue"]},{"id":"pph","name":"Postpartum haemorrhage","system":"Obstetrics & Gynaecology","presentation":["Primary PPH: blood loss >500 ml after vaginal delivery or >1000 ml after caesarean section within 24 hours","4 T's aetiology: Tone (uterine atony — 70-80% of PPH), Trauma (lacerations, uterine rupture), Tissue (retained placenta/membranes), Thrombin (coagulopathy)","Haemodynamic instability: tachycardia, hypotension, pallor, cold clammy peripheries","Uterine atony: fundus palpably soft and boggy post-delivery, fails to contract","Secondary PPH: excessive bleeding 24 hours to 12 weeks postpartum — consider retained products or endometritis"],"signs":["Boggy, poorly contracted uterus on abdominal palpation (atony)","Haemodynamic compromise: shock index (HR/SBP) >1 suggests significant haemorrhage","Visible genital tract trauma on inspection (perineal/vaginal/cervical lacerations)","Failure of placenta to deliver or incomplete placenta on inspection (retained tissue)"],"investigations":{"bedside":["Observations: shock index (HR/SBP) — >1 significant, >1.7 severe; continuous pulse oximetry and BP monitoring","Catheterise: urine output target >30 ml/hr as marker of renal perfusion and volume status","Clinical estimate of blood loss: weigh swabs, measure collected blood; note underestimation is common"],"bloods":["FBC: haemoglobin trend (initial Hb may be falsely normal in acute haemorrhage) and platelet count","Clotting screen + fibrinogen: DIC develops in severe PPH — fibrinogen <2 g/L is critical threshold indicating consumption","Group and crossmatch: urgent sample for blood bank; activate major haemorrhage protocol if needed","Venous blood gas: lactate and base excess for real-time assessment of tissue perfusion and shock severity"],"imaging":["USS uterus and pelvis: identify retained products of conception (echogenic material within uterine cavity)","Interventional radiology: uterine artery embolisation if bleeding refractory to medical management and patient haemodynamically stable enough"]},"mx":["Call for help + major haemorrhage protocol: 2 large-bore IV cannulae, IV fluid resuscitation, transfuse packed red cells:FFP:platelets in 1:1:1 ratio; tranexamic acid (antifibrinolytic) within 3 hours","Stepwise uterotonics for atony — uterine massage (bimanual compression) → oxytocin IV infusion (first-line uterotonic) → ergometrine IM/IV (ergot alkaloid, vasoconstriction + uterine contraction) → carboprost IM (prostaglandin F2α analogue) → misoprostol (prostaglandin E1, sublingual/rectal)","4 T's-targeted management: Tone → uterotonics/massage; Trauma → surgical repair of lacerations; Tissue → manual removal of placenta/ERPC; Thrombin → correct coagulopathy with FFP/cryoprecipitate/platelets","Escalation: intrauterine balloon tamponade → B-Lynch suture (compression suture) → uterine/internal iliac artery ligation → hysterectomy (definitive last resort)"],"traps":["Carboprost (prostaglandin F2α) is CONTRAINDICATED in asthma — causes severe bronchospasm; use misoprostol instead","Ergometrine is CONTRAINDICATED in hypertension and pre-eclampsia/eclampsia — causes vasoconstriction and can precipitate hypertensive crisis or stroke","Do not rely on initial haemoglobin to exclude significant haemorrhage — Hb may be falsely normal in acute haemorrhage before haemodilution occurs; use shock index and clinical picture","Fibrinogen is a sensitive early marker of DIC in PPH — a falling fibrinogen (<2 g/L) mandates cryoprecipitate; standard clotting (PT/APTT) may be normal until late"]},{"id":"pre-eclampsia","name":"Pre-eclampsia","system":"Obstetrics & Gynaecology","presentation":["Hypertension ≥140/90 mmHg after 20 weeks gestation","Proteinuria (≥300 mg/24 h or PCR ≥30 mg/mmol)","Frontal headache (warning of impending eclampsia)","Visual disturbance: blurring, flashing lights, scotomata","Epigastric or RUQ pain (hepatic capsule stretch / HELLP)"],"signs":["Elevated BP on repeated measurement (≥140/90 or severe ≥160/110)","Pitting oedema — hands, face, pre-tibial (non-specific but common)","Hyperreflexia and clonus (≥3 beats = severe — risk of seizure)","RUQ tenderness on palpation (hepatic involvement / HELLP)"],"investigations":{"bedside":["Urine dipstick: proteinuria 2+ or more — quantify with PCR","Urine protein:creatinine ratio (PCR) ≥30 mg/mmol confirms significant proteinuria","BP measurement: two readings ≥140/90 mmHg ≥4 h apart"],"bloods":["FBC: thrombocytopenia (platelets <100 ×10⁹/L in HELLP)","LFTs: elevated AST/ALT (≥2× upper limit); ↑bilirubin indicates haemolysis","LDH: ↑LDH (>600 U/L) — marker of haemolysis (H in HELLP)","U&E and creatinine: rising creatinine reflects renal impairment","Clotting / coagulation screen: DIC risk if HELLP severe"],"imaging":["USS fetus + umbilical artery Dopplers: fetal growth restriction, oligohydramnios, absent/reversed end-diastolic flow","CT head: indicated after eclamptic seizure to exclude haemorrhage or other cause"]},"mx":["Antihypertensive: labetalol first-line (oral or IV); nifedipine MR alternative; target BP <150/100 mmHg","Seizure prevention: IV magnesium sulphate (MgSO4) if severe pre-eclampsia or eclampsia — loading dose then infusion","Delivery: definitive treatment — timing depends on gestation and severity; corticosteroids if <34 weeks for fetal lung maturity","Prophylaxis: low-dose aspirin from 12 weeks in women with ≥1 high-risk or ≥2 moderate-risk factors"],"traps":["Mg toxicity sequence: loss of patellar reflexes → respiratory depression → cardiac arrest — monitor reflexes hourly; antidote is IV calcium gluconate","Delivery is the only cure — all other measures are temporising; do not delay delivery to chase a normal BP","HELLP can occur without severe hypertension or significant proteinuria — diagnose on bloods, not BP alone","Methyldopa: safe antenatally but avoid postnatally (risk of postnatal depression); switch to labetalol or nifedipine after delivery"]},{"id":"depression","name":"Depression","system":"Psychiatry","presentation":["Persistent low mood (≥2 weeks)","Anhedonia — loss of interest/pleasure in previously enjoyed activities","Anergia — fatigue or loss of energy","Biological symptoms: early morning wakening, diurnal mood variation (worse AM), psychomotor retardation/agitation, reduced appetite/weight loss, loss of libido","Suicidal ideation or thoughts of self-harm"],"signs":["Psychomotor retardation or agitation on MSE","Flat or blunted affect; tearful","Poor eye contact, downcast gaze","Poverty of thought; slow, monosyllabic responses"],"investigations":{"bedside":["PHQ-9: score 0–4 minimal, 5–9 mild, 10–14 moderate, 15–19 moderately severe, 20–27 severe","Mental state examination (MSE) — assess cognition, thought content, risk","Suicide risk assessment — ideation, intent, plan, means, protective factors"],"bloods":["TFTs — exclude hypothyroidism as reversible organic cause","FBC — exclude anaemia","Serum calcium — hypercalcaemia can cause low mood","Fasting glucose — exclude diabetes-related mood disturbance"],"imaging":["CT/MRI head only if late-onset (>60 yrs), atypical features, or cognitive impairment to exclude organic cause (e.g. space-occupying lesion, vascular dementia)"]},"mx":["Mild depression: active monitoring, guided self-help, or low-intensity CBT — antidepressants not first line","Moderate–severe depression: SSRI (sertraline first choice) + psychological therapy (CBT); review within 1–2 weeks of starting medication","Treatment-resistant or severe/psychotic depression: consider augmentation (add antipsychotic or lithium), or referral to secondary care psychiatry"],"traps":["Review within 1 week if patient is <25 yrs or high suicide risk at initiation — SSRIs can transiently increase suicidality in early treatment","Never stop SSRIs abruptly — taper to avoid discontinuation syndrome (dizziness, electric-shock sensations, flu-like symptoms)","SSRI + NSAID (or aspirin) = significantly increased GI bleed risk — consider PPI cover","PHQ-9 ≥10 does not automatically mandate an SSRI — severity, patient preference, and safety must guide the decision"]},{"id":"gad","name":"Generalised anxiety disorder","system":"Psychiatry","presentation":["Persistent, excessive worry across multiple domains (work, health, finances) lasting >6 months","Difficult to control worry; patient recognises it as disproportionate","Somatic symptoms: palpitations, sweating, tremor, GI upset (nausea/diarrhoea)","Restlessness, fatigue, poor concentration, irritability, muscle tension, sleep disturbance"],"signs":["MSE: anxious or agitated affect, worry-focused thought content, preserved insight","Tachycardia and diaphoresis on autonomic examination","Hyperventilation (respiratory rate elevated, may cause tingling/tetany)","Tremor of outstretched hands; no thyroid goitre or exophthalmos (distinguishes from hyperthyroidism)"],"investigations":{"bedside":["GAD-7 questionnaire: score ≥10 suggests moderate-severe GAD","Mental state examination (MSE): assess affect, thought content, cognition, insight","Urine dip and BP to exclude phaeochromocytoma if episodic hypertension"],"bloods":["TFTs (TSH + free T4): hyperthyroidism is the key organic mimic — exclude before diagnosis","Fasting glucose: hypoglycaemia causes adrenergic symptoms mimicking anxiety","FBC + CRP: exclude anaemia (causes tachycardia/fatigue) and systemic illness","Caffeine and substance history (not a blood test but mandatory organic screen)"],"imaging":["ECG: exclude arrhythmia (SVT, AF) in patients with prominent palpitations","24-hour Holter monitor if paroxysmal palpitations persist with normal resting ECG","Imaging has limited role in GAD; CT/MRI only if focal neurological signs present"]},"mx":["Stepped care (NICE): Step 1 — psychoeducation and active monitoring; Step 2 — low-intensity CBT or guided self-help; Step 3 — high-intensity CBT or SSRI (sertraline first-line) or SNRI (venlafaxine)","Pregabalin: second-line pharmacological option (licensed for GAD); monitor for dependence","Avoid benzodiazepines long-term — short-term crisis use only (≤2–4 weeks); risk of tolerance and dependence"],"traps":["Always exclude hyperthyroidism (TSH) before diagnosing GAD — presentations overlap completely","Phaeochromocytoma causes episodic hypertension, sweating and palpitations — rare but dangerous to miss","Benzodiazepines are not first-line and must not be prescribed long-term; SSRI/CBT is the evidence-based approach","Pregabalin is second-line not first-line; also carries dependence potential and is a controlled drug (Schedule 3)"]},{"id":"serotonin-syndrome","name":"Serotonin syndrome","system":"Psychiatry","presentation":["Triad: altered mental status (agitation, confusion, restlessness) + autonomic instability + neuromuscular abnormalities","Onset within hours (usually <24 h) of starting, increasing dose, or adding a serotonergic drug","Autonomic features: tachycardia, hypertension, hyperthermia, diaphoresis, mydriasis","Neuromuscular features: clonus, hyperreflexia, tremor, myoclonus","Severity spectrum: mild (tremor + tachycardia) → life-threatening (hyperthermia >41°C, rhabdomyolysis, seizures)"],"signs":["Clonus — especially inducible ankle clonus and spontaneous clonus (pathognomonic feature in Hunter criteria)","Hyperreflexia — lower limbs > upper limbs","Diaphoresis and flushed skin","Tachycardia and hypertension on obs; hyperthermia (can be extreme)"],"investigations":{"bedside":["Observations: temperature (fever), HR (tachycardia), BP (hypertension), SpO2","Medication review: identify all serotonergic agents (SSRIs, SNRIs, TCAs, MAOIs, tramadol, linezolid, triptans, lithium, fentanyl, St John's Wort)","Hunter Criteria assessment: serotonergic drug + [spontaneous clonus / inducible clonus + agitation or diaphoresis / ocular clonus + agitation or diaphoresis / tremor + hyperreflexia / hypertonia + temp >38°C + ocular or inducible clonus]"],"bloods":["CK — elevated in moderate-severe disease; markedly raised if rhabdomyolysis","U&E — AKI secondary to rhabdomyolysis; electrolyte derangement","FBC and glucose — baseline; exclude infection or hypoglycaemia as contributory cause","Clotting screen — if severe, exclude DIC"],"imaging":["CT head — only to exclude intracranial cause (haemorrhage, encephalitis) if diagnosis uncertain or reduced GCS"]},"mx":["Stop all serotonergic drugs immediately","Supportive care: IV fluids, active cooling for hyperthermia, benzodiazepines (lorazepam/diazepam) for agitation and neuromuscular excitability","Cyproheptadine (serotonin antagonist) as antidote in moderate-severe cases; ITU for life-threatening hyperthermia or rhabdomyolysis"],"traps":["Distinguishing from NMS: serotonin syndrome = rapid onset (hours), clonus/hyperreflexia, serotonergic drug cause; NMS = slow onset (days-weeks), lead-pipe rigidity, dopamine-blocking drug cause (antipsychotics)","Tramadol + SSRI is a classic precipitant — tramadol inhibits serotonin reuptake and is a common co-prescription","Linezolid (antibiotic) is an MAOI and is serotonergic — combined with SSRIs causes serotonin syndrome","Hunter criteria (not Sternbach) are the validated diagnostic tool — clonus is the key discriminating sign"]},{"id":"acne","name":"Acne vulgaris","system":"Dermatology","presentation":["Comedones (open/closed), inflammatory papules, pustules, nodules or cysts on face, chest, and back","Onset typically puberty (12–18 yrs); can persist into adulthood, especially in women","Scarring (atrophic ice-pick/boxcar or hypertrophic keloid) with severe or inadequately treated disease","Significant psychological burden: low self-esteem, depression, social withdrawal — assess QoL (DLQI)"],"signs":["Open comedones (blackheads) and closed comedones (whiteheads) — non-inflammatory lesions","Inflammatory papules (red, <5 mm) and pustules (pus-filled) overlying comedones","Nodules (≥5 mm, deep, tender) and cysts (fluctuant, risk of scarring) in severe disease","Post-inflammatory hyperpigmentation and atrophic or hypertrophic scarring; distribution: face (especially T-zone), upper chest, upper back"],"investigations":{"bedside":["Clinical diagnosis — no routine investigations needed for typical presentation","Skin swabs (Gram stain + culture) only if atypical or treatment-resistant: exclude Gram-negative folliculitis (Klebsiella/Enterobacter) or Pityrosporum folliculitis"],"bloods":["Pregnancy test (serum β-hCG) — mandatory before and monthly during isotretinoin (Pregnancy Prevention Programme)","LFTs (ALT/AST) — baseline and 1 month after starting isotretinoin; hepatotoxicity risk","Fasting lipid profile (total cholesterol, triglycerides) — baseline and monitoring during isotretinoin; hypertriglyceridaemia risk","FBC — baseline before isotretinoin; testosterone, DHEAS, LH:FSH, 17-OHP if hormonal acne suspected in women (PCOS, CAH)"],"imaging":["Pelvic USS — if PCOS suspected (hormonal acne in women with irregular cycles, hirsutism)","No imaging required for routine acne diagnosis"]},"mx":["Mild (comedonal/few papulopustular): topical benzoyl peroxide (BPO) + topical retinoid (adapalene) ± topical antibiotic (clindamycin) — always pair antibiotic with BPO to limit resistance","Moderate (widespread papulopustular/mild nodular): add oral antibiotic (lymecycline or doxycycline) for maximum 3 months — never combine oral + topical antibiotic; always co-prescribe BPO; consider combined oral contraceptive (co-cyprindiol) in women","Severe/scarring/treatment-resistant: oral isotretinoin (vitamin A retinoid) — specialist-only prescribing, 16–24 week course; highly teratogenic — all female patients must be enrolled in Pregnancy Prevention Programme (2 forms of contraception, monthly pregnancy tests)"],"traps":["Isotretinoin is highly teratogenic (Category X) — all women of childbearing potential must complete the Pregnancy Prevention Programme (2 contraceptive methods, monthly pregnancy tests, dispensed in 30-day supplies only); never prescribe if pregnancy test positive","Never prescribe oral antibiotic plus topical antibiotic together — promotes antibiotic resistance; always pair any antibiotic (oral or topical) with benzoyl peroxide which has anti-resistance activity","Oral antibiotics should not be used for more than 3 months — resistance risk; reassess at 3 months and step up to isotretinoin if inadequate response rather than continuing antibiotics","Isotretinoin side effects frequently tested: teratogenicity, dry lips/skin/eyes (most common — prescribe emollients), raised triglycerides, deranged LFTs, possible mood changes/depression (monitor), contraindicated in pregnancy and breastfeeding"]},{"id":"eczema","name":"Eczema","system":"Dermatology","presentation":["Intense itch (cardinal symptom) — worse at night, disrupts sleep","Flexural distribution: antecubital/popliteal fossae, wrists, neck (adults); face/scalp/extensor surfaces (infants)","Triggers: soaps, detergents, heat, sweat, stress, certain fabrics","Personal or family history of atopy (asthma, hay fever, eczema)","Dry skin (xerosis) with episodic flares"],"signs":["Erythematous, lichenified plaques in flexural sites; excoriation marks","Dennie-Morgan folds (infraorbital skin folds) and allergic shiners","Infected eczema: weeping, crusted, honey-coloured exudate; may have satellite lesions (S. aureus)","In chronic disease: post-inflammatory hypo- or hyperpigmentation; skin thickening"],"investigations":{"bedside":["EASI or SCORAD severity score to guide treatment step","Skin swabs (MC&S) if secondary infection suspected — S. aureus commonest","Patch testing if allergic contact dermatitis suspected (distinct from atopic eczema)"],"bloods":["Total IgE — elevated in atopic eczema","FBC — eosinophilia supports atopic disease","Specific IgE (RAST) — identify relevant aeroallergens or food allergens if history suggests"],"imaging":["Skin biopsy only if diagnosis uncertain or malignancy (e.g. mycosis fungoides) needs exclusion"]},"mx":["Emollients: apply liberally and continuously (soap substitute + moisturiser) — cornerstone of all-step management","Topical corticosteroids: potency matched to severity and site (mild — hydrocortisone 1% for face; moderate — clobetasone; potent — betamethasone for lichenified plaques); use for flares only","Step up: topical calcineurin inhibitors (tacrolimus/pimecrolimus) for sensitive sites or steroid-sparing; dupilumab (IL-4/IL-13 inhibitor) for moderate-severe refractory eczema; short-course oral prednisolone bridging if severe acute flare"],"traps":["Eczema herpeticum: punched-out monomorphic vesicles/erosions on background eczema + systemic upset = dermatological emergency — admit, IV aciclovir, ophthalmology review if periorbital","Finger-tip unit (FTU) dosing: 1 FTU covers one hand area; failure to use adequate amounts of topical steroid is a common cause of inadequate control","Do not use potent steroids on the face or flexures long-term — atrophy, telangiectasia, striae risk","Steroid phobia in parents/patients leads to under-treatment; address directly and explain that short-course topical use at correct potency is safe"]},{"id":"anaphylaxis","name":"Anaphylaxis","system":"Emergency","presentation":["Rapid onset (seconds–minutes) after trigger exposure (food, drug, insect sting)","Urticaria and/or angioedema — erythematous wheals, swelling of lips/tongue/throat","Airway compromise — stridor (upper), wheeze (lower), sensation of throat tightening","Circulatory collapse — hypotension, syncope, dizziness","GI symptoms — nausea, vomiting, abdominal cramps (esp. food allergy)"],"signs":["Urticaria — raised erythematous wheals, widespread","Angioedema — non-pitting swelling of face, lips, tongue, uvula","Stridor — inspiratory noise indicating upper airway obstruction","Wheeze — expiratory, indicating bronchospasm","Hypotension + tachycardia — distributive shock","Flushing and generalised erythema"],"investigations":{"bedside":["Obs: continuous BP, HR, O2 sats, RR — clinical diagnosis; do not delay treatment for tests","Peak flow if able — bronchospasm severity","ECG — exclude arrhythmia if cardiovascular compromise"],"bloods":["Mast cell tryptase (MCT): 3 samples — at presentation (0 h), 1–2 h post-reaction, and convalescent (>24 h or follow-up); rise confirms mast cell degranulation","FBC — eosinophilia may support allergic diathesis (not acute diagnostic)","U&E/glucose — baseline; hypoglycaemia as alternative cause of collapse"],"imaging":["CXR — if aspiration suspected, significant bronchospasm, or failure to respond to treatment","Limited acute role — clinical diagnosis drives immediate management"]},"mx":["IM adrenaline 500 mcg (0.5 ml of 1:1,000) anterolateral thigh — adults and children >12 yrs; repeat every 5 min if no improvement (paediatric: <6mo 100–150 mcg, 6mo–6yr 150 mcg, 6–12yr 300 mcg)","High-flow O2 + IV crystalloid for hypotension; lie flat with legs raised (never sit up a shocked patient)","Non-sedating antihistamine (e.g. loratadine) for persisting urticaria/angioedema after stabilisation — NOT as substitute for adrenaline; IV hydrocortisone removed from 2021 Resus Council guidelines"],"traps":["Dose: 0.5 ml of 1:1,000 for adults — 1:10,000 is for IV use in cardiac arrest; using the wrong concentration underdoses by 10-fold","Adrenaline must be IM (anterolateral thigh), NOT IV — IV adrenaline outside resus causes fatal arrhythmias","Antihistamines and steroids do NOT treat anaphylaxis acutely — adrenaline is the only life-saving drug; hydrocortisone removed from 2021 guidelines entirely","Sitting up a shocked patient can precipitate cardiac arrest — lie flat + legs raised unless airway compromise forces upright","Biphasic reaction in up to 20%: observe ≥6 h after single dose, ≥12 h after 2 doses; prescribe 2 adrenaline auto-injectors on discharge + allergy clinic referral; tryptase elevated up to 12 h post-reaction"]},{"id":"opioid-od","name":"Opioid overdose","system":"Emergency","presentation":["Reduced consciousness or unresponsive","Slow or shallow respiratory rate (RR <12)","Pinpoint pupils (miosis)","Context: known opioid prescription, illicit drug use, or visible needle track marks","Found unresponsive or collapsed"],"signs":["Classic triad: coma + miosis + respiratory depression","Cyanosis (central, from hypoventilation)","Bradycardia and hypotension","Hypothermia (prolonged collapse)","Needle track marks on arms, groin, or feet"],"investigations":{"bedside":["Obs: RR <12, O2 sats (hypoxia), GCS (reduced)","BM — exclude hypoglycaemia as reversible cause of reduced consciousness","Urine drug screen — confirms opioid exposure"],"bloods":["ABG: type 2 respiratory failure (↑CO2, ↓O2, ↓pH — respiratory acidosis)","FBC/U&E/CK — if prolonged collapse, CK elevated in rhabdomyolysis","Paracetamol and salicylate levels — routine in all overdose presentations"],"imaging":["CXR: aspiration pneumonia if prolonged unconsciousness","CXR: non-cardiogenic pulmonary oedema (heroin-associated)"]},"mx":["IV or IM naloxone — opioid receptor antagonist; titrate dose to restore adequate respiratory rate (RR ≥12), not full consciousness","Repeated doses or IV infusion may be required — naloxone half-life (60–90 min) is shorter than most opioids","Supportive: airway positioning, high-flow O2, recovery position once responsive; admit for monitoring"],"traps":["Naloxone half-life (60–90 min) is shorter than most opioids → patient can re-sedate after initial response; must observe for at least 4 hours or use infusion","Do not over-reverse — precipitates acute opioid withdrawal (agitation, vomiting, hypertension) and removes analgesia in pain patients","Always check BM first — hypoglycaemia mimics opioid toxidrome and is immediately reversible","Methadone and buprenorphine have very long half-lives — prolonged naloxone infusion almost always needed"]},{"id":"paracetamol-od","name":"Paracetamol overdose","system":"Emergency","presentation":["Often asymptomatic in first 24h — deceptively well initially","Nausea and vomiting 0–24h post-ingestion","Right upper quadrant pain 24–72h (hepatocellular necrosis onset)","Jaundice, coagulopathy, encephalopathy if severe hepatotoxicity (72–96h)"],"signs":["RUQ tenderness (hepatic inflammation 24–72h)","Jaundice (hepatocellular failure >72h)","Signs of hepatic encephalopathy: confusion, asterixis, reduced GCS","Bruising or bleeding (coagulopathy — rising INR)"],"investigations":{"bedside":["Paracetamol level at 4h post-ingestion (or earliest opportunity >4h) — plot on treatment nomogram","BM (hypoglycaemia sign of hepatic failure)","ECG if co-ingestants suspected"],"bloods":["LFTs — ALT/AST peak at 72–96h, not day 1; early normal LFTs do not exclude developing hepatotoxicity","INR — key prognostic marker; rising INR indicates hepatic synthetic failure","U&E + creatinine — hepatorenal syndrome risk in severe cases","Venous blood gas — pH <7.3 after resuscitation = King's College criterion"],"imaging":["USS liver + portal vasculature if hepatotoxicity confirmed — assess liver architecture and vascularity","Limited acute diagnostic role for imaging in early overdose"]},"mx":["Activated charcoal if presentation <1h post-ingestion and dose >150mg/kg (or >75mg/kg in high-risk)","IV N-acetylcysteine (NAC) — replenishes glutathione; start if paracetamol level plots above treatment line on nomogram, or if staggered/unknown timing (treat empirically)","King's College criteria for urgent liver transplant referral: pH <7.3 after resuscitation OR all three of INR >6.5 + creatinine >300 µmol/L + grade III–IV encephalopathy"],"traps":["Staggered or unknown timing of ingestion — do NOT use nomogram; treat with NAC regardless of level","Patient appears well at 24h — early normalcy is classic trap; hepatotoxicity peaks 72–96h, not day 1","ALT/AST normal on presentation does not exclude serious overdose — repeat LFTs at 24h minimum","King's criteria: pH criterion alone is sufficient for referral; the triad (INR >6.5 + Cr >300 + grade III–IV encephalopathy) is the alternative — not all three needed if pH criterion met"]}];
let activeSystem='All';
function buildChips(){
  const systems=['All',...Object.keys(SYS)];
  document.getElementById('chips').innerHTML=systems.map(s=>`<button class="chip${s===activeSystem?' active':''}" onclick="filterSystem('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}
function filterSystem(sys){activeSystem=sys;buildChips();render();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function liList(items){return items?.length?'<ul>'+items.map(i=>`<li>${esc(i)}</li>`).join('')+'</ul>':'';}
function cardHtml(c){
  const col=SYS[c.system]||'#86868b';
  const inv=c.investigations||{};
  const invCols=[];
  if(inv.bedside?.length)invCols.push(`<div class="inv-col"><div class="inv-col-label">Bedside</div><ul>${inv.bedside.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`);
  if(inv.bloods?.length)invCols.push(`<div class="inv-col"><div class="inv-col-label">Bloods</div><ul>${inv.bloods.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`);
  if(inv.imaging?.length)invCols.push(`<div class="inv-col"><div class="inv-col-label">Imaging</div><ul>${inv.imaging.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`);
  const rows=[];
  if(c.presentation?.length)rows.push(`<div class="row"><div class="row-label">How they present</div>${liList(c.presentation)}</div>`);
  if(c.signs?.length)rows.push(`<div class="row"><div class="row-label">Examination findings</div>${liList(c.signs)}</div>`);
  if(invCols.length)rows.push(`<div class="row"><div class="row-label">Investigations</div><div class="inv-grid">${invCols.join('')}</div></div>`);
  if(c.mx?.length)rows.push(`<div class="row"><div class="row-label">First-line management</div>${liList(c.mx)}</div>`);
  const trapsHtml=c.traps?.length?`<div class="traps-box"><div class="traps-label">⚠ Exam traps</div><ul>${c.traps.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`:'';
  return `<details class="card" style="--card-c:${col}"><summary><div class="sum-left"><div class="sum-sys">${esc(c.system)}</div><div class="sum-name">${esc(c.name)}</div>${c.presentation?.length?`<div class="sum-preview">${esc(c.presentation[0])}</div>`:''}</div><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9,18 15,12 9,6"/></svg></summary><div class="body">${rows.join('')}${trapsHtml}</div></details>`;
}
function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const filtered=DATA.filter(c=>{
    if(activeSystem!=='All'&&c.system!==activeSystem)return false;
    if(!q)return true;
    const hay=[c.name,c.system,...(c.presentation||[]),...(c.signs||[]),...(c.mx||[]),...(c.traps||[]),...(c.investigations?.bedside||[]),...(c.investigations?.bloods||[]),...(c.investigations?.imaging||[])].join(' ').toLowerCase();
    return hay.includes(q);
  });
  document.getElementById('count').textContent=`${filtered.length} condition${filtered.length===1?'':'s'}`;
  document.getElementById('cards').innerHTML=filtered.map(cardHtml).join('');
}
document.getElementById('search').addEventListener('input',render);
buildChips();render();
</script>
