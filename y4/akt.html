<!DOCTYPE html>

<head>

<title>AKT · Oxford Y4</title>
<style>
  :root{
    --bg:#f5f5f7; --surface:#fff; --ink:#1d1d1f; --ink-2:#6e6e73; --ink-3:#86868b;
    --hair:#d2d2d7; --hair-soft:#e8e8ed; --accent:#0071e3;
    --radius:18px; --radius-sm:12px; --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 30px rgba(0,0,0,.06);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;letter-spacing:-.01em;padding-bottom:80px;}

  header{position:sticky;top:0;z-index:50;background:rgba(245,245,247,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--hair);}
  .bar{max-width:780px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:12px;}
  .back{font-size:14px;font-weight:500;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:3px;flex:none;}
  .back svg{width:16px;height:16px;flex:none;}
  .bar h1{font-size:17px;font-weight:600;flex:1;}

  .search-row{max-width:780px;margin:0 auto;padding:8px 22px 0;}
  .search-wrap{position:relative;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none;}
  #search{width:100%;padding:8px 13px 8px 34px;border:.5px solid var(--hair);border-radius:var(--radius-sm);background:var(--surface);font-size:14px;font-family:var(--font);color:var(--ink);outline:none;}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.12);}

  .chips-row{max-width:780px;margin:0 auto;padding:8px 22px 10px;}
  .chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:none;font-size:13px;font-weight:500;color:var(--ink-2);background:var(--surface);border:.5px solid var(--hair);padding:6px 14px;border-radius:980px;cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none;}
  .chip:hover{color:var(--ink);border-color:var(--ink-3);}
  .chip.active{color:#fff;background:var(--accent);border-color:transparent;}

  main{max-width:780px;margin:0 auto;padding:16px 22px 0;}
  .count{font-size:12.5px;color:var(--ink-3);margin-bottom:12px;font-weight:500;}

  .card{background:var(--surface);border:.5px solid var(--hair-soft);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);border-left:3px solid var(--card-c,var(--hair));}
  .card>summary{list-style:none;cursor:pointer;padding:16px 20px;display:flex;align-items:flex-start;gap:14px;}
  .card>summary::-webkit-details-marker{display:none;}
  .card>summary:hover{background:rgba(0,0,0,.012);}
  .sum-left{flex:1;min-width:0;}
  .sum-sys{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--card-c,var(--ink-3));margin-bottom:3px;}
  .sum-name{font-size:16px;font-weight:600;letter-spacing:-.015em;line-height:1.2;}
  .sum-preview{font-size:13px;color:var(--ink-2);margin-top:4px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chev{width:22px;height:22px;flex:none;color:var(--ink-3);transition:transform .28s cubic-bezier(.4,0,.2,1);}
  .card[open] .chev{transform:rotate(90deg);}

  .body{padding:0 20px 4px;}
  .row{border-top:.5px solid var(--hair-soft);padding:14px 0;}
  .row-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px;}
  .row ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .row li{font-size:14px;line-height:1.5;padding-left:16px;position:relative;color:var(--ink);}
  .row li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--card-c,var(--ink-3));}

  .inv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;}
  .inv-col-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px;}
  .inv-col ul{list-style:none;display:flex;flex-direction:column;gap:5px;}
  .inv-col li{font-size:13.5px;line-height:1.45;padding-left:15px;position:relative;color:var(--ink);}
  .inv-col li::before{content:"";position:absolute;left:2px;top:7px;width:4px;height:4px;border-radius:50%;background:var(--card-c,var(--ink-3));}

  .traps-box{background:#fff8e6;border:.5px solid #f5c842;border-radius:var(--radius-sm);padding:12px 15px;margin:14px 0 6px;}
  .traps-label{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#92400e;margin-bottom:6px;}
  .traps-box ul{list-style:none;display:flex;flex-direction:column;gap:5px;}
  .traps-box li{font-size:13.5px;line-height:1.45;padding-left:15px;position:relative;color:#78350f;}
  .traps-box li::before{content:"";position:absolute;left:2px;top:7px;width:4px;height:4px;border-radius:50%;background:#b45309;}

  footer{text-align:center;font-size:11.5px;color:var(--ink-3);padding:16px 22px 40px;max-width:780px;margin:0 auto;}
</style>
<script defer src="/_vercel/insights/script.js"></script>

<script>
const SYS={'Cardiology':'#e5484d','Respiratory':'#0091ff','Gastroenterology':'#f5a623','Endocrinology':'#f97316','Neurology':'#8b5cf6','Renal':'#06b6d4','Haematology':'#be185d','Infectious Disease':'#10b981','Rheumatology':'#6366f1','Obstetrics & Gynaecology':'#ec4899','Psychiatry':'#7c3aed','Dermatology':'#14b8a6','Emergency':'#ef4444'};
const DATA=[{"id":"af-anticoag","name":"AF - anticoagulation (stroke prevention)","system":"Cardiology","presentation":["AF diagnosed — asymptomatic or symptomatic; stroke risk assessment required at diagnosis","Previous TIA or stroke — highest risk group, anticoagulation clearly indicated"],"signs":["Neurological signs of prior embolic stroke — focal deficit, dysphasia","No signs specific to anticoagulation need — risk is determined by scoring, not examination"],"investigations":{"bedside":["ECG: confirm AF (absent P waves, irregular R-R) and not sinus rhythm with ectopics","BP: hypertension is a stroke risk factor (H in CHA2DS2-VASc) AND a bleeding risk factor (H in HAS-BLED)"],"bloods":["U&E and eGFR: renal function required to select and dose DOAC (apixaban/rivaroxaban dose-reduced in CKD); contraindication in severe renal failure","LFTs: hepatic impairment affects DOAC metabolism; warfarin requires INR monitoring","FBC: anaemia or thrombocytopenia as bleeding risk factors before anticoagulation"],"imaging":["Echo: valvular AF (mitral stenosis, mechanical valve) — mandates warfarin not DOAC; assess for LA thrombus"]},"mx":["CHA2DS2-VASc score — anticoagulate if score ≥2 in men or ≥3 in women (score ≥1/≥2 consider); do not anticoagulate score 0/1 in men","DOAC first-line (apixaban, rivaroxaban, dabigatran, edoxaban) — superior to warfarin for non-valvular AF; no routine INR monitoring needed","Warfarin — use ONLY for valvular AF (mitral stenosis, mechanical heart valve) where DOACs are contraindicated"],"traps":["Aspirin is NOT an acceptable alternative to anticoagulation for stroke prevention in AF — provides minimal benefit with similar bleeding risk; NICE explicitly recommends against antiplatelet monotherapy for AF stroke prevention","Paroxysmal AF carries the same stroke risk as persistent/permanent AF — CHA2DS2-VASc and anticoagulation decision applies equally"]},{"id":"stemi","name":"Acute coronary syndrome (STEMI)","system":"Cardiology","presentation":["Central crushing chest pain radiating to jaw/left arm, onset at rest, >20 min duration","Diaphoresis, nausea, vomiting — autonomic features distinguishing from stable angina","Sudden dyspnoea if large territory infarct causes acute LV dysfunction","Silent presentation in diabetics and elderly — present with syncope, acute HF, or confusion only"],"signs":["Tachycardia (compensatory) or bradycardia (inferior STEMI with vagal activation)","S3 gallop if significant LV impairment","New pansystolic murmur — papillary muscle rupture (MR) or VSD as mechanical complication","Hypotension with raised JVP in right ventricular infarction (inferior STEMI + RV involvement)"],"investigations":{"bedside":["ECG: ST elevation ≥1mm in ≥2 contiguous limb leads or ≥2mm in precordial leads — anterior STEMI in V1-V4, inferior in II/III/aVF, lateral in I/aVL/V5-V6","ECG: reciprocal ST depression in leads opposite to infarct territory (e.g. inferior STEMI → ST depression V1-V3)","ECG: new LBBB in context of chest pain — treat as STEMI equivalent","Obs: BP both arms to exclude aortic dissection before thrombolysis/PPCI"],"bloods":["Troponin I/T: rises 3-6h post-onset, peaks 12-24h, remains elevated 7-14d — use serial troponins at 0h and 3h","FBC: baseline; raised WCC from sterile infarct inflammation","U&E: baseline renal function before contrast for angiography","Lipid profile: total cholesterol, LDL — fasting sample, guides statin therapy"],"imaging":["CXR: pulmonary oedema (upper lobe diversion, interstitial shadowing) if large anterior STEMI with LV failure; normal CXR does not exclude STEMI","Echo (post-reperfusion): regional wall motion abnormality in affected territory, assess LVEF to guide prognosis and therapy"]},"mx":["Reperfusion — primary PCI within 120 min of first medical contact (preferred); thrombolysis if PCI unavailable within 120 min","Dual antiplatelet — aspirin + P2Y12 inhibitor (e.g. ticagrelor) to prevent stent thrombosis and re-infarction","Anticoagulation — unfractionated or low-molecular-weight heparin as adjunct to PCI"],"traps":["Posterior STEMI: no ST elevation — look for ST depression V1-V3 with tall R waves (mirror image); confirm with posterior leads V7-V9","Right ventricular infarction complicating inferior STEMI: hypotension responds to IV fluids NOT diuretics — giving nitrates/diuretics can precipitate profound hypotension"]},{"id":"hf-acute","name":"Acute heart failure / pulmonary oedema","system":"Cardiology","presentation":["Sudden onset severe dyspnoea at rest, often nocturnal — patient woken from sleep","Orthopnoea — cannot lie flat; prefers sitting upright or leaning forward","Pink frothy sputum — alveolar oedema with haemorrhagic tinge","Profound anxiety, sensation of drowning"],"signs":["Severe respiratory distress: tachypnoea, use of accessory muscles, unable to complete sentences","Bibasal coarse crackles extending to mid-zones or upper zones — alveolar flooding","S3 gallop and tachycardia — hyperdynamic circulation or failing ventricle","Cold peripheries, mottled skin — low output state (cardiogenic shock if BP also low)","Raised JVP, bilateral pitting oedema — fluid overload"],"investigations":{"bedside":["ECG: identify precipitant — AF with rapid ventricular rate, acute STEMI/NSTEMI, new LBBB, tachyarrhythmia","SpO2: hypoxia confirms diagnosis; target SpO2 ≥94%","BM: exclude hypoglycaemia as precipitant/comorbidity"],"bloods":["BNP/NT-proBNP: markedly elevated — confirms cardiac cause; useful when diagnosis uncertain vs respiratory cause of dyspnoea","Troponin: exclude ACS as precipitant of acute HF","U&E: baseline before diuresis; avoid over-diuresis causing AKI","ABG: type 1 respiratory failure (low PaO2, normal/low PaCO2); type 2 if exhausted"],"imaging":["CXR (portable/supine): cardiomegaly, bilateral perihilar bat-wing shadowing, upper lobe blood diversion, Kerley B lines at costophrenic angles, pleural effusions (blunted costophrenic angles)"]},"mx":["IV loop diuretic (furosemide) — promotes rapid fluid removal; reduces preload and pulmonary venous congestion","Oxygen — high-flow if SpO2 <94%; NIV (CPAP) if type 1 respiratory failure persisting on oxygen — reduces need for intubation","Treat precipitant — cardiovert AF, reperfuse STEMI, treat hypertensive crisis with vasodilators (GTN infusion)"],"traps":["Acute pulmonary oedema vs COPD exacerbation can both present with severe dyspnoea and crackles/wheeze — BNP and ECG are key differentiators; NIV is used in both but CPAP (no backup rate) preferred in pulmonary oedema, BiPAP in COPD","Avoid high-flow oxygen in patients with known COPD and CO2 retention — target SpO2 88-92% to avoid suppressing hypoxic drive"]},{"id":"af-rate-rhythm","name":"Atrial fibrillation - rate/rhythm","system":"Cardiology","presentation":["Palpitations — irregular, fast, may be episodic if paroxysmal AF","Dyspnoea, reduced exercise tolerance from loss of atrial kick reducing cardiac output","Fatigue, presyncope — especially with rapid ventricular rate","Incidental finding on pulse check — lone AF may be asymptomatic"],"signs":["Irregularly irregular pulse — hallmark; pulse deficit (apex faster than radial) with rapid AF","Tachycardia (ventricular rate typically 100-180 bpm if uncontrolled)","Signs of haemodynamic compromise: hypotension, pulmonary oedema — indicates urgent cardioversion"],"investigations":{"bedside":["ECG: absent P waves, irregularly irregular R-R intervals, fibrillatory baseline (best seen V1), narrow QRS unless aberrant conduction or pre-excitation (WPW)","ECG (WPW warning): broad irregular complexes at very rapid rate — delta waves, do NOT use AV-nodal blockers (digoxin, verapamil, adenosine) as they precipitate VF via accessory pathway"],"bloods":["TFTs: thyrotoxicosis is a reversible cause — TSH suppressed, raised fT4/fT3","FBC: anaemia as precipitant; infection causing AF exacerbation","U&E: electrolytes (hypokalaemia, hypomagnesaemia increase ectopy)","LFTs and alcohol markers: alcohol excess is major AF trigger"],"imaging":["Echo: LA size (dilated LA predicts recurrence after cardioversion), LV function, valvular disease (mitral stenosis → AF), exclude intracardiac thrombus before cardioversion"]},"mx":["Rate control (chronic AF or onset >48h) — beta-blocker or rate-limiting calcium channel blocker (diltiazem/verapamil) to target resting rate <110 bpm","Rhythm control (symptomatic or onset <48h with haemodynamic stability) — DC cardioversion or pharmacological cardioversion (flecainide if no structural heart disease, amiodarone if structural disease)","Haemodynamic instability → immediate synchronised DC cardioversion regardless of anticoagulation status"],"traps":["AF with WPW: broad complex rapid irregular rhythm — AV-nodal blockers (digoxin, verapamil, beta-blockers) are contraindicated; accelerate conduction via accessory pathway → VF","Cardioversion after >48h AF without anticoagulation risks thromboembolism — must anticoagulate ≥3 weeks before or perform TOE to exclude LA thrombus first"]},{"id":"bradycardia-pacing","name":"Bradycardia / when to pace","system":"Cardiology","presentation":["Syncope or pre-syncope — sudden loss of cardiac output during complete AV block or sinus arrest","Dizziness, lightheadedness on standing or exertion","Fatigue, reduced exercise tolerance — chronotropic incompetence","Palpitations from escape beats; patient may notice slow regular or irregular pulse"],"signs":["Bradycardia <60 bpm on pulse — confirm on ECG as rate and regularity","Cannon A waves in JVP — complete heart block with dissociated atrial and ventricular contraction","Variable S1 intensity — complete heart block (PR interval varies)","Hypotension if haemodynamically compromising bradycardia"],"investigations":{"bedside":["ECG: sinus bradycardia (P before every QRS, rate <60), 1st degree AV block (PR >200ms), 2nd degree Mobitz I (Wenckebach — PR lengthens then P dropped), 2nd degree Mobitz II (fixed PR, sudden P dropped — unstable, may progress to complete block), complete (3rd degree) AV block (P and QRS dissociated, escape rhythm <40 bpm)","ECG: pause identification — sinus arrest, SA exit block"],"bloods":["U&E: hyperkalaemia causes bradycardia, AV block, and widened QRS — K+ >6.5 with ECG changes is emergency","TFTs: hypothyroidism causes sinus bradycardia and conduction disease","Drug levels/history: beta-blockers, digoxin toxicity, rate-limiting CCBs as reversible causes"],"imaging":["Echo: structural heart disease (aortic stenosis, cardiomyopathy) as substrate for conduction disease; assess LV function before pacemaker decision"]},"mx":["Atropine IV — first-line for symptomatic bradycardia (increases SA node rate and AV conduction); ineffective in complete heart block with ventricular escape (no vagal tone at this level)","Temporary transvenous pacing — for haemodynamically compromising bradycardia not responding to atropine; bridge to permanent pacemaker","Permanent pacemaker — indicated for complete heart block, symptomatic Mobitz II, sinus node disease with symptoms; dual-chamber (DDD) maintains AV synchrony"],"traps":["Mobitz II is far more dangerous than Mobitz I (Wenckebach) — Wenckebach is often benign and vagally mediated; Mobitz II indicates infranodal disease and can progress unpredictably to complete heart block requiring permanent pacemaker","Atropine is ineffective and may worsen bradycardia in heart transplant patients (no vagal innervation) — use isoprenaline or pacing"]},{"id":"hf-chronic","name":"Chronic heart failure (HFrEF)","system":"Cardiology","presentation":["Progressive exertional dyspnoea — NYHA classification (I: no symptoms at normal activity → IV: symptoms at rest)","Orthopnoea — number of pillows needed; paroxysmal nocturnal dyspnoea","Ankle swelling, worse by evening — dependent oedema from venous hypertension","Fatigue, reduced exercise tolerance — low cardiac output and skeletal muscle deconditioning"],"signs":["Raised JVP — elevated venous pressure from fluid overload","Bibasal fine crackles — pulmonary oedema (may be absent in chronic compensated HF)","Pitting oedema bilateral to sacrum if bed-bound","S3 gallop (ventricular filling sound) — volume overloaded dilated ventricle","Displaced apex beat (lateral and inferiorly) — cardiomegaly from dilated LV"],"investigations":{"bedside":["ECG: LVH, LBBB (dyssynchrony — indicates CRT candidacy), AF (common precipitant/complication), Q waves (ischaemic aetiology)","Obs: SpO2 — oxygen saturations, resting tachycardia as compensatory mechanism"],"bloods":["BNP or NT-proBNP: elevated proportional to degree of LV dysfunction — NT-proBNP >400 pg/mL supports diagnosis; excellent negative predictive value if normal","U&E: renal function (cardiorenal syndrome); hyponatraemia suggests severe failure and poor prognosis","TFTs: thyroid disease as reversible cause","FBC: anaemia worsens symptoms and is a treatment target"],"imaging":["Echo: LVEF <40% defines HFrEF; dilated LV, regional wall motion abnormality (ischaemic) vs global (dilated cardiomyopathy); mitral regurgitation (functional)","CXR: cardiomegaly (cardiothoracic ratio >0.5), upper lobe blood diversion, Kerley B lines (interstitial oedema), bilateral perihilar haze — 'bat wing' appearance in acute decompensation"]},"mx":["ACE inhibitor (or ARB if intolerant) — reduces afterload and neurohormonal activation; improves mortality in HFrEF","Beta-blocker (bisoprolol/carvedilol) — reduces sympathetic drive; improves mortality; start low, uptitrate when clinically stable","Mineralocorticoid receptor antagonist (spironolactone/eplerenone) — add if symptoms persist despite ACEi + BB; monitor K+ and renal function"],"traps":["SGLT2 inhibitors (dapagliflozin, empagliflozin) now have evidence in HFrEF regardless of diabetes status — increasingly included as fourth pillar of HF therapy (Year 4 level awareness)","ACE inhibitor should not be started during acute decompensation — wait until euvolaemic and haemodynamically stable before introducing/uptitrating"]},{"id":"htn","name":"Hypertension","system":"Cardiology","presentation":["Usually asymptomatic — diagnosed incidentally on routine BP measurement","Headache (occipital, morning) — more common in severe/malignant hypertension","Epistaxis — associated but not specific","Hypertensive emergency: severe headache, visual changes, confusion, chest pain, focal neurology"],"signs":["BP ≥140/90 mmHg on two separate readings (clinic BP) — confirm with ABPM or home monitoring","Fundoscopy: AV nipping, silver wiring (chronic hypertensive changes); flame haemorrhages, papilloedema (grade III/IV — hypertensive emergency)","Signs of end-organ damage: LVH on ECG/echo, displaced apex beat, renal bruits (renovascular cause)"],"investigations":{"bedside":["ECG: LVH (Sokolow-Lyon: S in V1 + R in V5/V6 >35mm) — indicates end-organ damage, raises cardiovascular risk classification","Urine dip: proteinuria (renal damage), haematuria (renal parenchymal disease or renal artery stenosis as secondary cause)"],"bloods":["U&E: renal function (hypertensive nephropathy, renovascular cause — raised creatinine); hypokalaemia in primary hyperaldosteronism (Conn's syndrome)","Fasting glucose and HbA1c: diabetes as major cardiovascular risk modifier","Lipid profile: total cholesterol, LDL — cardiovascular risk calculation (QRISK)","TFTs: hyperthyroidism as secondary cause of hypertension"],"imaging":["Echo: LV mass (hypertrophy), diastolic dysfunction — more sensitive than ECG for LVH; also guides treatment if HF coexists","Renal USS: asymmetric kidneys (renovascular hypertension or chronic pyelonephritis), adult polycystic kidney disease"]},"mx":["Lifestyle — DASH diet, salt restriction, weight loss, aerobic exercise, alcohol reduction; first-line for stage 1 HTN with low CV risk","Antihypertensive drugs — step approach: <55 years start ACE inhibitor (or ARB); ≥55 years or Black ethnicity start calcium channel blocker; add diuretic (thiazide-like) as step 2","Target BP <140/90 mmHg (clinic) in most; <130/80 mmHg if established CVD, diabetes, or CKD with proteinuria"],"traps":["Hypertensive emergency (BP >180/120 + end-organ damage: papilloedema, encephalopathy, AKI) — do NOT lower BP rapidly; gradual reduction over 24-48h to avoid watershed ischaemia and stroke","White-coat hypertension is common — always confirm with ABPM (ambulatory blood pressure monitoring) or home readings before diagnosing and treating"]},{"id":"nstemi","name":"NSTEMI / unstable angina","system":"Cardiology","presentation":["Chest pain at rest or on minimal exertion, lasting >10 min, not fully relieved by GTN","New-onset angina (within 4 weeks) or crescendo pattern — increasing frequency/severity/duration","Dyspnoea, fatigue as anginal equivalents, especially in women and diabetics","Epigastric pain with nausea — inferior territory ischaemia mimicking GI pathology"],"signs":["Often no abnormal signs at rest — examination used to identify complications and rule out differentials","Transient S3 or new MR murmur during ischaemic episode","Signs of heart failure if large territory or haemodynamic compromise"],"investigations":{"bedside":["ECG: ST depression (horizontal or downsloping ≥0.5mm) or T-wave inversion in ischaemic territory — does NOT show ST elevation","ECG: may be entirely normal — a normal ECG does not exclude NSTEMI; repeat during pain"],"bloods":["High-sensitivity troponin I/T: detectable within 1-2h; serial 0h and 1h or 0h and 3h protocol; elevation distinguishes NSTEMI from unstable angina (UA has no troponin rise)","FBC: anaemia as precipitant of demand ischaemia","U&E and eGFR: renal function before anticoagulation and contrast","BNP/NT-proBNP: elevated if ischaemia has caused LV dysfunction — prognostic value"],"imaging":["CXR: exclude pulmonary oedema and alternative diagnoses (pneumothorax, aortic widening)","Echo: regional wall motion abnormality if significant ischaemia; baseline LVEF for risk stratification"]},"mx":["Dual antiplatelet — aspirin + P2Y12 inhibitor (ticagrelor/clopidogrel) immediately; reduces re-infarction risk","Anticoagulation — LMWH or fondaparinux for anti-thrombotic effect while awaiting risk stratification","Risk stratification with GRACE score — high-risk (score >140) → early invasive strategy (coronary angiography within 72h)"],"traps":["Normal ECG at rest is common in NSTEMI — must repeat during pain; diagnosis rests on troponin kinetics not ECG","Unstable angina and NSTEMI are managed identically initially — the distinction is troponin rise (NSTEMI) vs no rise (UA)"]},{"id":"copd-acute","name":"Acute COPD exacerbation","system":"Respiratory","presentation":["Acute worsening dyspnoea beyond normal day-to-day variation","Increased sputum volume and/or purulence — suggests infective trigger (commonest: Haemophilus influenzae, Streptococcus pneumoniae, Moraxella catarrhalis)","Cough worsening — may produce green/yellow sputum","Wheeze, confusion (CO2 retention) in severe exacerbation"],"signs":["Tachypnoea, tachycardia — markers of severity","Use of accessory muscles, paradoxical breathing — impending respiratory failure","Central cyanosis — severe hypoxaemia","Asterixis (CO2 retention flap) — confirms hypercapnic respiratory failure","Right heart failure signs: raised JVP, peripheral oedema — cor pulmonale exacerbated"],"investigations":{"bedside":["SpO2: target 88-92% in COPD exacerbation to avoid suppressing hypoxic drive; NOT 94-98%","Peak flow: less useful than spirometry in COPD but may guide severity assessment"],"bloods":["ABG: essential — PaO2 <8kPa (hypoxaemia), raised PaCO2 (hypercapnia), low pH (acidosis) in type 2 failure; pH <7.26 or worsening on controlled oxygen → NIV","FBC: raised WBC and CRP suggest bacterial infection — guides antibiotic decision","U&E: theophylline toxicity risk if used; hypokalaemia from bronchodilators","Blood cultures: if pyrexial — gram-negative bacteria particularly important in severe exacerbation"],"imaging":["CXR: exclude pneumothorax (in emphysematous bullous disease), consolidation (infective exacerbation/pneumonia), pneumomediastinum; assess cardiac size for cor pulmonale"]},"mx":["Controlled oxygen (24-28% Venturi) — target SpO2 88-92%; avoid high-flow oxygen causing CO2 retention and respiratory acidosis","Short-acting bronchodilators — salbutamol + ipratropium nebulisers; driven by air (not high-flow O2) unless severe hypoxia","NIV (BiPAP) — for type 2 respiratory failure (pH <7.35, PaCO2 >6kPa) not responding to medical therapy; reduces intubation rate and mortality"],"traps":["High-flow oxygen in COPD with CO2 retention worsens hypercapnia — mechanism: Haldane effect (O2 displaces CO2 from haemoglobin), loss of hypoxic drive, V/Q mismatch worsening; always use controlled oxygen","Not all COPD exacerbations need antibiotics — purulent sputum or consolidation on CXR is the indication; viral exacerbations (commonest trigger) do not benefit from antibiotics"]},{"id":"asthma-acute","name":"Acute asthma exacerbation","system":"Respiratory","presentation":["Sudden worsening dyspnoea and wheeze not responding to repeated SABA doses","Unable to complete sentences (moderate-severe), unable to speak (life-threatening)","Cough worse at night; accessory muscle use","Precipitants: URTI, allergen exposure, stopping ICS, beta-blocker prescription"],"signs":["Moderate: PEFR 50-75% of best/predicted, SpO2 ≥92%, able to talk","Severe: PEFR 33-50%, RR ≥25/min, HR ≥110 bpm, unable to complete sentences","Life-threatening: PEFR <33%, SpO2 <92%, silent chest (no wheeze = no air entry), cyanosis, bradycardia, confusion, exhaustion","Silent chest is an ominous sign — severe obstruction with no airflow, not improvement"],"investigations":{"bedside":["Peak expiratory flow (PEF): % of personal best or predicted — defines severity; repeat after bronchodilator to assess response","SpO2: <92% indicates severe/life-threatening; target ≥94-98%","ECG: sinus tachycardia expected; exclude arrhythmia if very tachycardic"],"bloods":["ABG: initially low PaCO2 (hyperventilation); normal or rising PaCO2 in life-threatening attack indicates fatigue and impending respiratory arrest — even 'normal' CO2 in acute asthma is alarming","U&E: hypokalaemia from repeated salbutamol nebulisers (beta-2 shifts K+ intracellularly) — monitor and replace"],"imaging":["CXR: exclude pneumothorax (life-threatening complication of severe asthma), lobar collapse from mucus plugging, consolidation as precipitant"]},"mx":["High-dose SABA (salbutamol) nebulisers back-to-back — bronchodilation; driven by oxygen in severe/life-threatening","Systemic corticosteroids (oral prednisolone or IV hydrocortisone) — reduces airway inflammation; onset 4-6h; give early in all moderate/severe attacks","Ipratropium bromide nebulisers — add to salbutamol in moderate-severe attack; additive bronchodilation via anticholinergic mechanism"],"traps":["Normal PaCO2 in acute asthma is a red flag — patient should be hypocapnic from hyperventilation; normalising CO2 means tiring and approaching respiratory failure; prepare for ICU","Do NOT prescribe beta-blockers to asthmatic patients — even 'cardioselective' beta-blockers can precipitate fatal bronchospasm"]},{"id":"asthma-chronic","name":"Asthma - chronic","system":"Respiratory","presentation":["Episodic wheeze — variable, worse at night and early morning; characteristic diurnal pattern","Breathlessness and chest tightness — triggered by allergens, cold air, exercise, NSAIDs, beta-blockers","Dry cough — may be the only symptom in cough-variant asthma","Atopic history: eczema, allergic rhinitis, family history of atopy"],"signs":["Expiratory wheeze on auscultation — polyphonic, bilateral","Hyperinflated chest in chronic poorly controlled asthma — barrel chest, increased AP diameter","May be normal between attacks — variable nature of obstruction is key diagnostic feature"],"investigations":{"bedside":["Peak flow: diurnal variation >20% (morning vs evening) on serial measurements over 2 weeks — confirms reversible obstruction","Peak flow: ≥15% improvement after bronchodilator (SABA) — demonstrates reversibility","Spirometry: obstructive pattern (FEV1/FVC <0.70), reversible with bronchodilator (≥12% and ≥200mL improvement in FEV1)"],"bloods":["FBC: eosinophilia (>0.4 × 10⁹/L) — Type 2 inflammatory pattern; guides biological therapy","Total IgE and specific allergen IgE (RAST): elevated in allergic/extrinsic asthma; identifies triggers","FeNO (fractional exhaled nitric oxide): >40 ppb indicates eosinophilic airway inflammation — supports asthma diagnosis and predicts steroid response"],"imaging":["CXR: often normal; hyperinflation in severe/chronic disease; exclude alternative diagnoses (pneumothorax, lobar collapse, foreign body)"]},"mx":["Step 1: SABA (short-acting beta-2 agonist e.g. salbutamol) reliever PRN — for symptom relief; using >3x/week indicates need to step up","Step 2: Add inhaled corticosteroid (ICS) — reduces airway inflammation; prevents exacerbations; mainstay of maintenance therapy","Step 3: Add LABA (long-acting beta-2 agonist e.g. salmeterol) to ICS — combined ICS/LABA; never LABA alone in asthma (increased mortality without ICS)"],"traps":["LABA must never be prescribed as monotherapy in asthma (without ICS) — associated with increased asthma deaths; always combined inhaler","NSAIDs and aspirin are contraindicated in aspirin-exacerbated respiratory disease (AERD/Samter's triad): asthma + nasal polyps + aspirin sensitivity"]},{"id":"copd-stable","name":"COPD - stable","system":"Respiratory","presentation":["Chronic productive cough — persistent, daily, often worse in mornings (bronchitis component)","Progressive exertional dyspnoea — insidious onset over years; often dismissed as 'getting old'","Wheeze — expiratory; less variable than asthma","Smoking history ≥20 pack-years — essential exposure history; also occupational dust/fumes"],"signs":["Barrel chest — increased AP diameter from air trapping; hyperinflation","Pursed lip breathing — auto-PEEP to prevent small airway collapse on expiration","Use of accessory muscles (sternomastoid, scalenes) at rest in severe COPD","Quiet breath sounds bilaterally — hyperinflation reduces transmission","Polyphonic wheeze and prolonged expiratory phase"],"investigations":{"bedside":["Spirometry (post-bronchodilator): FEV1/FVC <0.70 confirms airflow obstruction; FEV1 % predicted grades severity (GOLD 1 ≥80%, GOLD 2 50-79%, GOLD 3 30-49%, GOLD 4 <30%)","SpO2 at rest and on exertion — desaturation on exercise indicates need for LTOT assessment"],"bloods":["FBC: secondary polycythaemia (raised Hb/haematocrit) from chronic hypoxaemia stimulating erythropoietin","Alpha-1 antitrypsin level: if onset <45 years, non-smoker, or family history — deficiency causes panacinar basal emphysema","ABG: type 2 respiratory failure (elevated PaCO2 + low PaO2) in severe disease — confirms CO2 retention before LTOT prescription"],"imaging":["CXR: hyperinflation (>6 anterior ribs in midclavicular line, flat hemidiaphragms, increased retrosternal space), bullae, hyperlucent lung fields — emphysema pattern","HRCT chest: panacinar emphysema (lower lobes — alpha-1-AT deficiency) vs centrilobular (upper lobes — smoking); identifies bullae, excludes lung cancer"]},"mx":["Smoking cessation — single most effective intervention; slows FEV1 decline regardless of disease severity","SABA (salbutamol) +/- SAMA (ipratropium) PRN reliever — symptomatic bronchodilation","LAMA (long-acting muscarinic antagonist, e.g. tiotropium) — maintenance bronchodilator; reduces exacerbations and improves quality of life in GOLD 2+"],"traps":["ICS alone is not recommended in COPD (unlike asthma) — only add ICS as third agent with dual bronchodilator (LABA+LAMA) in frequent exacerbators with eosinophils ≥300; risk of pneumonia","Long-term oxygen therapy (LTOT) is only beneficial in COPD if PaO2 ≤7.3 kPa on two ABGs 3 weeks apart when stable — does not improve symptoms but extends survival"]},{"id":"cap","name":"Community-acquired pneumonia","system":"Respiratory","presentation":["Productive cough — purulent sputum, occasionally rust-coloured (Streptococcus pneumoniae)","Fever, rigors, pleuritic chest pain (sharp, worse on inspiration and cough)","Dyspnoea — severity proportional to extent of consolidation","Confusion — especially in elderly; may be the only presenting symptom (atypical presentation)"],"signs":["Dullness to percussion over affected lobe — consolidated airless lung","Increased tactile vocal fremitus and vocal resonance over consolidation (whispered pectoriloquy)","Bronchial breathing — tubular quality, equal inspiratory and expiratory phases, over consolidation","Coarse crackles in affected area","Tachycardia, tachypnoea, fever — systemic inflammatory response"],"investigations":{"bedside":["SpO2: hypoxaemia correlates with severity; SpO2 <92% indicates severe pneumonia requiring hospital admission","Urine dip: Legionella urinary antigen (collected early — positive in first week, remains positive up to 3 months; detects serogroup 1 only)"],"bloods":["CRP: markedly elevated (typically >100 mg/L in bacterial CAP); used in CURB-65 scoring and monitoring treatment response","WBC: neutrophilia in bacterial pneumonia; lymphopenia in viral/atypical","U&E: urea >7 mmol/L is a CURB-65 severity marker; hyponatraemia in Legionella pneumonia","Blood cultures: taken before antibiotics in moderate-severe CAP; positive in ~10-20%"],"imaging":["CXR: lobar or segmental consolidation — homogeneous opacification with air bronchograms (air in bronchi visible against opaque consolidated lung); may lag 24-48h behind clinical presentation","CXR: bilateral patchy consolidation — atypical organisms (Mycoplasma, Legionella, viral); parapneumonic effusion (blunted costophrenic angle) indicates complicated pneumonia"]},"mx":["Antibiotics guided by severity (CURB-65 score: 0-1 = mild → oral amoxicillin; 2 = moderate → oral amoxicillin + clarithromycin; ≥3 = severe → IV co-amoxiclav + clarithromycin)","Supplemental oxygen — target SpO2 94-98% (88-92% if coexistent COPD)","Physiotherapy and adequate hydration — promotes sputum clearance; fluid resuscitation if septic"],"traps":["Atypical organisms (Mycoplasma, Chlamydophila, Legionella) do not respond to beta-lactam antibiotics alone — always add a macrolide (clarithromycin) for moderate-severe CAP or atypical features","Failure to improve after 48-72h on antibiotics — consider parapneumonic effusion/empyema (needs USS ± pleural aspiration), resistant organism, alternative diagnosis (PE, lung cancer with post-obstructive pneumonia)"]},{"id":"pe","name":"Pulmonary embolism","system":"Respiratory","presentation":["Acute dyspnoea — sudden onset at rest, often without clear precipitant","Pleuritic chest pain — suggests peripheral PE with pulmonary infarction (pleural irritation)","Haemoptysis — usually small volume, suggests pulmonary infarction","Risk factors: recent surgery/immobility, long-haul flight, malignancy, OCP, pregnancy, prior VTE, thrombophilia"],"signs":["Tachycardia and tachypnoea — most sensitive signs; tachycardia >100 bpm in majority","Hypoxia — SpO2 reduced; may maintain SpO2 at rest but desaturate on exertion","Signs of DVT: unilateral calf tenderness, swelling, erythema — present in ~30%","Massive PE: hypotension, syncope, raised JVP (right heart strain), loud P2 — haemodynamic compromise"],"investigations":{"bedside":["ECG: sinus tachycardia (commonest); S1Q3T3 pattern (S wave lead I, Q wave and T inversion lead III) — specific but insensitive; right heart strain: RBBB, right axis deviation, T-wave inversion V1-V4","SpO2: hypoxia at rest or desaturation on exertion"],"bloods":["D-dimer: elevated (>500 ng/mL) — high sensitivity, low specificity; use only if pre-test probability LOW (Wells ≤4); negative D-dimer effectively excludes PE in low probability; NOT useful if high probability","ABG: type 1 respiratory failure (low PaO2, low PaCO2 from hyperventilation), raised A-a gradient","Troponin and BNP: elevated in massive/submassive PE from right heart strain — prognostic markers"],"imaging":["CTPA (CT pulmonary angiogram): gold standard — filling defect within pulmonary artery; shows clot burden, right heart strain (RV:LV ratio >0.9); also identifies alternative diagnoses","CXR: often normal (most important role is to exclude alternative diagnoses); classic but rare signs: Hampton's hump (wedge-shaped peripheral opacity from infarction), Westermark sign (oligaemia distal to embolus)"]},"mx":["Anticoagulation — immediate LMWH or DOAC (apixaban or rivaroxaban — weight-based initial dose); prevents clot propagation and allows endogenous fibrinolysis","Duration of anticoagulation — provoked PE (transient risk factor): 3 months; unprovoked PE: ≥3-6 months, consider indefinite; active cancer: LMWH or DOAC for duration of cancer treatment","Massive PE with haemodynamic instability — systemic thrombolysis (alteplase) or surgical/catheter embolectomy; risks of thrombolysis (major bleeding) must be weighed against mortality risk"],"traps":["D-dimer is only useful when pre-test probability is LOW — a positive D-dimer in a high-probability patient adds nothing and should not delay CTPA; and D-dimer is elevated in many conditions (sepsis, malignancy, pregnancy, post-surgery)","Massive PE with hypotension: do NOT give aggressive IV fluids — right heart is already dilated and volume loading worsens RV failure and shifts interventricular septum (D-sign on echo) impairing LV filling"]},{"id":"tb","name":"Pulmonary tuberculosis","system":"Respiratory","presentation":["Chronic productive cough >3 weeks, often with haemoptysis","Systemic B symptoms: drenching night sweats, fever, weight loss, fatigue","Risk factors: TB contact, immunosuppression (HIV, steroids), origin from high-prevalence country, homelessness, prison","May be incidental finding on CXR in asymptomatic patient — screen contacts"],"signs":["Often no specific signs in early disease","Cachexia and lymphadenopathy in advanced or disseminated disease","Apical crackles or bronchial breathing — cavitating upper lobe disease","Signs of extrapulmonary TB: lymphadenopathy, spinal tenderness (Pott's disease), meningism"],"investigations":{"bedside":["Sputum microscopy: acid-fast bacilli (ZN stain) — 3 early morning samples; positive confirms active TB","Sputum culture (gold standard): Mycobacterium tuberculosis — takes 2–6 weeks","Tuberculin skin test (Mantoux) — positive suggests exposure/infection; false negative if immunosuppressed"],"bloods":["IGRA (interferon-gamma release assay — e.g. QuantiFERON): preferred over Mantoux for latent TB screening; not affected by BCG","HIV test: all patients with TB must be offered HIV testing","LFTs/FBC: baseline before starting hepatotoxic drugs (rifampicin, isoniazid, pyrazinamide)"],"imaging":["CXR: upper lobe consolidation/cavitation, fibrosis, calcified Ghon focus — apical shadowing is classic","CT chest: confirms extent, detects miliary pattern (1–2 mm nodules throughout both lungs)","CT/MRI spine if Pott's disease suspected: vertebral destruction, paraspinal abscess"]},"mx":["Initial phase 2 months: RIPE — Rifampicin + Isoniazid + Pyrazinamide + Ethambutol (4-drug regimen; ethambutol added routinely since 2006 NICE guidelines)","Continuation phase 4 months: Rifampicin + Isoniazid only (2 drugs, total 6 months treatment)","Latent TB: 3 months isoniazid + rifampicin OR 6 months isoniazid alone (both with pyridoxine)"],"traps":["Drug SE — Rifampicin: orange secretions, hepatitis, flu-like symptoms, potent enzyme INDUCER (↓ OCP, warfarin, antiretrovirals — use alternative contraception)","Drug SE — Isoniazid: peripheral neuropathy (prevent with pyridoxine/B6), hepatitis, agranulocytosis; enzyme INHIBITOR (opposite to rifampicin)","Drug SE — Pyrazinamide: hyperuricaemia/gout, arthralgia, myalgia, hepatitis; Drug SE — Ethambutol: optic neuritis — check visual acuity BEFORE and DURING treatment","All of rifampicin, isoniazid and pyrazinamide are hepatotoxic — check LFTs at baseline and monitor; stop drugs if symptomatic hepatitis","Immune reconstitution inflammatory syndrome (IRIS): occurs 3–6 weeks after starting treatment; presents with enlarging lymph nodes — do not mistake for treatment failure","DOT (directly observed therapy) = 3× per week regimen; indicated for homeless, poor concordance, all prisoners","TB meningitis: minimum 12 months treatment (not 6), add dexamethasone","Notifiable disease — must report to Public Health; contact tracing required"]},{"id":"cdiff","name":"C. difficile","system":"Gastroenterology","presentation":["Profuse watery diarrhoea (≥3 loose stools/24h), often offensive-smelling","Lower abdominal cramping pain","Fever and systemic upset","Recent antibiotic exposure (classically clindamycin, cephalosporins, fluoroquinolones, co-amoxiclav)","Healthcare or care-home exposure within preceding 12 weeks"],"signs":["Diffuse lower abdominal tenderness on palpation","Abdominal distension (raises concern for toxic megacolon)","Fever and tachycardia indicating systemic sepsis","Signs of dehydration: dry mucous membranes, reduced skin turgor, postural hypotension"],"investigations":{"bedside":["Stool sample: glutamate dehydrogenase (GDH) antigen screen — sensitive for C. difficile presence; if positive proceed to toxin","Stool toxin EIA (toxin A/B): confirms toxin-producing strain; high specificity, lower sensitivity — negative toxin with positive GDH = non-toxigenic or send for NAAT","Stool NAAT/PCR: most sensitive for toxin genes; use if GDH positive but toxin negative","Observations: HR, BP, temperature, respiratory rate — severity scoring (WCC >15, creatinine rise, fever >38.5°C = severe)"],"bloods":["FBC: leucocytosis (WCC >15 × 10⁹/L indicates severe disease)","U&Es: acute kidney injury from dehydration; rising creatinine is a severity marker","CRP: elevated, correlates with inflammation; very high (>150) suggests severe/complicated disease","Serum lactate: elevated in toxic megacolon or septic shock — triggers urgent surgical review"],"imaging":["AXR: colonic dilatation >6 cm (transverse colon) indicates toxic megacolon; mucosal oedema ('thumbprinting')","CT abdomen/pelvis (if severe or deteriorating): pancolitis, pericolic fat stranding, colonic wall thickening, perforation","AXR or CT showing colonic diameter >9 cm (caecum) = surgical emergency"]},"mx":["Stop implicated antibiotic if clinically safe to do so — reduces ongoing C. difficile proliferation","Oral vancomycin (glycopeptide) — now first-line over metronidazole for all episodes; poorly absorbed so achieves high intraluminal concentration targeting C. difficile directly","Fidaxomicin (macrocyclic antibiotic) — preferred over vancomycin for first recurrence or high recurrence risk; narrower spectrum, lower recurrence rate","IV metronidazole (nitroimidazole) added if ileus or toxic megacolon prevents enteral drug delivery; oral metronidazole no longer first-line for initial episode","Faecal microbiota transplant (FMT) — for multiply recurrent C. difficile; restores colonisation resistance","Surgical colectomy (subtotal) reserved for toxic megacolon with perforation or failure to respond to maximal medical therapy"],"traps":["Metronidazole is no longer first-line — vancomycin oral is now recommended first-line for initial and severe episodes per UK guidelines; using metronidazole first is a common exam error","A positive GDH antigen alone does not confirm toxigenic infection — toxin EIA or NAAT is required; GDH is a screening test only","Antidiarrhoeal agents (loperamide) are contraindicated — they reduce gut motility, increasing toxin retention and risk of toxic megacolon","Proton pump inhibitors are an independent risk factor for C. difficile acquisition; review and discontinue if not essential","Recurrence (within 8 weeks) is common (~20%) and is not treatment failure — it requires repeat testing and escalation to fidaxomicin or FMT, not simply re-treating with the same agent"]},{"id":"colorectal-cancer","name":"Colorectal cancer","system":"Gastroenterology","presentation":["Change in bowel habit (looser/more frequent) >4 weeks, especially in older patients","Rectal bleeding — fresh blood mixed with stool or on paper (right-sided may cause occult bleeding only)","Iron deficiency anaemia — occult blood loss from right-sided tumours","Mass on PR examination or palpable abdominal mass","Positive FIT (faecal immunochemical test) on bowel cancer screening — often asymptomatic at detection"],"signs":["Abdominal mass — palpable tumour, particularly right-sided","PR: mass, blood on glove","Signs of obstruction: distension, tympany, high-pitched bowel sounds","Hepatomegaly or jaundice if liver metastases"],"investigations":{"bedside":["FIT (faecal immunochemical test): screening test; threshold ≥10 μg Hb/g triggers colonoscopy referral","PR examination: mandatory in all suspected colorectal cancer"],"bloods":["CEA (carcinoembryonic antigen): staging and surveillance marker — not diagnostic (low sensitivity); elevated CEA at diagnosis = worse prognosis","FBC: iron deficiency anaemia (microcytic, ↓ferritin) — classic presentation of right-sided colon cancer","LFTs: elevated ALP/bilirubin if liver metastases"],"imaging":["CT chest/abdomen/pelvis: staging for all newly diagnosed CRC — lymph nodes, liver, lung metastases","Colonoscopy: gold standard for diagnosis and biopsy; entire colon must be evaluated","MRI pelvis: mandatory for rectal cancers below peritoneal reflection — assesses mesorectal fascia clearance and guides neoadjuvant therapy"]},"mx":["Surgery (only curative option): resection based on tumour location and blood supply — see location table in traps","Rectal cancer: neoadjuvant chemoradiotherapy (short-course radiotherapy or long-course CRT) before TME surgery to downstage and reduce local recurrence","Adjuvant/palliative chemotherapy: FOLFOX or FOLFIRI regimens; targeted agents for metastatic disease — bevacizumab (anti-VEGF) or cetuximab (anti-EGFR, RAS wild-type only)"],"traps":["Surgery by location (must memorise): Caecum/ascending/proximal transverse → RIGHT hemicolectomy (ileo-colic anastomosis) | Distal transverse/descending → LEFT hemicolectomy (colo-colic) | Sigmoid → high anterior resection | Upper rectum → anterior resection + TME | Low rectum → low anterior resection + low TME ± defunctioning stoma | Anal verge → abdomino-perineal excision of rectum (APER) — permanent colostomy, no anastomosis","Hartmann's procedure = emergency sigmoid resection + end colostomy (no anastomosis) — used when bowel perforated; colostomy can be reversed later","Extended right hemicolectomy covers caecum to splenic flexure — not appropriate for distal transverse (left hemi is correct); transverse colectomy only for central transverse lesions","MRI mesorectum is mandatory for rectal cancers — determines whether circumferential resection margin is threatened and whether neoadjuvant treatment is needed","CEA is not a screening test — used for post-operative surveillance to detect recurrence; rising CEA post-resection = recurrence until proven otherwise","HNPCC (Lynch syndrome) family: consider panproctocolectomy rather than segmental resection due to high metachronous cancer risk"]},{"id":"crohn-induce","name":"Crohn's disease","system":"Gastroenterology","presentation":["Crampy right iliac fossa pain (terminal ileum most common site)","Diarrhoea — often without blood (unlike UC), may be steatorrhoeic if ileal disease","Weight loss and malnutrition (malabsorption + anorexia)","Perianal disease: fistulae, skin tags, abscesses","Extraintestinal: erythema nodosum, uveitis, primary sclerosing cholangitis (less common than UC), seronegative arthropathy"],"signs":["Right iliac fossa mass or tenderness (inflamed/matted terminal ileum)","Perianal fistulae, skin tags, or anal fissures on inspection","Mouth: aphthous ulcers (cobblestoning of oral mucosa)","Cachexia and pallor — reflecting chronic malabsorption and anaemia"],"investigations":{"bedside":["Stool MC&S — exclude infective cause (Clostridioides difficile, Campylobacter) before diagnosing flare","Faecal calprotectin — elevated (>250 µg/g); useful to distinguish IBD from IBS and to monitor activity"],"bloods":["FBC: normocytic or macrocytic anaemia (B12/folate malabsorption from ileal disease); thrombocytosis in active disease","CRP and ESR: elevated — markers of systemic inflammation and disease activity","LFTs + albumin: hypoalbuminaemia reflects malnutrition/protein-losing enteropathy","B12 and folate: low B12 specific to terminal ileal Crohn's; folate low if proximal small bowel involved or methotrexate used"],"imaging":["Colonoscopy + biopsy: skip lesions (discontinuous inflammation) with deep rose-thorn ulcers, cobblestoning of mucosa, and rectal sparing; biopsy shows transmural inflammation and non-caseating granulomas","MRI enterography (MRE): gold standard for small bowel assessment — shows mural thickening, mucosal hyperenhancement, mesenteric fat stranding ('creeping fat'), and fistula tracts","CT abdomen/pelvis: used acutely — identifies complications including abscess, obstruction, and free perforation; skip lesions and bowel wall thickening visible"]},"mx":["Induce remission: corticosteroids (prednisolone or budesonide) — anti-inflammatory; budesonide preferred for ileocaecal disease due to lower systemic side-effect profile","Maintain remission: thiopurines (azathioprine/6-mercaptopurine) as steroid-sparing agents; methotrexate if thiopurine-intolerant","Biologics: anti-TNF agents (infliximab, adalimumab) for moderate-severe or fistulating disease not responding to immunomodulators; vedolizumab (anti-integrin) or ustekinumab (anti-IL-12/23) as alternatives"],"traps":["Rectal sparing in Crohn's vs. rectal involvement always in UC — examiners test this; if rectum involved and continuous, think UC","Crohn's can cause bloody diarrhoea (colonic disease) — bloody stool does NOT rule out Crohn's or confirm UC","Terminal ileal disease causes B12 malabsorption (not folate); UC does not affect B12 — low B12 points to Crohn's","Granulomas on biopsy are present in only ~60% of Crohn's — their absence does not exclude the diagnosis; transmural inflammation and skip lesions are the key histological/endoscopic hallmarks"]},{"id":"gord","name":"GORD","system":"Gastroenterology","presentation":["Retrosternal burning (heartburn) worse after meals, bending, lying flat","Acid regurgitation — sour/bitter taste reaching throat or mouth","Dysphagia (alarm feature if present — suggests stricture or Barrett's)","Nocturnal cough or wheeze — acid micro-aspiration","Globus sensation — feeling of lump in throat"],"signs":["Often no signs on examination","Epigastric tenderness on deep palpation","Dental erosion of enamel (chronic acid exposure)","Hoarseness (laryngopharyngeal reflux)"],"investigations":{"bedside":["Urine dip — to exclude UTI/renal cause of atypical chest/back pain","ECG — exclude cardiac ischaemia in chest-pain presentations","Symptom diary / response to empirical PPI trial (diagnostic in typical uncomplicated cases)"],"bloods":["FBC — haemoglobin normal (anaemia would suggest bleeding/Barrett's complication)","H. pylori serology or stool antigen — positive in co-existent H. pylori infection","LFTs and U&Es — normal, used to exclude hepatobiliary or metabolic causes"],"imaging":["Upper GI endoscopy: erythema, erosions or ulceration at gastro-oesophageal junction; Los Angeles classification grades A–D of oesophagitis; may show columnar-lined epithelium (salmon-pink tongues) indicating Barrett's oesophagus","24-hour ambulatory pH-impedance monitoring: acid exposure time >4% of study period; correlates symptom episodes with pH drops <4 — gold standard for diagnosis","Oesophageal manometry: normal or reduced lower oesophageal sphincter (LOS) resting pressure (<10 mmHg); used pre-operatively to exclude dysmotility before fundoplication"]},"mx":["Lifestyle: head-of-bed elevation, weight loss, avoid trigger foods (fat, caffeine, alcohol, chocolate), avoid eating within 3 hours of lying down","Proton pump inhibitors (PPIs, e.g. omeprazole) — irreversibly block H⁺/K⁺-ATPase, most effective acid suppression; first-line for oesophagitis","H2-receptor antagonists (H2RAs, e.g. ranitidine/famotidine) — competitive histamine blockade reducing acid secretion; second-line or add-on for nocturnal breakthrough","Laparoscopic Nissen fundoplication — surgical reinforcement of LOS for refractory disease or patients wishing to stop long-term medication"],"traps":["Atypical chest pain mimicking ACS — always exclude cardiac cause before attributing to GORD; ECG and troponin first","Dysphagia is a red-flag symptom requiring urgent endoscopy regardless of GORD history — do not attribute to benign reflux without investigation","Chronic GORD can progress to Barrett's oesophagus (metaplastic columnar epithelium) → oesophageal adenocarcinoma; surveillance endoscopy indicated","PPIs can mask symptoms of underlying gastric or oesophageal malignancy — ensure endoscopy before starting long-term PPI in patients over 55 or with alarm features"]},{"id":"hpylori","name":"H. pylori","system":"Gastroenterology","presentation":["Epigastric pain or burning, often relieved by eating (duodenal ulcer pattern) or worsened by eating (gastric ulcer pattern)","Nausea, with or without vomiting","Bloating and early satiety","Haematemesis or melaena if complicated by peptic ulcer bleeding","Often asymptomatic — incidental finding on investigation for dyspepsia"],"signs":["Epigastric tenderness on deep palpation","Signs of anaemia (pallor, tachycardia) if chronic GI blood loss","Rarely: peritonitic abdomen if perforation (guarding, rigidity, rebound)"],"investigations":{"bedside":["Urea breath test (13C-UBT): positive — labelled CO2 detected in exhaled breath after ingestion of 13C-labelled urea, indicating urease-producing H. pylori","Stool antigen test (SAT): positive — H. pylori antigen detected in faeces; used for diagnosis and to confirm eradication","Faecal occult blood: positive if active ulcer bleeding"],"bloods":["FBC: microcytic hypochromic anaemia (low Hb, low MCV, low MCH) if chronic blood loss from peptic ulceration","H. pylori serology (IgG): positive — detects prior exposure but cannot distinguish active from cleared infection; not recommended for eradication testing","U&E and clotting: typically normal unless severe haemorrhage or complication","LFTs: normal — abnormal suggests alternative diagnosis"],"imaging":["OGD (endoscopy): visualises gastric or duodenal ulcer — clean-based or with stigmata of haemorrhage (visible vessel, adherent clot); antral erythema and nodularity typical of H. pylori gastritis; biopsy (CLO test / histology) confirms organism","Barium meal (historical): crater-like ulcer niche projecting from duodenal cap or lesser curve of stomach — now largely replaced by OGD","CXR (if perforation suspected): free air under diaphragm on erect film"]},"mx":["Triple therapy (7–14 days): PPI (proton pump inhibitor — suppresses acid to allow mucosal healing and improve antibiotic efficacy) + clarithromycin (macrolide — bactericidal) + amoxicillin (penicillin — bactericidal); metronidazole substituted if penicillin allergy","Bismuth-based quadruple therapy: reserved for clarithromycin-resistant or treatment-failure cases — PPI + bismuth + tetracycline + metronidazole","Confirm eradication: repeat urea breath test or stool antigen test at least 4 weeks after completing antibiotics and 2 weeks after stopping PPI to avoid false-negative"],"traps":["Serology cannot confirm eradication — IgG remains positive for months after successful treatment; always use UBT or SAT for test-of-cure","PPIs must be stopped 2 weeks before UBT or SAT — they suppress urease activity and cause false-negative results","NSAIDs and H. pylori are independent risk factors for peptic ulcer disease — eradicating H. pylori does not remove NSAID risk; both must be addressed","Gastric ulcers require repeat endoscopy at 6–8 weeks to confirm healing and exclude malignancy — duodenal ulcers do not routinely need repeat OGD"]},{"id":"hepatic-enceph","name":"Hepatic encephalopathy","system":"Gastroenterology","presentation":["Grade I: subtle personality change, reversed sleep-wake cycle, mild confusion","Grade II: disorientation, inappropriate behaviour, asterixis present","Grade III: gross disorientation, stupor, barely rousable but responds to stimuli","Grade IV: coma — unresponsive to verbal or painful stimuli","Precipitant often identifiable: GI bleed, infection, constipation, sedatives, electrolyte disturbance"],"signs":["Asterixis (flapping tremor) — metabolic encephalopathy hallmark; absent in deep coma","Fetor hepaticus — sweet musty breath from mercaptans; indicates severe hepatocellular failure","Jaundice and stigmata of chronic liver disease (spider naevi, palmar erythema, leuconychia)","Reduced conscious level graded by GCS; may show frontal release signs in advanced disease"],"investigations":{"bedside":["Number connection test (Trail Making Test A) — sensitive bedside screen for covert/minimal HE","EEG — diffuse slowing and triphasic waves in overt HE; not routine but useful in atypical cases","Observations + blood glucose — hypoglycaemia mimics HE and must be excluded immediately"],"bloods":["Serum ammonia — elevated in most cases, but level correlates poorly with grade; a normal ammonia does not exclude HE and a raised ammonia alone does not confirm it","LFTs + bilirubin — deranged, reflect underlying hepatic dysfunction","FBC, CRP, cultures — identify infective precipitant (SBP, UTI, pneumonia)","U&E + clotting (PT/INR) — electrolyte disturbance (hyponatraemia, hypokalaemia) precipitates HE; coagulopathy reflects synthetic failure"],"imaging":["USS abdomen with Doppler — portal hypertension, splenomegaly, ascites, hepatic vasculature patency","CT brain (non-contrast) — exclude structural cause (subdural haematoma, stroke) before attributing altered consciousness to HE","CT/MRI brain in chronic HE — bilateral basal ganglia T1 hyperintensity from manganese deposition (incidental finding)"]},"mx":["Identify and treat precipitant first — GI bleed (PPI + terlipressin), infection (broad-spectrum antibiotics), constipation, electrolyte correction","Lactulose (non-absorbable disaccharide) — reduces colonic pH, traps ammonia as NH4+, promotes bowel transit; titrate to 2-3 soft stools/day","Rifaximin (minimally absorbed oral antibiotic) — reduces ammonia-producing gut flora; used as secondary prophylaxis in recurrent HE alongside lactulose"],"traps":["Ammonia level caveat — serum ammonia is not a reliable severity marker; a raised level supports the diagnosis but does not grade HE, and treatment targets are clinical (West Haven grade), not biochemical","Protein restriction is outdated — older teaching advocated low-protein diet; current evidence shows adequate protein intake (1.2-1.5 g/kg/day) is essential and restriction worsens sarcopenia and outcomes","Always exclude structural brain pathology — subdural haematoma is common in cirrhotic patients (coagulopathy + falls); never diagnose HE without excluding an intracranial cause when there is diagnostic uncertainty","Sedatives as precipitant — benzodiazepines and opioids are dramatically potentiated in liver failure; look for a drug history in any decompensation and avoid these agents; flumazenil may transiently improve HE (endogenous benzodiazepine hypothesis)"]},{"id":"pud-bleed","name":"Peptic ulcer bleed","system":"Gastroenterology","presentation":["Haematemesis (bright red or coffee-ground vomiting)","Melaena (black, tarry, offensive stools)","Epigastric pain preceding bleed (classically relieved by food in duodenal ulcer)","Syncope or presyncope from acute blood loss","Haematochezia if massive bleed (rapid transit)"],"signs":["Tachycardia and hypotension (haemodynamic compromise — severity marker)","Pallor and cold peripheries (acute anaemia / poor perfusion)","Epigastric tenderness on palpation","Melaena on digital rectal examination"],"investigations":{"bedside":["Obs + postural BP drop (>20 mmHg systolic drop suggests significant volume loss)","Digital rectal examination — confirm melaena, exclude rectal source","Glasgow-Blatchford Score at bedside (pre-endoscopy risk stratification; score ≥1 = inpatient endoscopy)"],"bloods":["FBC — low Hb (anaemia; may be normal early before haemodilution), raised WCC if perforation","U&E — raised urea disproportionate to creatinine (blood digested in gut → urea absorbed; urea:creatinine ratio >100:1)","Clotting (PT/APTT) — prolonged if coagulopathy or anticoagulant use","Group and save / crossmatch — prepare for transfusion"],"imaging":["OGD (upper GI endoscopy) within 24 h (or <12 h if haemodynamically unstable after resuscitation) — diagnostic and therapeutic","Forrest classification on OGD: Ia spurting arterial bleed, Ib oozing, IIa visible vessel, IIb adherent clot, IIc flat pigmented spot, III clean-based ulcer (I–IIb = high rebleed risk; endoscopic treatment indicated)","CT angiography if endoscopy non-diagnostic or patient too unstable for OGD — localise bleeding point for interventional radiology"]},"mx":["Resuscitation first: IV access ×2 wide-bore, crystalloid then blood transfusion (target Hb >70 g/L, >80 g/L if cardiovascular disease); correct coagulopathy with FFP/platelets","IV proton pump inhibitor (PPI) — high-dose PPI infusion post-endoscopy to raise intragastric pH, stabilise clot, reduce rebleed risk (class: proton pump inhibitor)","Endoscopic haemostasis at OGD — injection (adrenaline), thermal coagulation, or mechanical clip for Forrest Ia/Ib/IIa/IIb lesions","H. pylori test-and-treat (urea breath test or biopsy CLO test at endoscopy) — eradication reduces recurrence; use triple therapy (PPI + two antibiotics)"],"traps":["Normal Hb on admission does not exclude significant bleed — haemodilution takes hours; serial FBC required","Raised urea with normal creatinine is a hallmark of upper GI bleed (blood as protein load) — do not attribute to renal impairment alone","NSAIDs and aspirin are the commonest precipitants — always ask about analgesic/antiplatelet use and stop/review on admission","Forrest III (clean-based ulcer) is low rebleed risk and does not require endoscopic treatment — overtreating risks perforation"]},{"id":"sbp","name":"Spontaneous bacterial peritonitis","system":"Gastroenterology","presentation":["Fever and rigors in a patient with known ascites","Diffuse abdominal pain or tenderness","Acute confusion or encephalopathy (may be only feature in 10%)","Deteriorating renal function without clear cause","Worsening ascites despite diuretics"],"signs":["Diffuse abdominal tenderness on palpation — guarding may be absent in tense ascites","Shifting dullness / fluid thrill confirming ascites","Fever (>38°C) — may be low-grade or absent in immunosuppressed","Signs of decompensated liver disease: jaundice, encephalopathy, spider naevi"],"investigations":{"bedside":["Diagnostic ascitic tap — PMN (neutrophil) count ≥250 cells/mm³ confirms SBP regardless of culture result","Ascitic fluid culture — inoculate blood culture bottles at bedside to improve yield; most commonly E. coli, Klebsiella, Streptococcus pneumoniae","Ascitic fluid appearance — turbid/cloudy fluid raises suspicion; bloody tap should trigger haemorrhagic ascites differential"],"bloods":["FBC — raised WCC (neutrophilia) supports infection; thrombocytopenia common in cirrhosis","CRP and blood cultures — CRP elevated; blood cultures positive in ~50% of SBP","U&E and creatinine — renal impairment predicts poor prognosis; monitors for hepatorenal syndrome","LFTs and clotting (INR) — baseline liver function; coagulopathy affects procedural risk"],"imaging":["USS abdomen — confirms ascites, guides ascitic tap if loculated; excludes secondary peritonitis (free gas, abscess, perforation)","CT abdomen/pelvis — if secondary peritonitis suspected (i.e. ascitic PMN >250 but polymicrobial culture, very high protein or LDH) to identify surgical source"]},"mx":["Empirical broad-spectrum antibiotics — third-generation cephalosporin (e.g. cefotaxime class) first-line; covers gram-negative enteric organisms","IV human albumin — given at diagnosis and day 3 to reduce risk of hepatorenal syndrome (HRS); class: plasma volume expander/oncotic agent","Secondary prophylaxis with oral fluoroquinolone (e.g. norfloxacin class) or co-trimoxazole — lifelong after first episode to prevent recurrence"],"traps":["Culture-negative SBP — PMN ≥250 cells/mm³ IS sufficient to diagnose and treat SBP even if cultures return negative; do not withhold antibiotics","Secondary peritonitis masquerading as SBP — suspect if cultures are polymicrobial, ascitic protein >10 g/L, glucose <2.8 mmol/L, or LDH >upper limit of normal; requires surgical/CT workup not antibiotics alone","Primary prophylaxis indications — offer to patients with ascitic protein <15 g/L plus either Child-Pugh ≥9 or impaired renal function; commonly missed in exams","Hepatorenal syndrome risk — failing to give albumin alongside antibiotics is a classic omission; albumin reduces HRS and mortality, not just restoring fluid"]},{"id":"uc-maintain","name":"UC - maintaining remission","system":"Gastroenterology","presentation":["Asymptomatic between relapses — formed stool, no blood, normal frequency","Relapse heralded by return of bloody diarrhoea, urgency, and nocturnal stooling","Fatigue and weight loss may signal subclinical inflammation or iron deficiency","Extra-intestinal manifestations (uveitis, erythema nodosum, primary sclerosing cholangitis) can flare independently of bowel disease"],"signs":["Examination typically normal in established remission","Pallor suggesting anaemia of chronic disease or iron deficiency from prior bleeds","Aphthous mouth ulcers — associated extra-intestinal feature","Jaundice or hepatomegaly if coexisting primary sclerosing cholangitis (PSC)"],"investigations":{"bedside":["Stool calprotectin — elevated (>250 µg/g) indicates mucosal inflammation and impending relapse before symptoms develop","Stool culture — exclude infective trigger (Clostridioides difficile, Campylobacter) if apparent relapse","Abdominal examination and PR if active bleeding suspected"],"bloods":["FBC — monitor for thiopurine-induced myelosuppression (leucopenia, thrombocytopenia); anaemia from chronic disease","LFTs — thiopurines can cause hepatotoxicity; check for PSC-related cholestasis","Thiopurine methyltransferase (TPMT) activity — must be checked before starting azathioprine or mercaptopurine; low/absent TPMT → risk of severe myelosuppression","Thioguanine nucleotide (TGN) metabolite levels — confirms adherence and therapeutic range if inadequate response","CRP and ESR — trend markers of systemic inflammation; raised in relapse"],"imaging":["Colonoscopy with biopsies — surveillance for dysplasia and colorectal cancer; frequency determined by extent, duration, and PSC co-existence","Chromoendoscopy or dye-spray colonoscopy — preferred over random biopsies for dysplasia detection in long-standing disease","MRI abdomen/pelvis — assess for PSC or small-bowel Crohn if diagnosis in doubt; not routine for UC surveillance"]},"mx":["Aminosalicylates (5-ASA, e.g. mesalazine) — first-line maintenance for mild-to-moderate UC; reduces mucosal inflammation via topical anti-inflammatory action; oral ± rectal route depending on disease extent","Thiopurines (azathioprine or mercaptopurine) — for steroid-dependent or steroid-refractory UC; immunomodulator; must check TPMT before starting and monitor FBC/LFTs regularly","Biologics (anti-TNF e.g. infliximab, vedolizumab, ustekinumab) — for refractory or biologic-dependent disease; vedolizumab is gut-selective (anti-integrin) and preferred in UC; combination with thiopurine reduces immunogenicity of anti-TNF"],"traps":["TPMT testing is mandatory before starting any thiopurine — low or absent TPMT activity causes accumulation of active metabolites → life-threatening myelosuppression; intermediate activity requires dose reduction","Colorectal cancer surveillance intervals: extensive colitis (beyond splenic flexure) → colonoscopy at 8 years from diagnosis, then every 1–5 years based on risk stratification (inflammation grade, PSC, family history); PSC + UC → annual colonoscopy from diagnosis","5-ASA alone is insufficient maintenance for patients who required steroids to achieve remission — failing to step up to thiopurine or biologic is a common exam omission","Methotrexate is NOT effective for maintaining remission in UC (unlike Crohn's disease) — a classic cross-condition trap in finals"]},{"id":"uc-induce","name":"Ulcerative colitis","system":"Gastroenterology","presentation":["Bloody diarrhoea with mucus — hallmark; frequency reflects severity","Urgency and tenesmus — rectal inflammation drives constant sensation of need to defecate","Cramping lower abdominal pain — typically left-sided, relieved by defecation","Fatigue and weight loss — chronic inflammation and nutritional deficiency","Extraintestinal features — uveitis, erythema nodosum, primary sclerosing cholangitis"],"signs":["Lower abdominal tenderness on palpation — particularly left iliac fossa in left-sided disease","Pyrexia and tachycardia — indicate severe/fulminant flare; trigger Truelove & Witts criteria","Perianal inspection: no fistulae or skin tags (distinguishes from Crohn's)","Pallor — iron-deficiency anaemia secondary to chronic blood loss"],"investigations":{"bedside":["Stool chart: record frequency and Bristol type; blood/mucus presence; send stool MC&S to exclude infective cause (Clostridioides difficile, Salmonella, Campylobacter)","Observations: HR >90, temp >37.8 °C, or >6 bloody stools/day = severe flare by Truelove & Witts criteria","AXR: colonic dilatation >6 cm in transverse colon indicates toxic megacolon; mucosal islands (pseudopolyps) on plain film in severe disease; loss of haustral pattern (lead-pipe colon) in long-standing disease"],"bloods":["FBC: normocytic or microcytic anaemia; raised WCC in severe flare; thrombocytosis (reactive)","CRP and ESR: elevated proportional to disease activity; CRP >45 at 3 days predicts need for colectomy","U&E: hypokalaemia and hypoalbuminaemia in severe disease from diarrhoeal losses and inflammation","LFTs including GGT: screen for primary sclerosing cholangitis (raised ALP/GGT disproportionate to other LFTs)"],"imaging":["AXR (first-line in acute severe UC): assess for toxic megacolon (transverse colon >6 cm); mucosal thickening; absence of faecal loading in affected colon","Colonoscopy + biopsy (gold standard, not in acute severe flare — perforation risk): continuous mucosal inflammation starting at rectum extending proximally; erythema, granularity, friability, contact bleeding, and superficial ulceration; crypt abscesses and goblet cell depletion on histology","CT abdomen/pelvis (if colonoscopy unsafe in severe flare): mural thickening of colon, pericolonic fat stranding, assess for perforation or abscess"]},"mx":["Mild-moderate flare: topical aminosalicylates (5-ASA, e.g. mesalazine suppository/enema) — reduce mucosal inflammation via prostaglandin inhibition; oral 5-ASA added for left-sided or extensive disease","Moderate-severe flare: oral corticosteroids (prednisolone) — broad immunosuppression to induce remission; taper once in remission; not used as maintenance","Acute severe UC (Truelove & Witts severe criteria): admit, IV corticosteroids (hydrocortisone) — if no response by 72 hours, consider IV ciclosporin (calcineurin inhibitor) or anti-TNF (infliximab) as rescue therapy, or refer for colectomy"],"traps":["Sending stool cultures is mandatory before starting steroids — infective colitis (especially C. difficile) mimics a flare and steroids will worsen infection","Do not perform colonoscopy in acute severe UC — risk of perforation; use AXR and CT instead to assess extent and complications","UC does not cause skip lesions, fistulae, or perianal disease — these features point to Crohn's; examiners test this distinction","PSC association is with UC not Crohn's — a candidate who attributes raised ALP to Crohn's disease will lose marks; always check LFTs in UC and screen for PSC"]},{"id":"addisons","name":"Addison's disease","system":"Endocrinology","presentation":["Insidious fatigue, weakness, weight loss, anorexia — often months of vague symptoms before diagnosis","Postural hypotension and salt craving (mineralocorticoid deficiency)","Hyperpigmentation: sun-exposed areas, palmar creases, buccal mucosa, scars — caused by excess ACTH stimulating melanocytes (primary only)","Nausea, vomiting, abdominal pain, diarrhoea","Precipitant may unmask: surgery, infection, or steroid withdrawal triggering acute crisis"],"signs":["Hyperpigmentation of skin creases, buccal mucosa, scars, nipples (primary Addison's only — absent in secondary)","Postural hypotension — mineralocorticoid deficiency","Sparse axillary/pubic hair in women (adrenal androgen deficiency)","Vitiligo — associated autoimmune condition"],"investigations":{"bedside":["BP: postural drop — lying and standing BP","BM: hypoglycaemia in crisis"],"bloods":["U&E: hyponatraemia (↓Na), hyperkalaemia (↑K), hypoglycaemia — classic triad","Short Synacthen test (SST): 250 mcg tetracosactide IM/IV; cortisol peak <550 nmol/L = adrenal insufficiency","9am cortisol: <100 nmol/L strongly suggests insufficiency; >450 makes it unlikely; 100–450 = do SST","ACTH level: elevated in primary (↑), low/normal in secondary — distinguishes cause","Adrenal autoantibodies (21-hydroxylase Ab): positive in autoimmune Addison's (commonest cause in UK)"],"imaging":["CT adrenals: calcification suggests TB or haemorrhage; small glands = autoimmune; enlarged = infection/malignancy","MRI pituitary: if secondary adrenal insufficiency suspected (low ACTH)"]},"mx":["Hydrocortisone: 20–30 mg/day in 2–3 divided doses — larger dose in the morning (e.g. 10 mg on waking, 5 mg at 12 noon, 5 mg at 4pm) to mimic diurnal cortisol rhythm","Fludrocortisone: 50–200 mcg once daily — mineralocorticoid replacement; titrate to BP, electrolytes, renin","Patient education: MedicAlert bracelet, steroid emergency card, self-injectable hydrocortisone kit for crisis; never stop steroids abruptly"],"traps":["Sick day rules: intercurrent illness → DOUBLE the hydrocortisone dose; fludrocortisone stays THE SAME — doubling fludrocortisone causes dehydration and electrolyte imbalance","Hyperpigmentation is only in PRIMARY Addison's (high ACTH stimulates melanocytes) — absent in secondary adrenal insufficiency (pituitary cause, low ACTH)","Autoimmune Addison's is associated with other autoimmune conditions — screen for thyroid disease, T1DM, vitiligo, pernicious anaemia (autoimmune polyglandular syndrome)","In secondary adrenal insufficiency: no mineralocorticoid replacement needed (aldosterone preserved, regulated by RAAS not ACTH)","If starting levothyroxine in a patient with undiagnosed Addison's → can precipitate adrenal crisis; always replace cortisol first if dual deficiency suspected"]},{"id":"addisonian-crisis","name":"Addisonian crisis","system":"Endocrinology","presentation":["Profound weakness and fatigue, often preceding collapse","Nausea, vomiting, and abdominal pain (may mimic acute abdomen)","Postural dizziness or frank syncope","Altered consciousness or confusion in severe cases","Precipitant identifiable: intercurrent illness, surgery, steroid withdrawal, trauma"],"signs":["Postural or supine hypotension (circulatory shock in severe cases)","Hyperpigmentation of skin creases, buccal mucosa, and scars (primary Addison's only)","Signs of dehydration: reduced skin turgor, dry mucous membranes, tachycardia","Pyrexia if sepsis is the precipitant"],"investigations":{"bedside":["Obs: hypotension, tachycardia, temperature (identify septic precipitant)","BM: hypoglycaemia — a cardinal feature, may be profound","ECG: peaked T-waves or broad QRS if severe hyperkalaemia"],"bloods":["U&E: hyponatraemia (↓Na) and hyperkalaemia (↑K) — the classic electrolyte pattern","Glucose: hypoglycaemia (↓glucose) — completes the triad","Serum cortisol: take before hydrocortisone if possible, but do not delay treatment","Short Synacthen test (SST): 250 mcg IM/IV tetracosactide — cortisol fails to rise adequately (peak <550 nmol/L); performed after stabilisation, not acutely"],"imaging":["CT abdomen/adrenals: if bilateral adrenal haemorrhage or Waterhouse–Friderichsen syndrome suspected","CXR: to identify precipitating illness (pneumonia, TB)"]},"mx":["IV hydrocortisone (glucocorticoid replacement) — treat on clinical suspicion before results; take cortisol sample first if it causes no delay","IV 0.9% saline with glucose: correct hypovolaemia and hypoglycaemia simultaneously","Identify and treat precipitant (e.g. antibiotics for sepsis); do not withhold steroids pending diagnosis"],"traps":["Treat on suspicion — do not wait for cortisol results; delay is life-threatening","Synacthen test is done after stabilisation, never during the acute crisis","Fludrocortisone (mineralocorticoid) is not needed acutely — high-dose hydrocortisone has sufficient mineralocorticoid activity","Sick day rules: intercurrent illness → DOUBLE the hydrocortisone dose (both AM and PM doses); fludrocortisone dose stays THE SAME (doubling it causes dehydration/electrolyte disturbance); carry IM hydrocortisone for injection if vomiting/unable to take oral"]},{"id":"dka","name":"DKA","system":"Endocrinology","presentation":["Vomiting, nausea, abdominal pain","Polyuria and polydipsia (osmotic symptoms)","Kussmaul breathing (deep sighing respirations — respiratory compensation for metabolic acidosis)","Precipitant history: missed insulin, infection (UTI/LRTI), new T1DM presentation, alcohol"],"signs":["Kussmaul respirations — deep, sighing, rapid breathing","Ketotic (pear-drop/acetone) breath","Dehydration — dry mucous membranes, reduced skin turgor, tach
