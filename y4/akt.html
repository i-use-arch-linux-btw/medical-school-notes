ycardia, hypotension","Reduced GCS or confusion in severe cases"],"investigations":{"bedside":["BM (capillary glucose) — typically >11 mmol/L (may be lower in euglycaemic DKA)","Urine dip — glycosuria ++ and ketonuria ++","ABG — pH <7.3, bicarbonate <15 mmol/L confirms acidosis; pCO2 low (respiratory compensation)"],"bloods":["Serum glucose >11 mmol/L (or known diabetes)","Serum/blood ketones >3 mmol/L (diagnostic threshold)","Venous pH <7.3 and bicarbonate <15 mmol/L (severe: pH <7.1, bicarb <5)","U&Es — potassium may be high initially (acidosis shifts K+ extracellularly) but total body K+ depleted; monitor closely"],"imaging":["CXR — identify infective precipitant (consolidation/pneumonia)","ECG — assess hyperkalaemia changes (peaked T waves, wide QRS) or arrhythmia"]},"mx":["IV fluid resuscitation first — 0.9% sodium chloride bolus to restore circulating volume before insulin","Fixed-rate IV insulin infusion (FRIII) — started after fluids; drives glucose and ketones down","Potassium replacement — add K+ to fluids once serum K+ <5.5 mmol/L; never give insulin without K+ available as insulin drives K+ into cells causing dangerous hypokalaemia"],"traps":["Euglycaemic DKA — glucose may be normal (<11 mmol/L) especially in SGLT2 inhibitor use or pregnancy; do not rule out DKA on glucose alone","K+ paradox — initial hyperkalaemia masked by total body K+ depletion; once insulin starts, K+ drops rapidly and must be replaced","Start fluids before insulin — giving insulin first without volume resuscitation risks cardiovascular collapse","Cerebral oedema risk — commonest in children; avoid over-rapid fluid correction"]},{"id":"hyperkalaemia","name":"Hyperkalaemia","system":"Endocrinology","presentation":["Often asymptomatic — discovered incidentally on bloods","Muscle weakness and fatigue (generalised, ascending)","Palpitations or cardiac arrest (severe — K+ >6.5 mmol/L)","Paraesthesia or flaccid paralysis (very severe)","Nausea, vomiting (non-specific)"],"signs":["Generalised flaccid weakness or hypotonia","Absent or reduced deep tendon reflexes","Bradycardia or irregular pulse (cardiac toxicity)","Signs of underlying cause — Cushingoid features (exogenous steroids), uraemic fetor/pallor (renal failure), hyperpigmentation/postural hypotension (Addison's)"],"investigations":{"bedside":["ECG — mandatory first step; progression with rising K+: peaked (tall, narrow, symmetrical) T waves (K+ >5.5 mmol/L) → prolonged PR interval → flattened/absent P waves (K+ >6.5 mmol/L) → widened QRS / sinusoidal sine wave pattern (K+ >7.0 mmol/L) → VF / asystole (K+ >8.0 mmol/L)","Urine dip — proteinuria/haematuria suggests renal cause; dipstick for myoglobin if rhabdomyolysis","Blood glucose (bedside) — exclude DKA-associated hyperkalaemia (insulin deficiency)"],"bloods":["Serum potassium — confirm level (repeat if haemolysed sample suspected); >5.5 mmol/L = hyperkalaemia, >6.5 mmol/L = severe","Urea and creatinine — AKI or CKD as commonest cause; eGFR to stage renal impairment","Venous blood gas — assess metabolic acidosis (acidosis drives K+ extracellularly); bicarbonate level","Aldosterone and renin (if no obvious cause) — Addison's disease (low aldosterone, low cortisol, high ACTH) or hypoaldosteronism","Cortisol / short Synacthen test — if Addison's suspected (postural hypotension, hyperpigmentation, hyponatraemia)","FBC — haemolysis (high K+ with high LDH, low haptoglobin) or rhabdomyolysis (high CK)"],"imaging":["Renal USS — if AKI suspected; exclude obstructive uropathy (bilateral hydronephrosis); assess renal size/cortex for CKD","CT KUB (non-contrast) — if renal tract obstruction suspected and USS inconclusive"]},"mx":["Membrane stabilisation (immediate, cardiac protection): IV calcium gluconate 10% — stabilises cardiac membrane within minutes; does not lower K+; repeat ECG to confirm effect; use first if ECG changes present","Shift K+ into cells (rapid, 15-30 min): IV insulin (actrapid) + 50% dextrose — drives K+ intracellularly; nebulised salbutamol (beta-2 agonist) adjunct; sodium bicarbonate if severe acidosis","Remove K+ from body (definitive): furosemide (loop diuretic, if euvolaemic/volume-overloaded and adequate renal function); calcium resonium (cation-exchange resin, oral/rectal); renal replacement therapy (haemodialysis) for refractory or oliguric AKI/CKD","Stop precipitants: review and stop ACE inhibitors, ARBs, potassium-sparing diuretics (spironolactone, amiloride), NSAIDs, trimethoprim, heparin"],"traps":["Calcium gluconate protects the heart but does NOT lower serum potassium — it is membrane stabilisation only; you must still shift and remove K+ separately","Pseudohyperkalaemia — haemolysed sample (tight tourniquet, delayed processing, small vein) gives falsely high K+; always repeat if no ECG changes and asymptomatic; true hyperkalaemia has corresponding ECG findings","ECG can be normal even with K+ 6.0-6.5 mmol/L — absence of ECG changes does not exclude dangerous hyperkalaemia; treat on the blood result","Addison's disease — classic cause of hyperkalaemia + hyponatraemia; hyperpigmentation and postural hypotension are the exam clues; do not give insulin/dextrose before cortisol replacement in adrenal crisis as this can precipitate cardiovascular collapse"]},{"id":"hyperthyroid","name":"Hyperthyroidism / Graves","system":"Endocrinology","presentation":["Heat intolerance and sweating","Unintentional weight loss despite increased appetite","Palpitations (AF or sinus tachycardia)","Diarrhoea / increased bowel frequency","Anxiety, irritability, and tremor"],"signs":["Exophthalmos and lid lag (Graves-specific — due to retro-orbital inflammation)","Pretibial myxoedema (Graves-specific — indurated, violaceous plaques on shins)","Diffuse smooth goitre with thyroid bruit (Graves) vs. irregular nodular goitre (toxic MNG)","Fine resting tremor and warm, moist peripheries"],"investigations":{"bedside":["Obs: resting tachycardia or irregularly irregular pulse (AF)","ECG: sinus tachycardia; AF in ~10-15% — check rate and rhythm"],"bloods":["TFTs: TSH suppressed (<0.1 mU/L) + elevated free T4 and/or free T3 (T3 toxicosis if T4 normal)","TSH-receptor antibodies (TRAb / TSI): positive in Graves disease (>95% sensitivity)","FBC before starting carbimazole — baseline for agranulocytosis monitoring","LFTs: carbimazole can cause hepatotoxicity; also mildly deranged in thyrotoxicosis"],"imaging":["USS thyroid: diffuse hypoechoic gland with increased vascularity (Graves) vs. discrete nodule(s) (toxic nodular)","Isotope scan (Tc-99m or I-123): diffuse homogeneous uptake = Graves; focal hot nodule(s) with suppressed surrounding tissue = toxic adenoma / toxic MNG — key distinction when diagnosis unclear or pre-radioiodine"]},"mx":["Symptom control: non-selective beta-blocker (propranolol) — controls tachycardia, tremor, and anxiety while awaiting biochemical response","Antithyroid drug: carbimazole (titration or block-and-replace) — first-line in UK; propylthiouracil (PTU) preferred in first trimester of pregnancy (carbimazole teratogenic) and thyroid storm","Definitive: radioiodine (I-131) — first-line definitive in non-pregnant adults; total thyroidectomy if large goitre, compressive symptoms, or patient declines radioiodine"],"traps":["Carbimazole agranulocytosis: warn all patients to stop carbimazole and seek urgent FBC if they develop sore throat or fever — rare but life-threatening; occurs in first 3 months","Propylthiouracil (not carbimazole) in first trimester: carbimazole is teratogenic (aplasia cutis, choanal atresia) — switch to PTU in T1, then reassess; PTU has risk of hepatotoxicity","Thyroid storm: precipitated by surgery, infection, or iodine load in uncontrolled thyrotoxicosis — treat with high-dose PTU, Lugol's iodine (given 1 hour after PTU), IV beta-blocker, dexamethasone, and supportive care","Isotope scan distinction: do not treat with radioiodine without confirming diffuse (Graves) vs. nodular uptake — toxic MNG and solitary adenoma have different prognosis and RAI dosing"]},{"id":"hypoglycaemia","name":"Hypoglycaemia","system":"Endocrinology","presentation":["Autonomic: sweating, tremor, palpitations, hunger, anxiety (adrenergic/cholinergic surge, BM typically <4 mmol/L)","Neuroglycopenic: confusion, drowsiness, slurred speech, focal weakness, seizure, coma (BM typically <3 mmol/L)","Headache and blurred vision (early neuroglycopenic)","Nocturnal hypoglycaemia: nightmares, morning headache, unrefreshed sleep","Recurrent episodes without autonomic warning = hypoglycaemia unawareness (autonomic neuropathy or prior episodes blunting response)"],"signs":["Diaphoresis and pallor (sympathoadrenal activation)","Tachycardia and hypertension (catecholamine surge)","Confusion, agitation or reduced GCS (neuroglycopenia)","Focal neurological deficit or seizure (mimics stroke — always check BM)"],"investigations":{"bedside":["Capillary blood glucose (BM): confirms hypoglycaemia at <4 mmol/L; <3 mmol/L in non-diabetic requires formal venous sample","Obs: HR, BP (tachycardia, hypertension common); GCS to guide route of treatment"],"bloods":["Venous glucose: send simultaneously with insulin/C-peptide at the time of hypoglycaemia (Whipple's triad requires documented low glucose)","Insulin level: elevated (>3 mIU/L) when glucose <3 mmol/L indicates endogenous or exogenous insulin excess","C-peptide: elevated = endogenous hyperinsulinism (insulinoma, sulphonylurea); suppressed = exogenous insulin injection","Sulphonylurea screen (plasma/urine): distinguishes sulphonylurea-induced hyperinsulinism from insulinoma when C-peptide is raised","Cortisol and IGF-II if non-islet tumour hypoglycaemia suspected; TFTs if hypothyroidism a contributor"],"imaging":["CT pancreas (triple-phase): first-line to localise insulinoma (>90% sensitivity for lesions >1 cm)","MRI pancreas or endoscopic ultrasound (EUS): if CT negative — EUS most sensitive for small insulinomas","Selective arterial calcium stimulation with hepatic venous sampling: used pre-operatively when cross-sectional imaging is inconclusive"]},"mx":["Conscious and able to swallow: oral fast-acting carbohydrate (glucose tablets, Lucozade) — 'rule of 15' approach; repeat BM in 15 min and recheck","Unconscious or unsafe swallow: IV glucose (dextrose bolus) first-line in hospital; IM glucagon (1 mg) if no IV access — acts by stimulating hepatic glycogenolysis","Insulinoma: surgical resection (enucleation or pancreatectomy); diazoxide (inhibits insulin secretion) as bridge or if inoperable"],"traps":["Glucagon fails in starvation, alcohol excess, and liver disease — hepatic glycogen stores depleted, so IM glucagon will not work; IV dextrose is the only reliable option","Whipple's triad must be satisfied before labelling a patient as having pathological hypoglycaemia: (1) symptoms consistent with hypoglycaemia, (2) documented low plasma glucose, (3) symptoms relieved by glucose correction","Exogenous insulin injection produces high insulin but suppressed C-peptide — raised insulin + suppressed C-peptide = factitious hypoglycaemia (Munchausen) until proven otherwise","Focal neurology or seizure with no obvious cause — always check BM immediately; hypoglycaemia mimics TIA/stroke and is fully reversible if treated promptly"]},{"id":"hypothyroid","name":"Hypothyroidism","system":"Endocrinology","presentation":["Fatigue and lethargy","Cold intolerance","Weight gain despite poor appetite","Constipation","Menorrhagia (primary hypothyroidism)"],"signs":["Goitre (in Hashimoto's or iodine deficiency)","Slow-relaxing (hung-up) reflexes","Bradycardia","Dry, coarse skin and hair loss","Periorbital oedema / non-pitting oedema (myxoedema)"],"investigations":{"bedside":["Obs: bradycardia, hypothermia, raised BP (diastolic hypertension)","ECG: sinus bradycardia, low-voltage complexes, prolonged QT interval","Urine dipstick: exclude other causes of oedema"],"bloods":["Primary hypothyroidism: TSH elevated, free T4 low","Secondary hypothyroidism (pituitary failure): TSH low or inappropriately normal, free T4 low","Subclinical hypothyroidism: TSH elevated, free T4 normal","TPO antibodies: positive in Hashimoto's thyroiditis","FBC: normocytic or macrocytic anaemia; lipids: hypercholesterolaemia; CK: elevated (myopathy)"],"imaging":["Thyroid USS: assess goitre size, nodularity; Hashimoto's gives heterogeneous hypoechoic appearance","CXR: cardiomegaly (pericardial effusion in severe/myxoedema)"]},"mx":["Levothyroxine (T4 replacement) — start low, titrate to TSH in normal range","Start at low dose in elderly or ischaemic heart disease (risk of precipitating angina/MI); increase slowly","Monitor TFTs at 6–8 weeks after dose change; annual TFTs once stable","Pregnancy: increase levothyroxine dose by ~25–30% as soon as pregnancy confirmed; TSH target <2.5 mU/L"],"traps":["Starting full-dose levothyroxine in elderly or cardiac patients can precipitate angina or MI — always start low and go slow","Secondary hypothyroidism (low TSH + low T4): exclude pituitary disease and replace cortisol BEFORE levothyroxine (risk of adrenal crisis if cortisol-deficient)","Myxoedema coma: rare but life-threatening — hypothermia, reduced GCS, hypoventilation; needs IV T3/T4, IV hydrocortisone, ITU","Amiodarone causes both hypo- and hyperthyroidism; TFTs must be interpreted with free T4 as TSH may be unreliable"]},{"id":"t2dm","name":"Type 2 diabetes","system":"Endocrinology","presentation":["Polyuria and polydipsia (osmotic diuresis from glucosuria)","Fatigue and lethargy","Recurrent infections (UTIs, candidiasis, skin infections)","Blurred vision (osmotic lens changes)","Incidental hyperglycaemia on routine bloods"],"signs":["Peripheral neuropathy — glove-and-stocking sensory loss, reduced vibration sense and ankle reflexes","Diabetic retinopathy — background (dot haemorrhages, hard exudates) or proliferative (neovascularisation) on fundoscopy","Foot signs — Charcot foot deformity, neuropathic/ischaemic ulceration, absent pedal pulses","Acanthosis nigricans — velvety hyperpigmentation at neck/axillae (insulin resistance marker)"],"investigations":{"bedside":["Capillary blood glucose (BM) — random ≥11.1 mmol/L with symptoms is diagnostic","Urine dipstick — glycosuria; also check for proteinuria (nephropathy screening)","Blood pressure — hypertension common co-morbidity; target <130/80 mmHg in T2DM"],"bloods":["Fasting plasma glucose ≥7.0 mmol/L on two occasions (or once with symptoms) — diagnostic","HbA1c ≥48 mmol/mol (6.5%) on two occasions (or once with symptoms) — diagnostic; reflects 3-month average glucose","Random plasma glucose ≥11.1 mmol/L with classic osmotic symptoms — diagnostic without repeat","eGFR and urine albumin:creatinine ratio (ACR) — baseline renal function; ACR >3 mg/mmol = microalbuminuria"],"imaging":["Fundoscopy / digital retinal photography — annual diabetic eye screening (detect retinopathy)","Renal ultrasound — if proteinuria or declining eGFR to exclude structural renal disease","Ankle-brachial pressure index (ABPI) — if peripheral arterial disease suspected (non-healing ulcer, absent pulses)"]},"mx":["Lifestyle modification first — dietary change (low glycaemic index, caloric deficit), weight loss, and increased physical activity; can achieve remission in obesity-related T2DM","Metformin (biguanide) — first-line oral agent; reduces hepatic gluconeogenesis; renal-dose-adjust, hold if eGFR <30","SGLT2 inhibitor (e.g. empagliflozin/dapagliflozin) — add if established cardiovascular disease, heart failure, or CKD; cardio- and nephroprotective independently of glucose lowering","GLP-1 receptor agonist (e.g. semaglutide) — add if obesity prominent or CVD risk high; promotes weight loss and glucose-dependent insulin secretion"],"traps":["MODY (Maturity-Onset Diabetes of the Young) — monogenic diabetes in thin young patients with strong family history; misclassified as T2DM; does not respond to metformin, responds to sulphonylureas (MODY3)","HbA1c unreliable in haemolytic anaemia, haemoglobinopathies (e.g. sickle cell, HbS/C), iron deficiency, and recent blood transfusion — use fasting glucose instead for diagnosis","SGLT2 inhibitors are indicated for renal and cardiovascular protection regardless of HbA1c target — do not withhold simply because glucose is controlled","Diagnosing T2DM requires two abnormal results in an asymptomatic patient; a single test suffices only when classic osmotic symptoms are present"]},{"id":"meningitis","name":"Bacterial meningitis","system":"Neurology","presentation":["Triad: severe headache, fever, neck stiffness","Non-blanching petechial/purpuric rash (meningococcal septicaemia)","Photophobia and phonophobia","Altered consciousness / confusion (reduced GCS)","Preceding URTI or close-contact exposure"],"signs":["Kernig's sign — pain/resistance on knee extension with hip flexed at 90°","Brudzinski's sign — involuntary hip/knee flexion on passive neck flexion","Non-blanching petechiae or purpura (fails glass test)","Reduced GCS; may have focal neurology or papilloedema if raised ICP"],"investigations":{"bedside":["Observations: fever, tachycardia, hypotension (sepsis)","Glass test: press glass on rash — non-blanching = meningococcal emergency","GCS assessment: guide LP safety and severity"],"bloods":["FBC: raised WBC (neutrophilia in bacterial)","CRP: markedly elevated","Blood cultures: before antibiotics if no delay; identify organism","Meningococcal/pneumococcal PCR: blood or CSF; positive even post-antibiotics","Coagulation, U&E, glucose (paired glucose needed for CSF interpretation)"],"imaging":["CT head before LP if: focal neurology, papilloedema, seizures, GCS <13, immunocompromised — to exclude raised ICP / mass lesion","LP: CSF appearance — turbid/cloudy (bacterial); clear (viral); xanthochromic (SAH)","CSF findings in bacterial meningitis: raised protein (>1 g/L), very low glucose (<50% serum), neutrophilia (>1000 cells/mm³), positive Gram stain/culture"]},"mx":["IV ceftriaxone immediately — do not delay for CT or LP; add IV amoxicillin if age <3 months or >60 years (Listeria cover)","IV dexamethasone — give before or with first antibiotic dose to reduce neurological sequelae (especially in pneumococcal disease)","Public health notification — meningococcal disease is notifiable; close contacts receive prophylactic rifampicin or ciprofloxacin"],"traps":["Never delay antibiotics for CT or LP — treat immediately if meningitis suspected; investigations follow treatment","Listeria cover: add amoxicillin at age extremes (<3 months, >60 years) and in immunocompromised patients — ceftriaxone alone is insufficient","LP is contraindicated if focal neurology, papilloedema, seizures or GCS <13 — CT head first to exclude raised ICP","Non-blanching rash is a red flag even if other features are mild — assume meningococcal septicaemia until proven otherwise"]},{"id":"stroke-ischaemic","name":"Ischaemic stroke","system":"Neurology","presentation":["Sudden-onset focal neurological deficit — FAST: facial droop, arm weakness, speech disturbance","MCA: contralateral hemiplegia/hemisensory loss (arm > leg), aphasia (dominant), neglect (non-dominant), homonymous hemianopia","ACA: contralateral leg > arm weakness, frontal lobe features (abulia, grasp reflex)","PCA: homonymous hemianopia ± cortical blindness, alexia without agraphia","Posterior fossa (PICA/basilar): vertigo, ataxia, diplopia, dysphagia, crossed cranial nerve signs (ipsilateral face, contralateral body)"],"signs":["Upper motor neurone pattern: contralateral spastic hemiparesis, hyperreflexia, upgoing plantar (Babinski)","Contralateral hemisensory loss (pain, temperature, proprioception depending on territory)","Contralateral homonymous hemianopia — assess by confrontation","Left-sided spatial neglect (non-dominant MCA): inattention to left hemispace on double simultaneous stimulation"],"investigations":{"bedside":["Obs: BP (hypertension common acutely — do not lower unless >185/110 and thrombolysing), O2 sats, temperature","BM: exclude hypoglycaemia (mimics stroke; treat if <4 mmol/L)","ECG: identify AF (cardioembolic source); 12-lead also screens for concurrent ACS","NIHSS score: quantify deficit severity; guides thrombolysis eligibility"],"bloods":["FBC: baseline; thrombocytopenia is contraindication to thrombolysis","Coagulation (PT/APTT/INR): anticoagulant use is contraindication to thrombolysis","Glucose and HbA1c: exclude hypoglycaemia; identify diabetes as risk factor","Fasting lipids: LDL for secondary prevention (statin therapy)"],"imaging":["Non-contrast CT head (immediate): excludes haemorrhage before thrombolysis — ischaemic stroke appears NORMAL in first 6–24h; early signs: loss of grey–white differentiation, hyperdense MCA sign, sulcal effacement","MRI DWI (within 6h, or up to 24h with perfusion mismatch): shows restricted diffusion (bright DWI, dark ADC) within minutes of onset — far more sensitive than CT for acute ischaemia","CT angiography (CTA): identifies large vessel occlusion (LVO) amenable to mechanical thrombectomy"]},"mx":["Thrombolysis (alteplase IV): within 4.5h of onset if no contraindications (haemorrhage, BP >185/110 uncontrolled, anticoagulation, recent surgery, INR >1.7, glucose <2.7 or >22); BP must be controlled to ≤185/110 before administering","Mechanical thrombectomy: for LVO (M1/M2, basilar) within 6h (up to 24h with perfusion imaging selection) — superior to thrombolysis alone for proximal occlusions","Antiplatelet therapy: aspirin 300mg PO/PR within 24h of onset (delay 24h if thrombolysed); dual antiplatelet (aspirin + clopidogrel) for 21 days in minor stroke/TIA (POINT/CHANCE criteria)","AF: anticoagulation (DOAC preferred over warfarin) started at 4–14 days post-stroke depending on infarct size; not acutely due to haemorrhagic transformation risk"],"traps":["CT normal in first 6–24h — a normal CT does NOT exclude ischaemic stroke; it excludes haemorrhage; request MRI DWI if clinical suspicion high","Do NOT lower BP acutely unless >185/110 and planning thrombolysis, or hypertensive emergency — permissive hypertension maintains penumbral perfusion","Posterior circulation strokes mimic labyrinthitis/BPPV — vertigo + ataxia + any cranial nerve sign = posterior fossa stroke until proven otherwise (HINTS exam); CT posterior fossa has poor sensitivity","Hypoglycaemia mimics stroke exactly — always check BM first; correct before imaging","Anticoagulation timing in AF: starting too early risks haemorrhagic transformation; standard is 4–14 day rule based on infarct size (small = 4 days, large = 14 days)"]},{"id":"migraine","name":"Migraine","system":"Neurology","presentation":["Unilateral throbbing/pulsating headache lasting 4–72 hours","Nausea/vomiting; aggravated by routine physical activity","Photophobia and phonophobia (often both)","Aura in ~30%: visual (fortification spectra, scotoma), sensory (unilateral paraesthesia), or speech disturbance — precedes headache by 20–60 min","Prodrome hours before: yawning, fatigue, food cravings; postdrome fatigue after"],"signs":["Neurological examination typically normal between and during attacks","Fundoscopy normal — performed to exclude papilloedema (raised ICP)","Blood pressure measured to exclude hypertensive headache (>180/120 mmHg)","Neck stiffness absent — presence mandates exclusion of meningitis/SAH"],"investigations":{"bedside":["Clinical diagnosis — no investigation required if classic history and normal exam","Blood pressure and pulse (exclude hypertensive emergency, exclude vasospasm)","Urine dipstick if first severe headache in young woman (exclude pre-eclampsia)"],"bloods":["FBC, CRP, ESR if age >50 or new headache pattern — exclude giant cell arteritis (ESR >50 mm/hr supports GCA)","Glucose if aura present — exclude hypoglycaemia mimicking neurological aura","Coagulation/group-and-save only if CT-negative thunderclap headache proceeding to LP"],"imaging":["CT head (non-contrast) only if red flags present: thunderclap onset, first/worst headache, progressive over weeks, focal neurology, papilloedema, immunocompromised, age >50 — normal CT does not exclude SAH (sensitivity ~98% at <6 h, falls thereafter)","MRI brain with gadolinium if CT negative but suspicion remains, or for haemiplegic/basilar migraine variants to exclude structural cause","LP (not imaging) for xanthochromia if thunderclap headache with normal CT — SAH excluded only by CSF analysis >12 h after onset"]},"mx":["Acute attack: oral triptan (5-HT1 agonist, e.g. sumatriptan) + NSAID (e.g. ibuprofen) or paracetamol; add antiemetic (e.g. metoclopramide) if vomiting; take early in attack","Prophylaxis (≥4 attacks/month or significant disability): first-line propranolol (beta-blocker) or topiramate (anticonvulsant); second-line amitriptyline (TCA) or candesartan; CGRP monoclonal antibodies (e.g. erenumab) for refractory cases","Non-pharmacological: identify and avoid triggers (sleep, diet, stress, hormonal), menstrual migraine — consider NSAID peri-menstrually or continuous OCP"],"traps":["Thunderclap headache (maximal intensity at onset, 'worst ever') = SAH until proven otherwise — do not diagnose migraine without CT then LP","Topiramate is teratogenic — must not be used in women of childbearing potential without effective contraception; valproate similarly contraindicated","Triptans are contraindicated in ischaemic heart disease, uncontrolled hypertension, and previous stroke/TIA — always check cardiovascular history before prescribing","Medication overuse headache: analgesics or triptans on ≥10–15 days/month paradoxically worsen headache frequency — the treatment is gradual withdrawal, not dose escalation"]},{"id":"parkinsons","name":"Parkinson's disease","system":"Neurology","presentation":["Resting tremor — typically unilateral onset, 4–6 Hz, pill-rolling","Bradykinesia — slowness of movement, reduced amplitude on repetitive tasks","Rigidity — lead-pipe or cogwheel (tremor superimposed on rigidity)","Postural instability — falls, impaired righting reflexes (later feature)","Non-motor symptoms — anosmia, REM sleep behaviour disorder, constipation, depression, cognitive impairment"],"signs":["Pill-rolling resting tremor — suppressed by voluntary movement, re-emerges at rest","Cogwheel rigidity — felt at wrist on passive flexion/extension; lead-pipe if no tremor component","Festinant gait — shuffling, small steps, stooped posture, reduced arm swing, difficulty initiating","Hypomimia — reduced facial expression; also micrographia, hypophonia"],"investigations":{"bedside":["Clinical diagnosis — UK Brain Bank criteria: bradykinesia + at least one of rigidity, resting tremor, postural instability","Postural BP (lying and standing) — autonomic dysfunction; >20 mmHg systolic drop","Montreal Cognitive Assessment (MoCA) — baseline cognitive screen"],"bloods":["Serum ceruloplasmin + copper + 24 h urine copper — exclude Wilson's disease in onset <50 years","TFTs — hypothyroidism can cause slowness and tremor mimicking Parkinsonism","FBC, renal and liver function — baseline before starting medications"],"imaging":["DaTscan (123I-ioflupane SPECT) — images dopamine transporter density in striatum; reduced uptake confirms dopaminergic deficit, distinguishing Parkinson's from essential tremor (normal DaT) or drug-induced Parkinsonism (normal DaT); does not distinguish PD from atypical Parkinsonism (MSA, PSP)","MRI brain — not diagnostic for PD; used to exclude structural causes (hydrocephalus, vascular Parkinsonism, space-occupying lesion) or atypical features"]},"mx":["Levodopa (+ dopa-decarboxylase inhibitor, e.g. co-careldopa/co-beneldopa) — most effective motor therapy; first-line in older patients or those with significant disability","Dopamine agonists (e.g. ropinirole, pramipexole, rotigotine patch) — consider first-line in younger patients to delay levodopa motor complications; monitor for impulse control disorders","MAO-B inhibitors (e.g. rasagiline, selegiline) — mild symptoms or adjunct; neuroprotective claim unproven"],"traps":["Never stop levodopa abruptly — risk of neuroleptic malignant syndrome-like akinetic crisis","Avoid dopamine-blocking antiemetics — metoclopramide and prochlorperazine worsen Parkinsonism; use domperidone (peripherally acting) instead","Dopamine agonist impulse control disorders — gambling, hypersexuality, binge eating; must counsel patient and carer before starting","Drug-induced Parkinsonism mimics PD — caused by antipsychotics, metoclopramide, prochlorperazine; DaTscan is normal, distinguishing it from true PD"]},{"id":"status-epilepticus","name":"Status epilepticus","system":"Neurology","presentation":["Seizure lasting >5 minutes without spontaneous cessation","Recurrent seizures without recovery of consciousness between episodes","Known epilepsy with subtherapeutic AED levels or missed doses","Acute precipitant: hypoglycaemia, hyponatraemia, CNS infection, head injury, stroke, alcohol withdrawal","No return to baseline between episodes (distinguishes from cluster seizures)"],"signs":["Active tonic-clonic activity or subtle motor signs (non-convulsive status)","Post-ictal confusion, reduced GCS, unresponsive between convulsions","Todd's paresis — transient focal weakness after cessation indicating focal cortical origin","Lateral tongue biting, urinary incontinence, cyanosis during ictal phase"],"investigations":{"bedside":["BM — exclude hypoglycaemia as reversible cause (treat if <4 mmol/L)","Obs including temperature — pyrexia suggests CNS infection or systemic cause","12-lead ECG — exclude cardiac arrhythmia mimicking or precipitating event"],"bloods":["Glucose and U&Es — hypo/hyperglycaemia, hyponatraemia, hypomagnesaemia as direct causes","FBC and CRP — infection screen; leucocytosis may be post-ictal or infective","AED drug levels (e.g. phenytoin, valproate) — subtherapeutic level common precipitant","Toxicology screen — alcohol, recreational drugs, tricyclics; ABG for metabolic acidosis and oxygenation"],"imaging":["CT head — once stabilised; exclude structural cause (tumour, haemorrhage, abscess)","MRI brain with contrast — preferred if CT negative and no clear cause identified","EEG — essential if non-convulsive status epilepticus suspected (no motor activity but altered consciousness)"]},"mx":["Airway, breathing, circulation — high-flow O2, IV access, position (recovery if possible), call for help","First-line benzodiazepine: IV lorazepam (preferred if IV access) or buccal midazolam / PR diazepam (if no IV); may repeat once after 5-10 minutes if seizure continues","Second-line (if seizure continues after 2 benzodiazepine doses): IV levetiracetam, sodium valproate, or phenytoin infusion — senior/anaesthetic involvement","Refractory status (>45 min or failed 2nd-line): rapid sequence induction and general anaesthesia in ITU"],"traps":["Giving more than two benzodiazepine doses without escalating to second-line risks respiratory depression and delay — must escalate after max 2 doses","Missing hypoglycaemia as a correctable cause — always check BM immediately and treat before or alongside AEDs","Non-convulsive status epilepticus — patient appears confused or unresponsive without obvious motor activity; requires EEG to diagnose and is frequently missed","Phenytoin is contraindicated in absence and myoclonic status — know which AED to choose based on seizure type"]},{"id":"tia","name":"TIA","system":"Neurology","presentation":["Transient focal neurological deficit fully resolved within 24h (usually <1h)","Amaurosis fugax — sudden painless monocular visual loss ('curtain descending'), carotid territory","Contralateral hemiparesis or hemisensory loss, dysphasia, homonymous hemianopia","Vertebrobasilar: diplopia, dysphagia, ataxia, bilateral limb weakness or vertigo with focal signs","By definition: no residual deficit at time of assessment"],"signs":["Neurological examination often entirely normal at presentation (deficit resolved)","Carotid bruit on auscultation — suggests ipsilateral carotid stenosis","Irregular pulse — AF as cardioembolic cause","Hypertensive retinopathy or Hollenhorst plaques on fundoscopy"],"investigations":{"bedside":["ECG — AF (irregularly irregular, no P waves) as cardioembolic source","BM — exclude hypoglycaemia mimicking focal deficit","BP both arms — hypertension as risk factor; significant difference suggests subclavian steal"],"bloods":["FBC — polycythaemia (raised Hb/haematocrit) increases thrombotic risk; thrombocytosis","Lipid profile — LDL elevation guides statin therapy","HbA1c and fasting glucose — diabetes as vascular risk factor","Clotting screen and thrombophilia screen — if young or no obvious cause","ESR/CRP — giant cell arteritis if >50y with temporal symptoms"],"imaging":["MRI brain with DWI — may show restricted diffusion (small infarct) even if symptoms resolved; sequences to exclude haemorrhage and mimics","Carotid Doppler USS — stenosis >50% in symptomatic carotid territory indicates endarterectomy","CT brain — if MRI unavailable or contraindicated; excludes haemorrhage but less sensitive for ischaemia","Echocardiogram — if cardioembolic source suspected (AF, valvular disease, patent foramen ovale)"]},"mx":["Aspirin 300mg immediately (loading dose) then dual antiplatelet (aspirin + clopidogrel) for 21 days, then clopidogrel monotherapy","Urgent specialist (TIA clinic or stroke unit) review within 24h of symptom onset — same-day if high-risk (ABCD2 ≥4, crescendo TIA, AF, known carotid stenosis)","Anticoagulate if AF identified — DOAC (e.g. apixaban) preferred over warfarin; do not delay for 2-week observation window","Statin therapy (high-intensity, e.g. atorvastatin) and antihypertensive if indicated","Carotid endarterectomy within 2 weeks if symptomatic carotid stenosis 50–99% (NASCET criteria)"],"traps":["TIA + AF: start anticoagulation promptly — do NOT apply the 2-week antiplatelet-first rule used after established ischaemic stroke; the haemorrhagic transformation risk window does not apply to TIA","ABCD2 score is de-emphasised in current NICE guidance — do not use it to triage who gets urgent assessment; all TIAs warrant same-day or next-day specialist review","Amaurosis fugax = carotid territory TIA (ophthalmic artery branch of ICA) — triggers carotid Doppler and same-day review, not 'ophthalmology referral only'","Hypoglycaemia is the must-not-miss mimic — always check BM before labelling focal deficit as TIA/stroke","Crescendo TIA (≥2 TIAs in 1 week) = stroke emergency — admit immediately, do not discharge from ED"]},{"id":"aki","name":"Acute kidney injury","system":"Renal","presentation":["Oliguria (<0.5 mL/kg/hr) or anuria","Fluid overload: breathlessness, peripheral oedema, orthopnoea","Uraemic symptoms: nausea, vomiting, confusion, pruritus, hiccups","Precipitant history: dehydration, sepsis, nephrotoxic drugs, urinary symptoms suggesting obstruction"],"signs":["Fluid status: dry (pre-renal) — reduced skin turgor, sunken eyes, low BP, tachycardia; or overloaded — raised JVP, peripheral oedema, pulmonary crackles","Uraemic signs: pericardial friction rub, encephalopathy, asterixis (metabolic flap)","Obstruction signs: palpable bladder (urinary retention), renal angle tenderness","Sepsis signs: fever, hypotension, tachycardia as precipitating cause"],"investigations":{"bedside":["Urine dipstick: haematuria/proteinuria suggests intrinsic renal cause (glomerulonephritis, vasculitis); nitrites/leucocytes suggest UTI/sepsis","Strict fluid balance and urine output monitoring (catheterise if oliguric)","ECG: peaked T waves, wide QRS, sine wave pattern — hyperkalaemia requires urgent management"],"bloods":["Creatinine: KDIGO staging — Stage 1: ×1.5–1.9 baseline or rise ≥26 µmol/L in 48 h; Stage 2: ×2–2.9 baseline; Stage 3: ×3 baseline or ≥354 µmol/L or RRT required","Urea: elevated (urea:creatinine ratio >100:1 favours pre-renal); urea raised disproportionately in dehydration/GI bleed","Potassium: hyperkalaemia (>6.5 mmol/L or ECG changes) is a dialysis indication","Bicarbonate/ABG: metabolic acidosis (low HCO3, low pH) — severity guides need for RRT","FBC, CRP, blood cultures if sepsis; urine MC&S; immunology (ANCA, anti-GBM, complement) if intrinsic renal disease suspected"],"imaging":["Renal USS: hydronephrosis = post-renal obstruction → urgent urology; bilateral small kidneys (<9 cm) = underlying CKD not AKI","CXR: pulmonary oedema (fluid overload), cardiomegaly; assess for infective precipitant"]},"mx":["Identify and treat cause: pre-renal (IV fluids — crystalloid bolus, then reassess), intrinsic renal (stop nephrotoxics, treat underlying cause e.g. immunosuppression for vasculitis), post-renal (catheterise for retention; urology for obstruction)","Stop nephrotoxics — DAMN: Diuretics (in hypovolaemia), ACEi/ARBs, Metformin, NSAIDs; review all drug doses for eGFR","Manage complications: treat hyperkalaemia (calcium gluconate, insulin-dextrose, salbutamol); correct acidosis; restrict fluid if overloaded; renal replacement therapy (RRT) indications — AEIOU: Acidosis, Electrolyte disturbance, Intoxication, Overload, Uraemia"],"traps":["DAMN drugs: must stop Diuretics (if pre-renal), ACEi/ARBs, Metformin (lactic acidosis risk), NSAIDs — a common AKT question asks which to withhold","Dialysis indications — AEIOU: refractory Acidosis (pH <7.1), Electrolyte disturbance (K+ >6.5 unresponsive to treatment), Intoxication (lithium, salicylates), fluid Overload refractory to diuretics, Uraemia (encephalopathy, pericarditis, bleeding)","Small kidneys on USS (<9 cm bilaterally) = CKD not AKI — chronicity changes management entirely; do not aggressively fluid-load CKD","Urea:creatinine ratio >100:1 suggests pre-renal AKI (dehydration, cardiac failure, hepatorenal) but is also elevated in GI bleed and high protein intake — not diagnostic alone"]},{"id":"ckd","name":"CKD","system":"Renal","presentation":["Often asymptomatic in early stages (G1-G3a) — detected incidentally on bloods or urine dip","Fatigue, dyspnoea, pallor (anaemia of CKD)","Nocturia, frothy urine (proteinuria), peripheral oedema","Uraemic symptoms (G4-G5): anorexia, nausea, pruritus, confusion, pericarditis"],"signs":["Pallor (normochromic normocytic anaemia of CKD)","Hypertension (cause and consequence of CKD)","Peripheral oedema (nephrotic-range proteinuria or fluid overload in late CKD)","AV fistula scar/thrill at wrist or antecubital fossa (established on haemodialysis)","Uraemic frost — white crystalline deposits on skin (rare, end-stage)"],"investigations":{"bedside":["Urine dip: proteinuria (marker of glomerular damage), haematuria (glomerulonephritis, ADPKD)","Urine ACR (albumin:creatinine ratio): A1 <3, A2 3-30, A3 >30 mg/mmol — staging and risk stratification","BP measurement: target <130/80 in CKD with proteinuria"],"bloods":["eGFR (CKD-EPI): G1 ≥90, G2 60-89, G3a 45-59, G3b 30-44, G4 15-29, G5 <15 ml/min/1.73m² — diagnosis requires <60 for >3 months OR structural/functional kidney damage","FBC: normochromic normocytic anaemia (reduced erythropoietin production)","U&E: raised urea and creatinine; hyperkalaemia (especially G4-G5 or on ACEi/ARB)","Bone profile: raised phosphate, low calcium, raised PTH, low vitamin D (renal osteodystrophy/secondary hyperparathyroidism)","Bicarbonate: metabolic acidosis (reduced H+ excretion in advanced CKD)"],"imaging":["Renal USS: small (<9 cm), echogenic kidneys with cortical thinning bilaterally — distinguishes CKD from AKI (normal/large kidneys in AKI)","USS also excludes obstructive uropathy (hydronephrosis — reversible cause of CKD)","ADPKD exception: large kidneys bilaterally with multiple cysts on USS"]},"mx":["Renoprotection: ACEi (e.g. ramipril) or ARB (e.g. losartan) — first-line if proteinuria present; reduce intraglomerular pressure and proteinuria; SGLT2 inhibitor (e.g. dapagliflozin) added for diabetic CKD or CKD with proteinuria","BP control: target <130/80 mmHg (tighter if proteinuria); ACEi/ARB preferred agent","Treat complications: EPO analogue (erythropoiesis-stimulating agent) for anaemia of CKD once iron replete; phosphate binders + active vitamin D (alfacalcidol) for renal bone disease; sodium bicarbonate for metabolic acidosis","Statin for all CKD patients (high cardiovascular risk regardless of lipid levels)","RRT planning (haemodialysis, peritoneal dialysis, transplant) when approaching G5 or uraemic symptoms"],"traps":["ACEi/ARB: acceptable to continue if creatinine rises ≤25% or eGFR falls ≤25% from baseline — this is expected haemodynamic effect, not toxicity; stop if K⁺ exceeds 6.0 mmol/L","Small echogenic kidneys = CKD (chronic scarring/fibrosis); normal or large kidneys in AKI — USS is key to differentiate when chronicity is uncertain","CKD requires eGFR <60 for >3 months OR evidence of kidney damage (proteinuria, haematuria, structural abnormality) — a single low eGFR reading alone is not CKD","Anaemia of CKD is normochromic normocytic with low reticulocyte count — do not assume iron deficiency without checking ferritin/transferrin saturation; treat iron deficiency first before EPO","ADPKD causes large not small kidneys — do not be caught out by bilateral flank masses in a young patient with family history and haematuria","Metformin and NSAIDs should be withheld/avoided in G4-G5 CKD — metformin (lactic acidosis risk), NSAIDs (further reduce GFR via afferent arteriolar constriction)"]},{"id":"uti","name":"UTI","system":"Renal","presentation":["Dysuria, frequency, urgency (lower UTI / cystitis)","Haematuria — macroscopic or dipstick","Suprapubic pain or discomfort","Pyelonephritis: loin pain, fever, rigors, nausea/vomiting (systemic sepsis possible)","Asymptomatic bacteriuria — significant only in pregnancy"],"signs":["Suprapubic tenderness (cystitis)","Renal angle / costovertebral angle tenderness (pyelonephritis)","Fever, tachycardia, hypotension if urosepsis","No signs in uncomplicated lower UTI"],"investigations":{"bedside":["Urine dipstick: nitrites + leucocyte esterase positive (nitrites alone highly specific for bacteriuria)","Urine MC&S (midstream sample) — send before antibiotics if pyelonephritis, men, pregnant, recurrent or treatment failure","Pregnancy test in all women of childbearing age","Observations / NEWS if systemically unwell (sepsis 6 if urosepsis)"],"bloods":["FBC: raised WBC (neutrophilia) in pyelonephritis/urosepsis","CRP: elevated in upper UTI","U&E and creatinine: renal function if pyelonephritis or obstruction suspected","Blood cultures x2 if febrile / urosepsis before antibiotics"],"imaging":["Renal USS: first-line if obstruction suspected, recurrent UTI, men, or inadequate treatment response","CT KUB (non-contrast): if calculi or anatomical abnormality suspected","CT urogram / MAG3 renogram: recurrent upper UTI or structural anomaly work-up"]},"mx":["Lower UTI (non-pregnant): nitrofurantoin 3–7 days (first-line) or trimethoprim 7 days (if low resistance risk)","Pyelonephritis (oral, well): ciprofloxacin 7 days or co-amoxiclav 14 days; guided by MC&S","Pyelonephritis (IV, unwell/urosepsis): IV co-amoxiclav or gentamicin; step down to oral once apyrexial 24h","Pregnancy: treat all bacteriuria (including asymptomatic); cefalexin or nitrofurantoin (avoid nitrofurantoin at term ≥36 weeks); avoid trimethoprim in 1st trimester (folate antagonist)","Catheter-associated UTI: treat only if symptomatic; change catheter before starting antibiotics"],"traps":["Always treat bacteriuria in pregnancy — asymptomatic bacteriuria in pregnancy causes pyelonephritis and preterm labour if untreated","Avoid trimethoprim in 1st trimester (folate antagonist → neural tube defect risk) and avoid nitrofurantoin at term (≥36 weeks — neonatal haemolysis risk)","Catheter UTI: do NOT treat asymptomatic bacteriuria in catheterised patients — treat only if symptomatic (fever, rigors, loin pain, delirium)","Nitrites negative does not exclude UTI — Enterococcus and Staphylococcus saprophyticus do not produce nitrites; rely on leucocyte esterase + clinical context","Men with UTI need investigation (USS ± urology referral) — anatomical abnormality or prostatitis must be excluded"]},{"id":"ida","name":"Iron deficiency anaemia","system":"Haematology","presentation":["Fatigue and lethargy","Dyspnoea on exertion","Pica (craving for ice, dirt, or clay)","Restless legs syndrome","Angular cheilitis and sore mouth"],"signs":["Pallor (conjunctival, palmar)","Koilonychia (spoon-shaped nails)","Angular cheilitis","Atrophic glossitis (smooth, sore tongue)"],"investigations":{"bedside":["Observations (HR↑ if severe — compensatory tachycardia)","Urine dip (haematuria as bleeding source)","Stool faecal occult blood (if GI blood loss suspected)"],"bloods":["FBC: Hb↓, MCV↓ (microcytic), MCH↓ (hypochromic)","Blood film: microcytic hypochromic red cells, pencil cells, anisocytosis, poikilocytosis","Serum ferritin↓ (most sensitive single test for iron deficiency)","Serum iron↓, TIBC↑, transferrin saturation↓"],"imaging":["OGD ± colonoscopy to identify GI bleeding source (mandatory if unexplained IDA in adults)","Coeliac serology (anti-tTG IgA) — malabsorption cause","CT abdomen/pelvis if 2WW colorectal cancer referral indicated"]},"mx":["Oral ferrous sulfate (iron replacement — continue for 3 months after Hb normalises to replenish stores)","Investigate and treat the underlying cause (do not simply replace iron without finding the source)","2-week-wait urgent referral if unexplained IDA in patient ≥60 years (colorectal cancer until proven otherwise)"],"traps":["Always find the cause — treating IDA without identifying the source misses GI malignancy","Continue iron 3 months after Hb normalises — stopping at Hb correction leaves stores depleted and anaemia recurs","Ferritin is an acute phase reactant — can be falsely normal or elevated in infection/inflammation despite iron deficiency; check CRP alongside","Thalassaemia trait also gives microcytic hypochromic picture — distinguish by iron studies (ferritin normal/raised) and blood film (target cells, basophilic stippling)"]},{"id":"neutropenic-sepsis","name":"Neutropenic sepsis","system":"Haematology","presentation":["Fever ≥38°C (or hypothermia <36°C) in patient on chemotherapy","Rigors, sweating, feeling unwell — often no localising source","Fatigue, confusion or altered consciousness in severe cases","Recent chemotherapy (typically 7–14 days prior — nadir period)","May present with diarrhoea, mucositis, or mouth pain (portal of entry)"],"signs":["Signs often blunted — no pus, minimal erythema due to absent neutrophils","Fever (or rarely hypothermia); tachycardia ± hypotension (septic shock)","Inspect mouth (mucositis, oral candida), central line/port sites (erythema, tenderness)","Perianal area may be source — inspect carefully; no rectal examination"],"investigations":{"bedside":["Observations: temp >38°C or <36°C, HR >90, RR >20, BP (MAP <65 = septic shock)","UKONS risk score (≥3 = high risk; admission + IV antibiotics)","Urine dipstick ± MSU if urinary symptoms"],"bloods":["FBC: neutrophils <0.5 ×10⁹/L (severe) or <1.0 ×10⁹/L with falling trend — defines neutropenia","Blood cultures: two sets — peripheral vein AND central line/port (before antibiotics but do not delay Abx)","CRP, U&E, LFTs, lactate (lactate ≥2 = sepsis; ≥4 = septic shock), coagulation screen","Procalcitonin if available; G-CSF level not routinely measured"],"imaging":["CXR: exclude pneumonia (infiltrates may be subtle without neutrophils)","CT chest/abdomen/pelvis: if no source identified and patient deteriorating — neutropenic enterocolitis (typhlitis)","USS or CT of suspected collection/line site if clinically indicated"]},"mx":["Piperacillin-tazobactam (Tazocin) IV — broad-spectrum anti-pseudomonal beta-lactam; first-line per UKONS/NICE NG151","Start IV antibiotics within 1 hour of presentation — do not wait for culture results or neutrophil count confirmation","Add vancomycin (glycopeptide) if MRSA risk, line infection suspected, or haemodynamically unstable; G-CSF (filgrastim) if prolonged neutropenia or high-risk features"],"traps":["DO NOT wait for neutrophil count result or culture results before giving antibiotics — 1-hour rule is absolute","Signs are blunted: absence of erythema, fluctuance or pus does NOT exclude serious infection — threshold to treat must be low","Afebrile patients can still have neutropenic sepsis — hypothermia or just feeling unwell post-chemo counts; don't anchor on fever","Always take cultures from BOTH peripheral vein AND central line before antibiotics — tells you if line is the source — but never delay Abx to do this"]},{"id":"vte","name":"VTE (DVT/PE)","system":"Haematology","presentation":["DVT: unilateral calf swelling, pain, warmth, erythema, pitting oedema","PE: sudden dyspnoea, pleuritic chest pain, haemoptysis, collapse/syncope","PE: tachycardia, low O2 sats, sense of impending doom"],"signs":["DVT: unilateral calf swelling >3 cm vs contralateral, pitting oedema, warmth, erythema; Homan's sign unreliable (insensitive and non-specific)","PE: tachycardia (most common), tachypnoea, hypoxia, pleural rub, raised JVP (RV strain)","Massive PE: hypotension, shocked, RV heave, loud P2"],"investigations":{"bedside":["Obs + O2 sats: tachycardia, hypoxia (SpO2 <94%)","ECG: sinus tachycardia most common; S1Q3T3 (deep S in I, Q wave + T inversion in III) suggests RV strain; new RBBB","Wells score pre-test probability (DVT and PE versions) — guides D-dimer vs direct imaging"],"bloods":["D-dimer: ELISA — high sensitivity, low specificity; use only if Wells low/intermediate probability to exclude VTE; raised in infection, malignancy, pregnancy (not useful to confirm)","ABG: Type 1 respiratory failure (low PaO2, low/normal PaCO2) due to V/Q mismatch; respiratory alkalosis from hyperventilation","FBC, U&E, LFTs, clotting: baseline before anticoagulation; consider thrombophilia screen if unprovoked (defer until off anticoagulation)"],"imaging":["CTPA (CT pulmonary angiogram): first-line for suspected PE — filling defects in pulmonary arteries; saddle embolus in massive PE","V/Q scan: alternative if CTPA contraindicated (contrast allergy, renal impairment, pregnancy — reduces radiation to breasts)","USS lower limb (Doppler): first-line for DVT — non-compressible vein on compression; CXR may show Westermark sign (oligaemia), Hampton's hump (peripheral wedge opacity), or may be normal"]},"mx":["DOAC first-line (apixaban or rivaroxaban) — no bridging required; provoked VTE: 3 months; unprovoked or high-risk: 6 months+","LMWH (e.g. enoxaparin) in pregnancy (DOACs cross placenta — contraindicated), active cancer, or antiphospholipid syndrome (use warfarin, target INR 2-3 or 3-4 if arterial)","Massive PE with haemodynamic instability: systemic thrombolysis (alteplase) or surgical embolectomy; catheter-directed thrombolysis if available"],"traps":["DOACs contraindicated in pregnancy — use LMWH throughout; switch to LMWH or heparin around delivery","Antiphospholipid syndrome: DOACs inferior to warfarin — use warfarin (INR 2-3); triple-positive APS warrants lifelong anticoagulation","Provoked (transient risk factor e.g. surgery, immobility) = 3 months; unprovoked = minimum 6 months, consider indefinite with shared decision-making","D-dimer is only useful to exclude VTE in low/intermediate Wells probability — never use to confirm diagnosis; always raised in pregnancy, malignancy, post-op"]},{"id":"warfarin-reversal","name":"Warfarin reversal / supratherapeutic INR","system":"Haematology","presentation":["Incidental supratherapeutic INR on routine monitoring (no bleeding)","Easy bruising or prolonged bleeding from minor cuts","Frank haematuria, haemoptysis, or rectal bleeding","Intracranial bleed: sudden headache, focal neurology, reduced GCS","Drug interaction or intercurrent illness causing INR to rise unexpectedly"],"signs":["Visible bruising, petechiae, or haematoma at venepuncture/pressure sites","Bleeding from gums, epistaxis, or operative wounds","Focal neurological deficit or reduced consciousness (intracranial bleed)","Haemodynamic instability (tachycardia, hypotension) suggesting major haemorrhage"],"investigations":{"bedside":["Observations: HR, BP, O2 sats — haemodynamic stability determines urgency","Urine dipstick: haematuria","Point-of-care INR (finger-prick) if available for rapid result"],"bloods":["INR: guides management — >5 with no bleed, >8, or major bleed each have distinct thresholds","FBC: haemoglobin to quantify blood loss; platelets to exclude concurrent thrombocytopaenia","U&E and LFTs: renal/hepatic causes of warfarin sensitivity","Group and save / crossmatch if major haemorrhage suspected"],"imaging":["CT head (non-contrast) urgently if any head injury, headache, or neurological signs — exclude intracranial haemorrhage","CT chest/abdomen/pelvis if internal haemorrhage suspected and haemodynamically stable","Ultrasound: retroperitoneal or soft-tissue haematoma if clinically indicated"]},"mx":["Major bleed (any INR): stop warfarin immediately; IV vitamin K 5–10 mg; Prothrombin Complex Concentrate (PCC, e.g. Beriplex) for rapid factor replacement; involve haematology and consider urgent reversal of anticoagulation","INR >8, no bleeding (or minor bleeding): stop warfarin; oral vitamin K 1–5 mg; recheck INR in 24 hours; restart warfarin at lower dose once INR in range","INR 5–8, no bleeding: withhold 1–2 doses of warfarin; recheck INR; consider low-dose oral vitamin K if other bleeding risk factors present"],"traps":["PCC (Beriplex) preferred over FFP for major bleeding: faster reversal, lower volume, more complete factor replacement — FFP is no longer first-line","Common drug interactions raising INR: antibiotics (metronidazole, ciprofloxacin, fluconazole), amiodarone, NSAIDs, cranberry juice — always take a drug/diet history","Do not give high-dose IV vitamin K if restarting anticoagulation is planned — will cause warfarin resistance for days; use low oral dose instead","Intracranial haemorrhage on warfarin requires immediate reversal regardless of how supratherapeutic the INR is — do not wait for CT result before giving PCC"]},{"id":"cellulitis","name":"Cellulitis","system":"Infectious Disease","presentation":["Spreading erythema with well-demarcated or ill-defined border","Local warmth, swelling, and tenderness","Pain — often disproportionate pain should raise suspicion of necrotising fasciitis","Systemic features if severe: fever, rigors, tachycardia, hypotension","Portal of entry identifiable in ~50%: skin break, tinea pedis, insect bite, leg ulcer"],"signs":["Eron class I: no systemic features, no comorbidities; II: systemic features OR significant comorbidity; III: systemic illness (e.g. confusion, tachycardia) OR limb-threatening; IV: sepsis/life-threatening","Mark erythema border with skin marker pen and time/date to track progression","Lymphangitis: red streaking tracking proximally along lymphatic channels","Portal of entry: interdigital tinea, wound, ulcer, puncture — look actively"],"investigations":{"bedside":["Obs: temperature, HR, BP, RR, SpO2 — assess for sepsis (Eron III-IV)","Mark erythema border with pen + timestamp to monitor spread or resolution","Urine dip/MRSA swab of portal of entry if recurrent or hospital-acquired"],"bloods":["FBC: raised WBC (neutrophilia) indicates bacterial infection","CRP/ESR: elevated — useful to trend response to treatment","Blood cultures: if systemic features (fever, rigors, Eron III-IV) before starting antibiotics","U&Es and LFTs: baseline before IV antibiotics; renal function guides dosing"],"imaging":["USS soft tissue: exclude underlying abscess (needs incision and drainage) or fluid collection","MRI soft tissue: if necrotising fasciitis suspected — tracking along fascial planes; do not delay surgery for imaging if clinical suspicion high","Plain X-ray: if gas-forming infection or foreign body suspected"]},"mx":["Eron I-II (no systemic features): oral flucloxacillin (covers Staph aureus and Streptococcus) — first-line; clarithromycin or co-amoxiclav if penicillin allergic or polymicrobial","Eron III-IV (systemic illness): IV flucloxacillin; add benzylpenicillin if extensive streptococcal spread; escalate to piperacillin-tazobactam if MRSA risk or severe","Elevate affected limb; mark border and reassess at 24-48 h; treat underlying predisposing factors (e.g. tinea pedis with topical antifungal)"],"traps":["Necrotising fasciitis red flags: wooden-hard induration, pain out of proportion to appearance, skin necrosis/blistering, crepitus (gas) = surgical emergency — immediate surgical debridement, do not await imaging if clinically suspected","Bilateral lower limb 'cellulitis' is almost never bilateral cellulitis — find the true cause: venous insufficiency/lipodermatosclerosis, lymphoedema, contact dermatitis","DVT must be excluded in unilateral leg swelling with erythema — USS Doppler if clinical doubt; cellulitis and DVT can co-exist","Abscess within cellulitis: fluctuance or failure to respond to antibiotics → USS and incision + drainage required; antibiotics alone will not clear a pus collection"]},{"id":"sepsis","name":"Sepsis","system":"Infectious Disease","presentation":["Fever >38°C or hypothermia <36°C, often with rigors","Confusion or altered consciousness (new)","Tachycardia and tachypnoea","Hypotension (SBP <90 or drop >40 from baseline)","Source symptoms: dysuria/loin pain (urine), productive cough/pleurisy (chest), abdominal pain/peritonism (abdo), skin erythema/warmth (cellulitis)"],"signs":["SIRS criteria: HR >90, RR >20, temp <36 or >38°C, WBC <4 or >12","End-organ dysfunction: mottled/clammy skin, capillary refill >2s, oliguria (<0.5 mL/kg/hr), GCS drop","Hypotension refractory to fluids suggests septic shock","Source of infection: chest crepitations, suprapubic/renal angle tenderness, wound/line site erythema"],"investigations":{"bedside":["Observations + NEWS2 score (trigger for sepsis pathway if ≥5)","Point-of-care lactate (target <2 mmol/L; ≥2 = severe sepsis, ≥4 = very high risk)","Urine output monitoring (catheterise if shocked) + BM"],"bloods":["Blood cultures ×2 sets (before antibiotics — but do not delay antibiotics >1 hr)","Lactate: ≥2 mmol/L = sepsis with organ dysfunction; ≥4 = septic shock regardless of BP","FBC (WBC raised or low; neutrophilia common), CRP/procalcitonin (infection marker)","U&E/creatinine (AKI), LFTs, clotting (DIC screen), glucose, ABG (metabolic acidosis)"],"imaging":["CXR (pneumonia, effusion, pulmonary oedema)","USS abdomen/pelvis (abscess, biliary obstruction, collections)","CT chest/abdomen/pelvis if source remains unclear after initial assessment"]},"mx":["Sepsis Six — within 1 hour: GIVE O2 (target SpO2 >94%), IV fluids (500 mL crystalloid bolus), IV broad-spectrum antibiotics (per local policy, e.g. piperacillin-tazobactam)","Sepsis Six — TAKE: blood cultures (×2 before antibiotics), serum lactate, urine output (catheterise if shocked)","Septic shock: vasopressors (noradrenaline) if MAP <65 despite adequate fluid resuscitation; escalate to ITU; source control (drain abscess, remove infected line)"],"traps":["Take cultures BEFORE antibiotics — but never delay antibiotics beyond 1 hour waiting for cultures; the cultures come first only if it takes <15 minutes","Lactate ≥2 mmol/L = severe sepsis even with normal BP; lactate ≥4 = very high mortality risk regardless of haemodynamic status","Septic shock definition: sepsis + vasopressor required to maintain MAP ≥65 + lactate ≥2 despite adequate fluids — not simply 'low BP'","Hypothermia (<36°C) is a SIRS criterion and can indicate sepsis in frail/elderly — do not be reassured by absence of fever"]},{"id":"gca","name":"Giant cell arteritis","system":"Rheumatology","presentation":["New-onset headache in patient >50 years (typically temporal)","Scalp tenderness (e.g. pain on combing hair)","Jaw claudication (pain on chewing — highly specific)","Visual disturbance: amaurosis fugax, diplopia, or sudden painless monocular visual loss","PMR features: bilateral shoulder/hip girdle stiffness and aching"],"signs":["Tender, thickened, nodular or pulseless temporal artery on palpation","Reduced visual acuity or visual field defect (afferent pupillary defect if optic nerve involved)","Fundoscopy: pale swollen optic disc with blurred margins (anterior ischaemic optic neuropathy)","Fundoscopy: central retinal artery occlusion appearance (pale retina, cherry-red spot)"],"investigations":{"bedside":["Visual acuity (Snellen chart) — document before starting steroids","Fundoscopy: anterior ischaemic optic neuropathy (pale swollen disc) or central retinal artery occlusion"],"bloods":["ESR: markedly elevated, often >50 mm/hr (may be >100)","CRP: elevated (sensitive marker, may be raised when ESR is normal)","FBC: normocytic normochromic anaemia of chronic disease; thrombocytosis","Plasma viscosity (PV): elevated; LFTs (ALP raised in ~30%)"],"imaging":["Temporal artery biopsy: giant cell granulomatous inflammation with intimal hyperplasia — skip lesions mean a long segment (>1 cm) must be sampled","USS temporal artery: hypoechoic halo sign (mural oedema) — non-invasive first-line in many centres","MRI/CT angiography: if large-vessel GCA suspected (aortitis, subclavian involvement)"]},"mx":["High-dose corticosteroids (prednisolone) IMMEDIATELY on clinical suspicion — do not wait for biopsy result; delay risks irreversible blindness","If visual loss already present: IV methylprednisolone (high-dose pulsed corticosteroids) before switching to oral","Bone protection: bisphosphonate + calcium/vitamin D supplementation from outset given prolonged steroid course"],"traps":["Do NOT delay steroids to await biopsy — permanent bilateral blindness can occur within hours; treat on clinical suspicion","Biopsy remains positive for up to 2 weeks after starting steroids due to skip lesions — still worth doing","Normal ESR does not exclude GCA — CRP and clinical features can be positive with normal ESR (~5% of cases)","Jaw claudication (not jaw pain at rest) is highly specific for GCA and should prompt urgent treatment"]},{"id":"gout-acute","name":"Gout - acute","system":"Rheumatology","presentation":["Acute monoarthritis — typically 1st metatarsophalangeal (MTP) joint (podagra)","Rapid onset: maximal pain within 12–24 hours, often wakes patient at night","Severe pain, swelling, erythema, warmth — joint may be exquisitely tender to light touch","Precipitants: alcohol (especially beer), dehydration, diuretics (thiazide/loop), dietary purine load, illness/surgery","Background risk factors: male sex, obesity, chronic kidney disease, cyclosporin use"],"signs":["Erythema, warmth, and swelling over affected joint — may mimic cellulitis","Exquisite tenderness on palpation or passive movement of joint","Tophi: firm subcutaneous deposits at ear helix, olecranon, Achilles tendon — sign of chronic tophaceous gout","Fever may be present — can cause diagnostic confusion with septic arthritis"],"investigations":{"bedside":["Observations: temperature (fever common), HR, BP","Joint aspiration (gold standard): needle-shaped negatively birefringent crystals under polarised light microscopy; also send for MC&S to exclude septic arthritis"],"bloods":["Serum urate: often normal or LOW during acute attack — do not use to rule out gout acutely; baseline useful once resolved","WBC and CRP: raised — confirms inflammatory/infective process","Renal function (U&E): CKD is a risk factor; affects choice of NSAIDs and allopurinol dosing","LFTs and glucose: baseline before starting NSAIDs or colchicine"],"imaging":["X-ray (plain): may be normal in acute attack; chronic gout shows punched-out juxta-articular erosions with overhanging edge ('rat-bite' erosions), preserved joint space","Ultrasound: double contour sign — urate crystal deposition on articular cartilage surface; also detects tophi and joint effusion","Joint aspiration (diagnostic): monosodium urate crystals — needle-shaped, negatively birefringent (yellow parallel, blue perpendicular to compensator axis)"]},"mx":["Acute attack: NSAIDs (e.g. naproxen) first-line if no contraindication; colchicine is an alternative (SE: diarrhoea, nausea); short-course oral corticosteroid if both NSAIDs and colchicine contraindicated (e.g. severe CKD)","Rest and elevate affected joint; ice packs for symptomatic relief","Do NOT start urate-lowering therapy (allopurinol/febuxostat) during an acute attack — precipitates prolonged or recurrent attacks; begin 4–6 weeks after resolution with prophylactic colchicine cover"],"traps":["Serum urate can be NORMAL or LOW during the acute attack — a normal result does not exclude gout; recheck 4–6 weeks later","Never start allopurinol during an acute attack — it mobilises urate and worsens or prolongs the flare; always wait until fully resolved","Colchicine causes dose-dependent GI toxicity (diarrhoea, vomiting) — a common exam side-effect question; reduce dose in renal impairment","Septic arthritis must be excluded — both cause acute hot swollen joint with fever; joint aspiration MC&S is mandatory if diagnosis unclear (septic arthritis is a surgical emergency)"]},{"id":"gout-prevent","name":"Gout - chronic/prevention","system":"Rheumatology","presentation":["Recurrent acute attacks (≥2/year) — trigger for urate-lowering therapy","Tophi: firm, chalky deposits at ear helix, olecranon bursa, Achilles tendon","Chronic tophaceous arthritis — joint deformity, chronic pain between attacks","Uric acid renal stones (radiolucent on plain X-ray)","Renal impairment from urate nephropathy"],"signs":["Tophi — ear helix, olecranon, Achilles tendon, finger pulps","Asymmetric joint deformity (1st MTP, midfoot, ankle, knee)","Skin ulceration/discharge of chalky material over tophus","Signs of chronic renal disease (hypertension, pallor) if urate nephropathy"],"investigations":{"bedside":["Urine dipstick — haematuria/proteinuria if renal involvement; uric acid stones cause haematuria","Joint aspiration during attack — needle-shaped, negatively birefringent monosodium urate crystals under polarised light"],"bloods":["Serum urate — target <360 μmol/L on urate-lowering therapy (or <300 μmol/L if tophi present); note: can be normal during acute attack","U&E and eGFR — renal impairment is both a cause (reduced urate excretion) and consequence of hyperuricaemia; dose-adjust allopurinol","FBC — exclude haematological cause of high cell turnover (e.g. myeloproliferative disorder)","Fasting glucose and lipids — gout associated with metabolic syndrome"],"imaging":["X-ray affected joint — chronic changes: well-defined punched-out erosions with overhanging cortical edge (rat-bite erosion), preserved joint space until late, soft-tissue tophi","Ultrasound — double-contour sign (urate crystals on articular cartilage), hyperechoic tophaceous deposits","DECT (dual-energy CT) — identifies urate deposits if diagnosis uncertain; not routine"]},"mx":["Start urate-lowering therapy 2–4 weeks after acute attack settles (not during attack — risks prolonging it); first-line: allopurinol (xanthine oxidase inhibitor)","Always co-prescribe prophylactic cover when initiating allopurinol — colchicine (preferred) or NSAID for minimum 3–6 months to prevent initiation flare","Titrate allopurinol dose to serum urate <360 μmol/L; lifestyle: low-purine diet, reduce alcohol (especially beer), avoid diuretics where possible, ensure adequate hydration"],"traps":["Never start allopurinol during an acute attack — it precipitates a flare; wait 2–4 weeks and always co-prescribe colchicine/NSAID cover for first 3–6 months","Allopurinol + azathioprine = dangerous interaction — allopurinol inhibits xanthine oxidase (the enzyme that metabolises azathioprine/6-MP), causing azathioprine toxicity (severe myelosuppression); combination is contraindicated or requires 75% dose reduction of azathioprine","Serum urate can be normal or low during an acute attack — do not use a normal result to exclude gout acutely; repeat 4–6 weeks after attack","HLA-B*5801 screening before allopurinol in Han Chinese, Thai, Korean patients — associated with severe cutaneous reactions (Stevens-Johnson syndrome)"]},{"id":"ra","name":"Rheumatoid arthritis","system":"Rheumatology","presentation":["Symmetrical small joint polyarthritis (MCPs, PIPs — spares DIPs)","Morning stiffness >1 hour, improves with activity","Systemic features: fatigue, weight loss, low-grade fever","Extra-articular: rheumatoid nodules, sicca symptoms, pleuritis, episcleritis","Insidious onset over weeks–months in a woman aged 30–50"],"signs":["MCP/PIP swelling, tenderness, warmth; DIP spared","Ulnar deviation of fingers at MCPs","Boutonniere deformity (PIP flexion, DIP hyperextension) or swan-neck deformity (PIP hyperextension, DIP flexion)","Wasting of dorsal interossei; rheumatoid nodules over pressure points (olecranon)"],"investigations":{"bedside":["Joint count (28-joint DAS28): swollen + tender joint tally","Obs: fever suggests septic arthritis or flare","Urine dip: exclude renal involvement (vasculitis)"],"bloods":["Rheumatoid factor (RF): positive in ~70% — not specific (also SLE, Sjogren's, infection)","Anti-CCP antibodies: >95% specific for RA, positive before symptoms; titre predicts erosive disease","CRP + ESR: raised — track disease activity and treatment response","FBC: normocytic anaemia of chronic disease; thrombocytosis in active disease","LFTs + U&E + FBC: baseline before starting methotrexate (and monitored regularly)"],"imaging":["X-ray hands + feet (PA): periarticular osteoporosis → joint space narrowing → marginal erosions (bare areas at joint margins) → subluxation/deformity (late)","Ultrasound joints: synovitis confirmed by power Doppler; detects erosions earlier than plain X-ray","MRI hands: most sensitive for early bone erosions and synovitis; used when X-ray normal but clinical suspicion high"]},"mx":["DMARD monotherapy first-line: methotrexate (weekly oral/SC) + folic acid 5mg once weekly (different day) to reduce toxicity","Bridging: short-course prednisolone or IM methylprednisolone to suppress active inflammation while DMARD takes effect (6–12 weeks onset)","Escalation: combination csDMARDs (add hydroxychloroquine ± sulfasalazine) or switch to biologic (anti-TNF e.g. etanercept/adalimumab) if DAS28 remains >3.2 after 6 months adequate DMARD"],"traps":["Methotrexate is WEEKLY not daily — daily dosing causes fatal bone marrow suppression and mucositis; always prescribe as 'once weekly'","Folic acid must be co-prescribed (different day to methotrexate) — omitting it causes avoidable toxicity","Trimethoprim (and co-trimoxazole) is contraindicated with methotrexate — both are folate antagonists; combination risks life-threatening pancytopenia","Effective contraception required for both sexes on methotrexate — teratogenic; stop ≥3 months before planned conception"]},{"id":"bv-trich","name":"Bacterial vaginosis / Trichomonas","system":"Obstetrics & Gynaecology","presentation":["BV: thin grey-white vaginal discharge with fishy (amine) odour, worse after sex/menstruation","BV: no itch, no soreness — absence of inflammation is characteristic","Trich: frothy yellow-green discharge with offensive odour","Trich: vulval pruritus, dysuria, dyspareunia"],"signs":["BV: homogeneous grey-white discharge coating vaginal walls, pH >4.5, no erythema or inflammation","Trich: strawberry cervix (colpitis macularis) — punctate haemorrhages on cervix","Trich: frothy offensive discharge, vulval and vaginal erythema","Trich: may be asymptomatic in up to 50% of women"],"investigations":{"bedside":["Vaginal pH: >4.5 in both BV and Trich (normal <4.5)","Whiff test (KOH/amine test): fishy odour positive in BV; may be positive in Trich","Amsel's criteria for BV (3 of 4): homogeneous grey discharge, pH >4.5, positive whiff test, clue cells on wet prep"],"bloods":["STI screen if Trich confirmed (Trich is an STI — partner notification and treatment required)","Consider HIV, hepatitis B/C, syphilis, gonorrhoea, chlamydia screen alongside Trich"],"imaging":["Wet prep microscopy (saline): clue cells (epithelial cells studded with Gardnerella) — diagnostic of BV","Wet prep microscopy (saline): motile flagellated trichomonads — diagnostic of Trich","NAAT (nucleic acid amplification test): gold standard for Trichomonas vaginalis detection"]},"mx":["Both BV and Trich: oral metronidazole (nitroimidazole) — first-line for both","Trich: treat sexual partner(s) and advise abstinence until both complete treatment (Trich is an STI)","BV: partner treatment not routinely recommended (BV is not classified as an STI)"],"traps":["BV is NOT an STI — no routine partner treatment; Trich IS an STI — always treat partner","Metronidazole + alcohol = disulfiram-like reaction (flushing, vomiting) — counsel patients to avoid alcohol during and 48 hours after course","BV in pregnancy increases risk of preterm labour, late miscarriage, and postpartum endometritis — screen and treat","Trich can be asymptomatic — do not exclude based on absence of symptoms alone"]},{"id":"eclampsia","name":"Eclampsia","system":"Obstetrics & Gynaecology","presentation":["Tonic-clonic seizure in pregnancy (>20 weeks) or up to 4 weeks postpartum","Often preceded by pre-eclampsia features: headache, visual disturbance, epigastric/RUQ pain","Sudden-onset altered consciousness or coma post-ictally","Hypertension and proteinuria preceding seizure"],"signs":["Tonic-clonic seizure (may be witnessed)","Hypertension (BP ≥140/90, often severe)","Proteinuria on urine dip (≥2+)","Peripheral or facial oedema","Reduced GCS / post-ictal confusion"],"investigations":{"bedside":["BP (serial monitoring — establish severity)","Urine dip (proteinuria ≥2+) then MSU/PCR","CTG (fetal heart rate monitoring for fetal distress)"],"bloods":["FBC — thrombocytopenia in HELLP","LFTs — raised transaminases in HELLP; RUQ pain marker","LDH + blood film — haemolysis screen (HELLP)","Clotting (PT/APTT/fibrinogen) — DIC risk","U&E + creatinine — renal impairment","Urate — elevated in pre-eclampsia/eclampsia"],"imaging":["CT head (non-contrast) — exclude intracranial haemorrhage or other cause if atypical","MRI brain — posterior reversible encephalopathy syndrome (PRES) pattern if available","USS fetal wellbeing + liquor volume + umbilical artery Dopplers"]},"mx":["Seizure control: IV/IM magnesium sulphate (MgSO4) — loading dose then maintenance infusion; continue 24 hours after last seizure or delivery","Blood pressure control: IV labetalol or hydralazine for acute severe hypertension (target <150/100); oral nifedipine once stable","Deliver once mother stabilised — definitive treatment; mode depends on gestation and clinical status"],"traps":["MgSO4 is anticonvulsant not antihypertensive — a separate agent is needed for BP control","Mg toxicity signs: loss of patellar reflexes (first sign), respiratory depression, cardiac arrest — monitor reflexes hourly","Mg toxicity antidote: IV calcium gluconate 10 ml of 10% solution","Eclampsia can occur up to 4 weeks postpartum — seizure in a recently-delivered patient is eclampsia until proven otherwise","Continue MgSO4 for 24 hours after the last seizure or after delivery, whichever is later"]},{"id":"ectopic","name":"Ectopic pregnancy","system":"Obstetrics & Gynaecology","presentation":["Amenorrhoea (typically 6–8 weeks)","Unilateral lower abdominal/pelvic pain","Vaginal bleeding (usually light, dark)","Shoulder tip pain (diaphragmatic irritation from haemoperitoneum — ruptured)","Collapse/syncope (ruptured)"],"signs":["Adnexal tenderness (unilateral)","Cervical excitation (pathognomonic of pelvic pathology)","Peritonism — guarding, rigidity (ruptured)","Haemodynamic instability — tachycardia, hypotension (ruptured)"],"investigations":{"bedside":["Urine βhCG: positive (confirms pregnancy)","Observations: tachycardia + hypotension = ruptured until proven otherwise"],"bloods":["Serum quantitative βhCG: discriminatory zone 1500–2000 IU/L (no IUP on TVUSS above this = ectopic until proven otherwise)","Serial βhCG (48 h): normal IUP rises ≥63%; plateau/rise <63% or fall suggests ectopic/failed pregnancy","FBC: haemoglobin (haemorrhage)","Group & crossmatch: prepare for possible surgery"],"imaging":["TVUSS (first-line): empty uterus + adnexal mass ± fetal heartbeat; free fluid in pouch of Douglas indicates haemoperitoneum","No intrauterine pregnancy seen when βhCG >1500 IU/L = ectopic until proven otherwise"]},"mx":["Expectant: small, asymptomatic, βhCG falling (<1000 IU/L and declining) — close outpatient surveillance","Medical: methotrexate (folate antagonist) — criteria: haemodynamically stable, mass <35 mm, no fetal heartbeat, βhCG <1500 IU/L, no contraindications (renal/hepatic disease, immunodeficiency)","Surgical: salpingectomy (preferred) or salpingotomy — indicated if ruptured, haemodynamically unstable, medical criteria not met, or methotrexate fails; laparoscopic approach unless too unstable"],"traps":["Ruptured ectopic = surgical emergency — do not delay for further investigations if haemodynamically unstable","Heterotopic pregnancy (simultaneous IUP + ectopic) — rare spontaneously but increased risk after IVF; finding an IUP on USS does not exclude ectopic","Avoid pregnancy for 3 months after methotrexate (teratogenic — folate antagonist)","βhCG below discriminatory zone does not exclude ectopic — repeat serial levels and USS; a very early IUP may not yet be visible"]},{"id":"gdm","name":"Gestational diabetes","system":"Obstetrics & Gynaecology","presentation":["Often asymptomatic — screen-detected on OGTT","Polyuria and polydipsia if markedly hyperglycaemic","Risk factors: BMI >30, previous GDM, macrosomic baby (>4.5 kg) in prior pregnancy, first-degree relative with T2DM, South Asian / Black / Middle Eastern ethnicity"],"signs":["Uterus large-for-dates on symphysis-fundal height measurement","Macrosomia on abdominal palpation (large fetal parts, ballotable head above pelvic brim at term)","Polyhydramnios — uterus tense, fluid thrill, fetal parts difficult to feel","USS: abdominal circumference >95th centile, increased liquor volume"],"investigations":{"bedside":["Capillary blood glucose (BM) monitoring — fasting and 1 h post-meal targets (fasting <5.3, 1 h <7.8 mmol/L)","Urine dipstick for glycosuria — poor screening tool (low sensitivity/specificity in pregnancy); persistent 2+ warrants OGTT"],"bloods":["75 g OGTT (diagnostic): fasting glucose ≥5.6 mmol/L OR 2-hour glucose ≥7.8 mmol/L = GDM (NICE NG3)","HbA1c — NOT used to diagnose or monitor GDM (red cell turnover increased in pregnancy; falsely low)","Booking HbA1c or fasting glucose if high risk — used to detect pre-existing T2DM undiagnosed before pregnancy (HbA1c ≥48 mmol/mol = T2DM)"],"imaging":["USS growth scan (28, 32, 36 weeks): abdominal circumference, estimated fetal weight, liquor volume (AFI/deepest pool)","Polyhydramnios: deepest vertical pool >8 cm or AFI >24 cm — associated with poor glycaemic control","Umbilical artery Doppler if growth restriction suspected (placental insufficiency co-exists occasionally)"]},"mx":["Step 1 — diet and exercise: low glycaemic index diet, 30 min moderate activity daily; review at 1–2 weeks","Step 2 — metformin: if glucose targets not met on lifestyle alone (fasting <5.3, 1 h post-meal <7.8 mmol/L)","Step 3 — insulin: add (or use instead of metformin if contraindicated/not tolerated) if targets still not met; also start insulin immediately if fasting glucose ≥7.0 mmol/L at diagnosis","Postnatal: stop all hypoglycaemic agents at delivery; retest with fasting glucose or HbA1c at 6–13 weeks postnatally"],"traps":["HbA1c is unreliable in pregnancy — increased red cell turnover causes falsely low result; OGTT is the diagnostic test","OGTT thresholds in GDM (NICE): fasting ≥5.6 OR 2 h ≥7.8 — lower than standard T2DM thresholds; do not confuse","Fasting glucose ≥7.0 mmol/L at OGTT = start insulin immediately (do not trial diet/metformin first)","GDM resolves after delivery but confers ~50% lifetime risk of T2DM — postnatal retest and annual fasting glucose thereafter is mandatory","GDM is a risk fac
