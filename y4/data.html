<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Interpretation · Oxford Y4</title>
<style>
  :root{
    --bg:#f5f5f7; --surface:#fff; --ink:#1d1d1f; --ink-2:#6e6e73; --ink-3:#86868b;
    --hair:#d2d2d7; --hair-soft:#e8e8ed; --accent:#0071e3;
    --dx:#1d6f42; --dx-bg:#eaf6ef; --ix:#8a5a00; --ix-bg:#fbf3e2;
    --radius:18px; --radius-sm:12px; --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 30px rgba(0,0,0,.06);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:60px;line-height:1.5;letter-spacing:-.01em;}

  header{position:sticky;top:0;z-index:50;background:rgba(245,245,247,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--hair);}
  .bar{max-width:680px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;}
  .back{font-size:14px;font-weight:500;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:3px;min-width:72px;}
  .back svg{width:16px;height:16px;flex:none;}
  .bar h1{font-size:17px;font-weight:600;flex:1;text-align:center;}
  .bar-end{min-width:72px;display:flex;justify-content:flex-end;}
  .reset-btn{font-size:13px;color:var(--ink-3);font-weight:500;background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px 6px;}
  .reset-btn:hover{color:var(--ink-2);}

  /* Tab bar */
  .tab-bar{max-width:680px;margin:0 auto;padding:0 22px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .dtab{flex:none;font-size:14px;font-weight:550;color:var(--ink-2);padding:10px 16px;cursor:pointer;border:none;background:none;position:relative;letter-spacing:-.01em;font-family:var(--font);}
  .dtab.active{color:var(--ink);}
  .dtab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:0;height:2.5px;border-radius:2px;background:var(--accent);}

  main{max-width:680px;margin:0 auto;padding:22px 22px 0;}

  /* ── Approach selector ── */
  .approach-hero{padding-bottom:22px;}
  .approach-hero h2{font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px;}
  .approach-hero p{font-size:14.5px;color:var(--ink-2);}
  .data-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
  .dtype-card{background:var(--surface);border:.5px solid var(--hair-soft);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px;cursor:pointer;border-left:4px solid var(--accent);transition:transform .13s;}
  .dtype-card:hover{transform:translateY(-2px);}
  .dtype-icon{font-size:24px;margin-bottom:8px;}
  .dtype-title{font-size:16px;font-weight:650;letter-spacing:-.015em;margin-bottom:3px;}
  .dtype-sub{font-size:12.5px;color:var(--ink-3);}

  /* ── Approach step-through ── */
  .step-back{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0 0 14px;margin-top:8px;}
  .step-back svg{width:16px;height:16px;}
  .phase-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 0 12px;-webkit-overflow-scrolling:touch;}
  .phase-strip::-webkit-scrollbar{display:none;}
  .phase-chip{flex:none;font-size:12px;font-weight:600;padding:5px 12px;border-radius:980px;background:var(--hair-soft);color:var(--ink-3);transition:all .2s;white-space:nowrap;}
  .phase-chip.active{color:#fff;background:var(--accent);}
  .step-card{background:var(--surface);border:.5px solid var(--hair-soft);border-top:3.5px solid var(--accent);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px 22px;margin-bottom:14px;}
  .step-phase-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px;}
  .step-title{font-size:20px;font-weight:700;letter-spacing:-.025em;margin-bottom:16px;}
  .step-actions{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .step-actions li{font-size:15px;display:flex;gap:10px;align-items:flex-start;line-height:1.5;}
  .step-actions li .n{font-size:11px;font-weight:700;color:#fff;background:var(--accent);width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none;margin-top:2px;}
  .step-actions li .txt b{font-weight:600;}
  .step-mnemonic{display:inline-flex;align-items:center;gap:6px;background:#fff8e6;border:.5px solid #f5c842;border-radius:9px;padding:8px 12px;margin-bottom:12px;font-size:13.5px;color:#7a5200;}
  .step-mnemonic .ml{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#a07000;margin-right:2px;}
  .step-tip{background:#f2f7ff;border:.5px solid #b8d4f8;border-radius:9px;padding:10px 13px;font-size:13px;color:#1a4a8a;line-height:1.5;margin-bottom:12px;}
  .step-tip .tl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#5080c0;margin-bottom:3px;}
  .step-footer{display:flex;align-items:center;gap:8px;}
  .step-counter{font-size:13px;font-weight:600;color:var(--ink-3);flex:1;text-align:center;}
  .nav-btn{font-size:14.5px;font-weight:650;padding:12px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font);transition:opacity .15s,transform .1s;}
  .nav-btn:active{transform:scale(.97);}
  .nav-btn.prev{background:var(--hair-soft);color:var(--ink-2);}
  .nav-btn.next{color:#fff;background:var(--accent);}
  .nav-btn:disabled{opacity:.35;cursor:default;}

  /* ── Quiz tab ── */
  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .progress-track{flex:1;height:4px;background:var(--hair);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}
  .progress-label{font-size:13px;color:var(--ink-2);font-weight:550;white-space:nowrap;min-width:42px;text-align:right;}
  .filter-row{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-bottom:22px;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .filter-row::-webkit-scrollbar{display:none;}
  .fchip{flex:none;font-size:12.5px;font-weight:550;color:var(--ink-2);background:var(--surface);border:.5px solid var(--hair);padding:6px 13px;border-radius:980px;cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none;}
  .fchip.on{color:#fff;background:var(--accent);border-color:transparent;}
  .card-wrap{perspective:1200px;margin-bottom:14px;}
  .card{background:var(--surface);border:.5px solid var(--hair-soft);border-top:3px solid var(--accent);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 22px 22px;transition:transform .18s cubic-bezier(.4,0,.2,1),opacity .18s;}
  .card.flipping{transform:scaleX(0);opacity:0;}
  .card-meta{display:flex;align-items:center;gap:9px;margin-bottom:18px;}
  .cat-badge{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:7px;color:#fff;background:var(--accent);}
  .sign-name{font-size:21px;font-weight:700;letter-spacing:-.025em;margin-bottom:10px;}
  .sign-cue{font-size:15px;color:var(--ink-2);font-style:italic;line-height:1.55;margin-bottom:24px;}
  .sec-head{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin:14px 0 8px;}
  .sec-head.first{margin-top:0;}
  .meaning-text{font-size:15px;line-height:1.5;color:var(--ink);}
  .mx-text{font-size:15px;line-height:1.5;color:var(--ink);}
  .cause-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .cause-item{font-size:15px;padding-left:16px;position:relative;line-height:1.45;color:var(--ink);}
  .cause-item::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--ink-3);}
  .cause-item:first-child{font-weight:500;}
  .cause-item:first-child::before{background:var(--dx);}
  .btn{font-size:14.5px;font-weight:600;padding:12px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:opacity .15s,transform .1s;font-family:var(--font);letter-spacing:-.01em;}
  .btn:active{transform:scale(.97);}
  .btn-show{display:block;width:100%;background:var(--accent);color:#fff;font-size:15px;padding:14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font);font-weight:600;letter-spacing:-.01em;transition:opacity .15s;}
  .btn-show:hover{opacity:.88;}
  .rating-row{display:flex;gap:8px;margin-top:20px;}
  .rating-row .btn{flex:1;}
  .btn.missed{background:#fde8e8;color:#c0392b;}
  .btn.hard{background:#fef3e2;color:#92400e;}
  .btn.got{background:var(--dx-bg);color:var(--dx);}
  .btn.missed:hover{background:#fcd2d2;}
  .btn.hard:hover{background:#fde8c8;}
  .btn.got:hover{background:#d4edda;}
  #done{display:none;text-align:center;padding:52px 0;}
  #done h2{font-size:30px;font-weight:700;letter-spacing:-.03em;margin-bottom:10px;}
  #done .sub{font-size:16px;color:var(--ink-2);margin-bottom:28px;}
  .stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:30px;}
  .stat-box{background:var(--surface);border:.5px solid var(--hair-soft);border-radius:var(--radius);padding:16px 20px;min-width:90px;box-shadow:var(--shadow);}
  .stat-n{font-size:30px;font-weight:800;letter-spacing:-.04em;line-height:1;}
  .stat-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-top:4px;}
  .stat-box.g .stat-n{color:var(--dx);}
  .stat-box.h .stat-n{color:#92400e;}
  .stat-box.m .stat-n{color:#c0392b;}
  .next-info{font-size:14px;color:var(--ink-3);margin-bottom:24px;}
  .btn-restart{display:inline-block;padding:13px 30px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);letter-spacing:-.01em;}
  .btn-restart:hover{opacity:.88;}
  #empty{display:none;text-align:center;padding:52px 0;}
  #empty h2{font-size:26px;font-weight:700;letter-spacing:-.025em;margin-bottom:10px;}
  #empty p{font-size:15px;color:var(--ink-2);line-height:1.6;}

  /* view switching */
  .view{display:none;}
  .view.active{display:block;}

  @media(max-width:460px){
    .sign-name{font-size:19px;}
    .rating-row .btn{font-size:13.5px;padding:11px 8px;}
    .stats-row{gap:8px;}
    .stat-box{min-width:80px;padding:14px 14px;}
    .data-type-grid{grid-template-columns:1fr 1fr;}
  }
</style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header>
  <div class="bar">
    <a class="back" href="osce_atlas.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Atlas
    </a>
    <h1>Data</h1>
    <div class="bar-end">
      <button class="reset-btn" id="btn-reset" title="Reset quiz progress">Reset</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="dtab active" data-v="approach">Approach</button>
    <button class="dtab" data-v="quiz">Quiz</button>
  </div>
</header>

<main>

  <!-- ═══ APPROACH VIEW ═══ -->
  <div class="view active" id="view-approach">

    <div id="approach-select">
      <div class="approach-hero">
        <h2>How to read</h2>
        <p>Systematic approach for each data type — step through the method before testing yourself.</p>
      </div>
      <div class="data-type-grid" id="dataTypeGrid"></div>
    </div>

    <div id="approach-steps" style="display:none">
      <button class="step-back" onclick="backToApproachSelect()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span id="stepBackLabel">Back</span>
      </button>
      <div class="phase-strip" id="approachPhaseStrip"></div>
      <div class="step-card" id="approachStepCard"></div>
      <div class="step-footer">
        <button class="nav-btn prev" id="approachPrev" onclick="approachNav(-1)">← Prev</button>
        <span class="step-counter" id="approachCounter"></span>
        <button class="nav-btn next" id="approachNext" onclick="approachNav(1)">Next →</button>
      </div>
    </div>

  </div>

  <!-- ═══ QUIZ VIEW ═══ -->
  <div class="view" id="view-quiz">
    <div id="quiz-area">
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-label" id="progress-label">— / —</div>
      </div>
      <div class="filter-row" id="filter-chips"></div>
      <div class="card-wrap">
        <div class="card" id="card"></div>
      </div>
    </div>

    <div id="done">
      <h2>Session complete</h2>
      <p class="sub" id="done-sub"></p>
      <div class="stats-row">
        <div class="stat-box g"><div class="stat-n" id="s-got">0</div><div class="stat-l">Got it</div></div>
        <div class="stat-box h"><div class="stat-n" id="s-hard">0</div><div class="stat-l">Hard</div></div>
        <div class="stat-box m"><div class="stat-n" id="s-missed">0</div><div class="stat-l">Missed</div></div>
      </div>
      <p class="next-info" id="done-next"></p>
      <button class="btn-restart" id="btn-restart">Review again</button>
    </div>

    <div id="empty">
      <h2>Nothing due today</h2>
      <p>All cards reviewed — come back tomorrow.<br>Use a filter above to add more.</p>
    </div>
  </div>

</main>

<script>
/* ══════════════════════════════════════════════════
   APPROACH DATA
══════════════════════════════════════════════════ */
const APPROACHES = [
 {id:"ecg", icon:"📈", title:"ECG", sub:"Rate → rhythm → axis → intervals → ST", steps:[
  {phase:"Confirm", title:"Check before you read", actions:[
   "Patient name, date — is this the right ECG?",
   "<b>Paper speed:</b> 25 mm/s standard. 1 small square = 40 ms; 1 large square = 200 ms",
   "<b>Calibration:</b> 1 mV = 10 mm height. Half or double calibration invalidates voltage criteria",
   "12 leads all present? Standard limb lead placement?",
  ], tip:"Never read an ECG without knowing the clinical context. Rate 50 in a sleeping athlete ≠ heart block."},

  {phase:"Rate", title:"Calculate the rate", actions:[
   "<b>Regular rhythm:</b> 300 ÷ large squares between R waves. Landmarks: 300 → 150 → 100 → 75 → 60 → 50",
   "<b>Irregular rhythm:</b> count QRS complexes in a 10-second strip × 6",
   "Bradycardia < 60 bpm. Tachycardia > 100 bpm",
  ], tip:"The 300-method is fastest for regular rhythms. For irregular, count over the full 10-second rhythm strip."},

  {phase:"Rhythm", title:"Assess the rhythm", actions:[
   "Regular or irregular? Mark out R-R intervals with a piece of paper",
   "P waves present? Consistent morphology? Upright in II?",
   "One P before every QRS? One QRS after every P?",
   "If no P waves + irregularly irregular → AF until proven otherwise",
   "If P waves dissociated from QRS → complete heart block",
  ], mnemonic:"P before every Q, Q after every P — if not, there is a problem"},

  {phase:"Axis", title:"Determine the axis", actions:[
   "Look at leads <b>I</b> and <b>aVF</b> only",
   "Both positive → <b>normal axis</b> (−30° to +90°)",
   "I positive, aVF negative → <b>left axis deviation</b> (< −30°) — LBBB, inferior MI, left anterior fascicular block",
   "I negative, aVF positive → <b>right axis deviation</b> (> +90°) — RVH, PE, RBBB, left posterior fascicular block",
   "Both negative → extreme axis — ventricular rhythm, severe RAD",
  ], tip:"Thumbs up/down in leads I and aVF. Both thumbs up = normal axis."},

  {phase:"P waves / PR", title:"P waves and PR interval", actions:[
   "P waves: upright I, II, V4–V6. Inverted aVR (normal)",
   "Bifid P (P mitrale) = left atrial enlargement. Peaked P (P pulmonale) = right atrial enlargement",
   "<b>PR interval:</b> 3–5 small squares = 120–200 ms",
   "Short PR (< 120 ms): WPW, junctional rhythm",
   "Long PR (> 200 ms): first-degree heart block",
   "Progressively lengthening PR then dropped QRS = Wenckebach (Mobitz I). Fixed PR with sudden dropped QRS = Mobitz II",
  ]},

  {phase:"QRS", title:"QRS complex", actions:[
   "Normal width: < 3 small squares (< 120 ms)",
   "<b>Broad QRS:</b> BBB, ventricular origin, hyperkalaemia, pre-excitation (WPW)",
   "<b>LBBB:</b> <b>Wi</b>LL<b>ia</b>M — W in V1, M in V6. No septal Q in lateral leads. New LBBB + chest pain = STEMI equivalent",
   "<b>RBBB:</b> Ma<b>RR</b>oW — M (RSR') in V1, W in V6. May be normal or indicate RV strain / PE",
   "Poor R-wave progression V1–V4: anterior MI or normal variant",
  ], mnemonic:"WiLLiaM MaRRoW: LBBB = W in V1 / M in V6. RBBB = M in V1 / W in V6"},

  {phase:"ST segment", title:"ST segment — territory is everything", actions:[
   "Should be isoelectric (at PR baseline level)",
   "<b>ST elevation</b> ≥ 1 mm limb leads, ≥ 2 mm precordial = STEMI. Identify territory:",
   "  V1–V4 = anterior (LAD) | II, III, aVF = inferior (RCA/LCx) | I, aVL, V5–V6 = lateral (LCx)",
   "<b>ST depression:</b> subendocardial ischaemia, posterior MI (V1–V3), digoxin (reverse tick)",
   "<b>Saddle-shaped ST elevation all leads + PR depression:</b> pericarditis (not territory-specific)",
  ], tip:"Reciprocal ST depression confirms STEMI — check the mirror territory."},

  {phase:"T waves", title:"T wave abnormalities", actions:[
   "Normally upright in I, II, V4–V6. Inverted in aVR (normal)",
   "<b>Peaked tent-shaped T waves:</b> hyperkalaemia — earliest ECG sign before QRS widening",
   "<b>Deep symmetrical T inversion V1–V4:</b> PE (right heart strain), RBBB, anterior ischaemia",
   "<b>T inversion lateral leads:</b> LVH strain, lateral ischaemia",
   "<b>Biphasic T in V2–V3:</b> de Winter pattern — LAD occlusion without classic ST elevation",
  ], tip:"New deep T inversion in V1–V4 after a normal ECG + pleuritic pain + hypoxia → think PE first."},

  {phase:"QTc", title:"QT interval", actions:[
   "Measure QT from start of QRS to end of T wave (lead II or V5)",
   "Correct for rate: QTc = QT (seconds) ÷ √RR interval (seconds)",
   "Normal: QTc < 440 ms men; < 460 ms women",
   "Prolonged QTc → risk of torsades de pointes (polymorphic VT → VF)",
   "<b>Causes:</b> drugs (amiodarone, antipsychotics, macrolides), ↓K⁺, ↓Mg²⁺, ↓Ca²⁺, congenital",
   "Short QTc (< 340 ms): hypercalcaemia, digoxin, short QT syndrome",
  ]},

  {phase:"Synthesise", title:"State your conclusion", actions:[
   "Rate: [X] bpm, [normal/brady/tachy]",
   "Rhythm: [sinus / AF / flutter / junctional / ventricular]",
   "Axis: [normal / LAD / RAD]",
   "Intervals: PR [normal/prolonged/short], QRS [narrow/broad], QTc [normal/prolonged]",
   "ST/T changes: [nil / ST elevation in (territory) / depression / T inversion]",
   "Overall: state the diagnosis in one sentence",
  ], tip:"Always end with a clinical sentence: 'This ECG is consistent with an inferior STEMI involving the RCA territory.'"},
 ]},

 {id:"cxr", icon:"🫁", title:"CXR", sub:"ABCDE: Airway → Bones → Cardiac → Diaphragm → Everything", steps:[
  {phase:"Adequacy", title:"Technical quality — RIPE", actions:[
   "<b>Rotation:</b> spinous process of T4 equidistant from both medial clavicle ends",
   "<b>Inspiration:</b> 6 anterior rib ends visible above right hemidiaphragm (fewer = poor inspiration)",
   "<b>Projection:</b> PA (2 m — preferred) vs AP (portable — magnifies cardiac shadow, do not comment on cardiomegaly)",
   "<b>Exposure:</b> vertebral bodies just visible through the cardiac shadow",
  ], mnemonic:"RIPE: Rotation, Inspiration, Projection, Exposure", tip:"Always state PA vs AP. You cannot diagnose cardiomegaly on an AP film."},

  {phase:"Airway", title:"Trachea and carina", actions:[
   "Trachea: midline? Deviation?",
   "Pushed away from: tension pneumothorax, massive pleural effusion, large mass",
   "Pulled towards: lobar collapse, pulmonary fibrosis",
   "Carina angle: normally < 70°. > 70° (splayed) = left atrial enlargement",
  ]},

  {phase:"Bones", title:"Bones and soft tissues", actions:[
   "<b>Ribs:</b> fractures (subtle posterior rib #s = significant trauma); notching (inferior surface, pairs 3–8 = coarctation)",
   "<b>Clavicles:</b> fracture, erosion (RA, hyperparathyroidism at medial end)",
   "<b>Vertebrae:</b> compression fractures, lytic lesions (myeloma, metastases)",
   "<b>Soft tissues:</b> absent breast shadow (post-mastectomy), subcutaneous emphysema (air in soft tissue — air tracking from PTX or oesophageal rupture)",
  ]},

  {phase:"Cardiac", title:"Cardiac silhouette", actions:[
   "<b>Size:</b> CTR = cardiac width ÷ thoracic width. Normal < 0.5 on PA. Cardiomegaly: CCF, DCM, pericardial effusion ('water-bottle' heart — globular)",
   "<b>Right border (top→bottom):</b> SVC, right atrium",
   "<b>Left border (top→bottom):</b> aortic knuckle → main PA → left atrial appendage → left ventricle",
   "Left atrial enlargement: double shadow behind right heart border + splayed carina + prominent LAA (straightens left heart border)",
   "<b>Calcification:</b> valve ring, pericardium (constrictive pericarditis), aortic wall",
  ], tip:"A globular 'water-bottle' shaped heart with clear lung fields → pericardial effusion, not pulmonary oedema."},

  {phase:"Diaphragm", title:"Diaphragm and costophrenic angles", actions:[
   "Right hemidiaphragm normally 1.5–2.5 cm above left (liver below)",
   "Flat or inverted diaphragm: hyperinflation (COPD), tension PTX",

let approachTypeIdx = null;
let approachStepIdx = 0;

function renderApproachSelector() {
  approachTypeIdx = null;
  document.getElementById('approach-select').style.display = '';
  document.getElementById('approach-steps').style.display = 'none';
  const grid = document.getElementById('dataTypeGrid');
  grid.innerHTML = APPROACHES.map((a, i) => `
    <div class="dtype-card" onclick="selectApproachType(${i})">
      <div class="dtype-icon">${a.icon}</div>
      <div class="dtype-title">${a.title}</div>
      <div class="dtype-sub">${a.sub}</div>
    </div>
  `).join('');
}

function selectApproachType(idx) {
  approachTypeIdx = idx;
  approachStepIdx = 0;
  document.getElementById('approach-select').style.display = 'none';
  document.getElementById('approach-steps').style.display = '';
  document.getElementById('stepBackLabel').textContent = APPROACHES[idx].title;
  renderApproachStep();
}

function backToApproachSelect() {
  document.getElementById('approach-select').style.display = '';
  document.getElementById('approach-steps').style.display = 'none';
}

function renderApproachStep() {
  const type = APPROACHES[approachTypeIdx];
  const step = type.steps[approachStepIdx];
  const phases = [...new Set(type.steps.map(s => s.phase))];

  document.getElementById('approachPhaseStrip').innerHTML = phases.map(p =>
    `<div class="phase-chip ${p === step.phase ? 'active' : ''}">${p}</div>`
  ).join('');

  let html = `<div class="step-phase-lbl">${step.phase}</div><div class="step-title">${step.title}</div>`;
  html += `<ol class="step-actions">${step.actions.map((a,i) =>
    `<li><span class="n">${i+1}</span><span class="txt">${a}</span></li>`
  ).join('')}</ol>`;
  if (step.mnemonic) html += `<div class="step-mnemonic"><span class="ml">Mnemonic</span>${step.mnemonic}</div>`;
  if (step.tip) html += `<div class="step-tip"><div class="tl">Tip</div>${step.tip}</div>`;

  document.getElementById('approachStepCard').innerHTML = html;
  document.getElementById('approachCounter').textContent = `${approachStepIdx + 1} / ${type.steps.length}`;
  document.getElementById('approachPrev').disabled = approachStepIdx === 0;
  const isLast = approachStepIdx === type.steps.length - 1;
  const nextBtn = document.getElementById('approachNext');
  nextBtn.textContent = isLast ? 'Done ✓' : 'Next →';
  nextBtn.disabled = false;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function approachNav(delta) {
  const type = APPROACHES[approachTypeIdx];
  const next = approachStepIdx + delta;
  if (next < 0) return;
  if (next >= type.steps.length) { backToApproachSelect(); return; }
  approachStepIdx = next;
  renderApproachStep();
}

document.querySelectorAll('.dtab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.v).classList.add('active');
    document.getElementById('btn-reset').style.visibility = tab.dataset.v === 'quiz' ? 'visible' : 'hidden';
    window.scrollTo({top: 0});
  });
});

const CATS = ['All','ECG','CXR','AXR','ABG','Bloods'];
const STORAGE_KEY = 'data-srs';

function localDate(d){return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');}
const today = localDate(new Date());
function addDays(n){const d=new Date();d.setDate(d.getDate()+Math.round(n));return localDate(d);}
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch{return {};}}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}
function isDue(rec){return !rec||rec.due<=today;}
function applyRating(progress,id,r){
  const rec=progress[id]||{interval:1};
  if(r==='got'){rec.interval=Math.max(1,Math.round(rec.interval*2.5));rec.due=addDays(rec.interval);}
  else if(r==='hard'){rec.interval=Math.max(1,Math.round(rec.interval*1.2));rec.due=addDays(1);}
  else{rec.interval=1;rec.due=today;}
  progress[id]=rec;
}

let activeCat='All',queue=[],queuePos=0;
let sessionStats={got:0,hard:0,missed:0},sessionSeen={},progress={};

function buildQueue(){
  progress=loadProgress();
  const base=CARDS.filter(c=>(activeCat==='All'||c.cat===activeCat)&&isDue(progress[c.id]));
  for(let i=base.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[base[i],base[j]]=[base[j],base[i]];}
  queue=base;queuePos=0;sessionStats={got:0,hard:0,missed:0};sessionSeen={};
}

function updateProgress(){
  const total=queue.length,done=queuePos;
  document.getElementById('progress-fill').style.width=(total?(done/total)*100:0)+'%';
  document.getElementById('progress-label').textContent=done+' / '+total;
}

function showFront(){
  const c=queue[queuePos];
  document.getElementById('card').innerHTML=`
    <div class="card-meta"><span class="cat-badge">${c.cat}</span></div>
    <div class="sign-name">${c.name}</div>
    <div class="sign-cue">${c.cue}</div>
    <button class="btn-show" id="btn-show">Show interpretation</button>
  `;
  document.getElementById('btn-show').addEventListener('click',doFlip);
  updateProgress();
}

function doFlip(){
  const cardEl=document.getElementById('card');
  const c=queue[queuePos];
  cardEl.classList.add('flipping');
  setTimeout(()=>{
    const causesHTML=c.causes.map(ca=>`<li class="cause-item">${ca}</li>`).join('');
    cardEl.innerHTML=`
      <div class="card-meta"><span class="cat-badge">${c.cat}</span></div>
      <div class="sign-name">${c.name}</div>
      <div class="sec-head first">What it means</div>
      <p class="meaning-text">${c.meaning}</p>
      <div class="sec-head">Causes</div>
      <ul class="cause-list">${causesHTML}</ul>
      <div class="sec-head">Management</div>
      <p class="mx-text">${c.mx}</p>
      <div class="rating-row">
        <button class="btn missed" data-r="missed">Missed</button>
        <button class="btn hard" data-r="hard">Hard</button>
        <button class="btn got" data-r="got">Got it ✓</button>
      </div>
    `;
    cardEl.classList.remove('flipping');
    cardEl.querySelectorAll('.rating-row .btn').forEach(b=>b.addEventListener('click',()=>rate(b.dataset.r)));
  },190);
}

function rate(r){
  const c=queue[queuePos];
  sessionStats[r]++;
  applyRating(progress,c.id,r);
  saveProgress(progress);
  if(r==='missed'){const seen=sessionSeen[c.id]||0;if(seen<1)queue.push(c);}
  sessionSeen[c.id]=(sessionSeen[c.id]||0)+1;
  queuePos++;
  if(queuePos>=queue.length){showDone();return;}
  const cardEl=document.getElementById('card');
  cardEl.classList.add('flipping');
  setTimeout(()=>{showFront();cardEl.classList.remove('flipping');},190);
}

function showDone(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('done').style.display='block';
  document.getElementById('s-got').textContent=sessionStats.got;
  document.getElementById('s-hard').textContent=sessionStats.hard;
  document.getElementById('s-missed').textContent=sessionStats.missed;
  const total=sessionStats.got+sessionStats.hard+sessionStats.missed;
  document.getElementById('done-sub').textContent=total+' card'+(total!==1?'s':'')+' reviewed';
  const prog=loadProgress(),tom=addDays(1);
  const dueT=CARDS.filter(c=>{if(activeCat!=='All'&&c.cat!==activeCat)return false;const r=prog[c.id];return r&&r.due<=tom&&r.due>today;}).length;
  document.getElementById('done-next').textContent=dueT?dueT+' card'+(dueT!==1?'s':'')+' due tomorrow':'Nothing due tomorrow — well done.';
}

function showEmpty(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('done').style.display='none';
  document.getElementById('empty').style.display='block';
}

function resetToQuiz(){
  document.getElementById('done').style.display='none';
  document.getElementById('empty').style.display='none';
  document.getElementById('quiz-area').style.display='block';
}

function renderFilters(){
  const row=document.getElementById('filter-chips');
  row.innerHTML='';
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='fchip'+(activeCat===cat?' on':'');
    btn.textContent=cat;
    btn.addEventListener('click',()=>{
      if(activeCat===cat)return;
      activeCat=cat;
      row.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      buildQueue();
      if(queue.length===0){showEmpty();}else{resetToQuiz();showFront();}
    });
    row.appendChild(btn);
  });
}

document.getElementById('btn-restart').addEventListener('click',()=>{
  buildQueue();
  if(queue.length===0){showEmpty();}else{resetToQuiz();showFront();}
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(!confirm('Reset all data interpretation progress?'))return;
  localStorage.removeItem(STORAGE_KEY);
  buildQueue();
  if(queue.length===0){showEmpty();}else{resetToQuiz();showFront();}
});

/* ── INIT ── */
renderApproachSelector();
buildQueue();
renderFilters();
/* Reset button only relevant on quiz tab */
document.getElementById('btn-reset').style.visibility='hidden';
</script>
